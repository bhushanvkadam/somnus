<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Somnus">
<title>Somnus — Sleep Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f2f7;
  --surface:#ffffff;
  --surface2:#f2f2f7;
  --grouped:#ffffff;
  --border:rgba(60,60,67,0.12);
  --border2:rgba(60,60,67,0.18);
  --text:#000000;
  --text2:rgba(60,60,67,0.6);
  --text3:rgba(60,60,67,0.36);
  --accent:#007aff;
  --accent-l:rgba(0,122,255,0.1);
  --green:#1a9e45;
  --green-l:rgba(26,158,69,0.08);
  --amber:#c47b00;
  --amber-l:rgba(196,123,0,0.08);
  --red:#d63230;
  --red-l:rgba(214,50,48,0.08);
  --purple:#5856d6;
  --purple-l:rgba(88,86,214,0.1);
  --teal:#32ade6;
  --teal-l:rgba(50,173,230,0.1);
  --r:10px;
  --r-lg:16px;
  --r-xl:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.app{max-width:430px;margin:0 auto;background:var(--bg);}

/* ── Auth ── */
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center;}
.auth-moon{font-size:64px;margin-bottom:20px;}
.auth-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;}
.auth-title span{color:var(--accent);}
.auth-sub{font-size:15px;color:var(--text2);margin-bottom:36px;line-height:1.5;}
.auth-group{width:100%;max-width:320px;background:var(--surface);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;}
.auth-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:14px 16px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);outline:none;}
.auth-input:last-child{border-bottom:none;}
.auth-input::placeholder{color:var(--text3);}
#auth-error{font-size:13px;color:var(--red);margin-bottom:10px;max-width:320px;display:none;}
.auth-btn-primary{width:100%;max-width:320px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-lg);padding:15px;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-bottom:10px;transition:opacity .15s;}
.auth-btn-primary:active{opacity:.8;}
.auth-btn-secondary{width:100%;max-width:320px;background:var(--surface);color:var(--accent);border:none;border-radius:var(--r-lg);padding:15px;font-size:16px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;}
.auth-btn-secondary:active{opacity:.8;}
.auth-note{font-size:12px;color:var(--text3);margin-top:16px;line-height:1.5;max-width:280px;}

/* ── Loading ── */
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Main ── */
#main-app{display:none;padding-bottom:84px;}

/* ── Header ── */
.header{padding:12px 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.logo-wrap{}
.logo{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
.logo-dot{color:var(--accent);}
.hdr-date{font-size:13px;color:var(--text2);margin-top:1px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;}
.streak-pill{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-l);border-radius:20px;padding:4px 10px;margin-top:4px;}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(242,242,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;}
.nav-icon{font-size:22px;color:var(--text3);line-height:1;transition:color .15s;}
.nav-label{font-size:10px;color:var(--text3);font-weight:500;transition:color .15s;}
.nav-item.active .nav-icon{color:var(--accent);}
.nav-item.active .nav-label{color:var(--accent);}

/* ── Pages ── */
.page{display:none;}.page.active{display:block;}

/* ── Section style (Apple grouped) ── */
.section{margin:0 16px 20px;}
.section-header{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding:0 4px;}
.section-body{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;}
.section-row{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.section-row:last-child{border-bottom:none;}
.row-label{font-size:16px;color:var(--text);}
.row-value{font-size:16px;color:var(--text2);font-weight:500;}
.row-value.accent{color:var(--accent);}
.row-value.green{color:var(--green);}
.row-value.amber{color:var(--amber);}
.row-value.red{color:var(--red);}

/* ── Hero debt card ── */
.debt-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-xl);padding:20px;}
.debt-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.debt-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.debt-number{font-size:60px;font-weight:200;line-height:1;letter-spacing:-3px;color:var(--red);}
.debt-number.amber{color:var(--amber);}
.debt-number.green{color:var(--green);}
.debt-unit{font-size:15px;color:var(--text2);font-weight:400;margin-top:2px;}
.arc-wrap{position:relative;width:70px;height:70px;flex-shrink:0;}
.arc-wrap svg{transform:rotate(-90deg);}
.arc-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.arc-pct{font-size:16px;font-weight:700;line-height:1;}
.arc-sub{font-size:9px;color:var(--text3);font-weight:500;}
.debt-bar-track{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.debt-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.debt-meta-row{display:flex;justify-content:space-between;align-items:center;}
.safe-badge{font-size:11px;font-weight:600;color:var(--green);background:var(--green-l);border-radius:20px;padding:3px 8px;}
.debt-meta-text{font-size:11px;color:var(--text3);}

/* ── Last night card ── */
.ln-row{margin:0 16px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ln-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.ln-card-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.ln-main-num{font-size:34px;font-weight:300;letter-spacing:-1.5px;line-height:1;}
.ln-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.ln-detail-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);overflow:hidden;}
.ln-detail-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);}
.ln-detail-row:last-child{border-bottom:none;}
.ln-detail-label{font-size:14px;color:var(--text2);}
.ln-detail-value{font-size:14px;font-weight:600;color:var(--text);}
.bedtime-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.bedtime-time{font-size:28px;font-weight:600;letter-spacing:-.5px;line-height:1;margin-bottom:4px;}
.bedtime-pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;margin-top:6px;}

/* ── Energy timeline ── */
.energy-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.energy-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.energy-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.energy-now{font-size:13px;font-weight:600;}
.energy-sub{font-size:12px;color:var(--text3);margin-bottom:10px;}
.tl-strip{height:10px;display:flex;border-radius:5px;overflow:hidden;position:relative;margin-bottom:6px;}
.tl-seg{height:100%;}
.tl-marker{position:absolute;top:-3px;width:2px;height:16px;background:var(--text);border-radius:1px;opacity:.7;}
.tl-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:10px;}
.zone-pills{display:flex;flex-wrap:wrap;gap:6px;}
.zpill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;}

/* ── Tip card ── */
.tip-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.tip-headline{font-size:16px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
.tip-body{font-size:14px;color:var(--text2);line-height:1.5;}
.tip-footer{display:flex;align-items:center;margin-top:12px;}
.tip-dots{display:flex;gap:5px;}
.tip-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);}
.tip-dot.on{background:var(--accent);}
.tip-next-btn{font-size:13px;font-weight:600;color:var(--accent);margin-left:auto;cursor:pointer;}

/* ── Goal card ── */
.goal-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.goal-header{display:flex;justify-content:space-between;margin-bottom:10px;}
.goal-title{font-size:15px;font-weight:600;}
.goal-pct{font-size:13px;font-weight:600;color:var(--accent);}
.goal-bar-track{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.goal-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;}
.goal-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}

/* ── Alert banner ── */
.alert-banner{margin:0 16px 12px;border-radius:var(--r-lg);padding:13px 16px;font-size:14px;font-weight:500;line-height:1.4;}

/* ── TODAY tab ── */
.day-hero{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-xl);padding:20px;}
.day-badge{display:inline-block;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.day-type{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.day-hrs{font-size:14px;color:var(--text2);margin-bottom:12px;}
.day-summary{font-size:14px;color:var(--text2);line-height:1.6;}
.vt-card{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.vt-strip{height:36px;display:flex;border-radius:10px;overflow:hidden;cursor:pointer;margin:10px 0 6px;}
.vt-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.03em;color:rgba(255,255,255,.85);}
.vt-detail{background:var(--bg);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.5;margin-top:8px;min-height:48px;border-left:3px solid var(--border2);}
.pills-row{margin:0 16px 12px;display:flex;gap:8px;}
.pill-card{flex:1;background:var(--surface);border-radius:var(--r-lg);padding:14px 12px;text-align:center;}
.pill-val{font-size:16px;font-weight:700;margin-bottom:3px;}
.pill-lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.nap-row{margin:0 16px 12px;border-radius:var(--r-lg);padding:13px 16px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;}
.mood-card{margin:0 16px 12px;background:linear-gradient(135deg,rgba(0,122,255,.06),rgba(88,86,214,.06));border-radius:var(--r-lg);padding:16px;}
.mood-row{display:flex;gap:8px;margin-top:10px;}
.mbtn{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 0;font-size:22px;cursor:pointer;text-align:center;transition:all .15s;}
.mbtn.sel,.mbtn:active{border-color:var(--accent);background:var(--accent-l);}

/* ── LOG tab ── */
.log-section{margin:0 16px 20px;}
.log-section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding:0 4px;}
.log-body{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;}
.log-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);}
.log-row:last-child{border-bottom:none;}
.log-row-label{font-size:16px;color:var(--text);}
.log-row-input{font-size:16px;color:var(--accent);font-weight:500;background:none;border:none;outline:none;font-family:'Inter',sans-serif;text-align:right;}
.log-row-select{font-size:16px;color:var(--accent);font-weight:500;background:none;border:none;outline:none;font-family:'Inter',sans-serif;text-align:right;-webkit-appearance:none;}
.qual-strip{display:flex;gap:6px;padding:12px 16px;}
.qbtn{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;color:var(--text2);line-height:1.4;}
.qbtn .qi{font-size:17px;display:block;margin-bottom:2px;}
.qbtn.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent);}
.wu-strip{display:flex;gap:6px;padding:0 16px 14px;}
.wbtn{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:9px 4px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;color:var(--text2);}
.wbtn.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent);}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 14px;}
.tag{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;}
.tag.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent);}
.log-note{width:100%;background:transparent;border:none;outline:none;font-size:15px;font-family:'Inter',sans-serif;color:var(--text);resize:none;height:64px;padding:13px 16px;border-top:1px solid var(--border);}
.log-note::placeholder{color:var(--text3);}
.preview-strip{margin:0 16px 12px;background:var(--accent-l);border-radius:var(--r-lg);padding:12px 14px;font-size:13px;color:var(--accent);font-weight:500;line-height:1.6;min-height:44px;}
.primary-btn{display:block;width:calc(100% - 32px);margin:0 16px 10px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-lg);padding:15px;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;text-align:center;}
.primary-btn:active{opacity:.85;}
.secondary-btn{display:block;width:calc(100% - 32px);margin:0 16px 10px;background:var(--surface);color:var(--accent);border:none;border-radius:var(--r-lg);padding:14px;font-size:16px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;text-align:center;}
.destructive-btn{color:var(--red);}
.advanced-toggle{font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;padding:10px 0 2px;text-align:center;display:block;}

/* History */
.hist-entry{background:var(--surface);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;}
.hist-main{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.hist-info{flex:1;}
.hist-date{font-size:15px;font-weight:600;}
.hist-times{font-size:12px;color:var(--text3);margin-top:1px;}
.hist-right{text-align:right;}
.hist-hrs{font-size:18px;font-weight:600;}
.hist-raw{font-size:11px;color:var(--text3);}
.hist-chevron{font-size:14px;color:var(--text3);margin-left:6px;}
.hist-expanded{background:var(--bg);border-top:1px solid var(--border);display:none;}
.hist-expanded.open{display:block;}
.hist-exp-row{display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.hist-exp-row:last-child{border-bottom:none;}
.hist-exp-label{color:var(--text2);}
.hist-exp-value{font-weight:500;color:var(--text);}
.hist-actions{display:flex;gap:0;border-top:1px solid var(--border);}
.hist-action{flex:1;padding:12px;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.hist-action.edit{color:var(--accent);border-right:1px solid var(--border);}
.hist-action.del{color:var(--red);}

/* ── INSIGHTS tab ── */
.insight-preview{margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);padding:16px;opacity:.5;}
.insight-preview-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.insight-preview-body{font-size:12px;color:var(--text2);line-height:1.5;}
.insight-preview-badge{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-l);border-radius:20px;padding:2px 8px;display:inline-block;margin-bottom:8px;}
.insight-card{margin:0 16px 10px;background:var(--surface);border-radius:var(--r-lg);padding:16px;}
.insight-icon{font-size:24px;margin-bottom:8px;}
.insight-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.insight-body{font-size:13px;color:var(--text2);line-height:1.6;}
.hm-wrap{overflow-x:auto;padding-bottom:4px;}
.cons-row{display:flex;align-items:center;gap:16px;}
.ring-wrap{position:relative;width:70px;height:70px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-size:18px;font-weight:700;line-height:1;}
.ring-sub{font-size:9px;color:var(--text3);}
.dow-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.dow-lbl{font-size:12px;font-weight:500;color:var(--text2);width:28px;}
.dow-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.dow-fill{height:100%;border-radius:3px;}
.dow-val{font-size:12px;font-weight:600;width:32px;text-align:right;}
.ptabs{display:flex;gap:6px;padding:0 16px;margin-bottom:14px;}
.ptab{flex:1;padding:7px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text2);background:var(--surface);}
.ptab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 12px;}
.ps-card{background:var(--surface);border-radius:var(--r-lg);padding:14px;}
.ps-val{font-size:22px;font-weight:600;line-height:1;}
.ps-lbl{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}
.trend-wrap{height:90px;position:relative;margin:8px 0 4px;}

/* ── SETTINGS ── */
.settings-section{margin:0 16px 20px;}
.settings-header{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding:0 4px;}
.settings-body{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;}
.settings-row{padding:13px 16px;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:14px;color:var(--text2);margin-bottom:6px;}
.settings-slider-row{display:flex;align-items:center;gap:10px;}
.settings-slider-row input[type=range]{flex:1;accent-color:var(--accent);}
.settings-slider-val{font-size:15px;font-weight:600;color:var(--accent);min-width:42px;text-align:right;}
.settings-note{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.4;}

// ── Math ──────────────────────────────────────────────────────
function calcHrs(bed,wake,onset=15){
  let[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);
  let b=bh*60+bm+onset,w=wh*60+wm;
  if(w<=bh*60+bm)w+=1440;
  return Math.max(0,Math.round((w-b)/60*10)/10);
}
function eff(hrs,q=3,wu=0){return Math.round(Math.max(0,hrs*([0,.75,.85,1,1.05,1.1][q]||1)-wu*.15)*10)/10;}
function targetBed(){
  const[wh,wm]=S.wakeTime.split(':').map(Number);
  const m=((wh*60+wm-S.need*60)%1440+1440)%1440;
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;
}
function fmt(t){let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';if(h===0)h=12;else if(h>12)h-=12;return `${h}:${String(m).padStart(2,'0')}${ap}`;}
function fmtH(h){return `${h===0?12:h>12?h-12:h}${h<12?'am':'pm'}`;}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function yday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function tod(){return new Date().toISOString().slice(0,10);}
function bedDef(bed){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number);
  let[ah,am]=bed.split(':').map(Number),tM=th*60+tm,aM=ah*60+am;
  if(aM<720)aM+=1440;if(tM<720)tM+=1440;
  return Math.max(0,Math.round((aM-tM)/60*10)/10);
}
function recov(x){return x<=0?0:Math.round(Math.log(1+x*2)*.8*10)/10;}
function napCredit(date){return(S.naps||[]).filter(n=>n.date===date).reduce((s,n)=>s+n.mins/60*.55,0);}
function getDebt(){
  const r=S.log.slice(0,14);if(!r.length)return Math.round(S.startingDebt*10)/10;
  let net=S.startingDebt;
  r.forEach(e=>{const def=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(def>0)net+=def;else net-=recov(-def);});
  return Math.round(Math.max(0,net)*10)/10;
}
function getStreak(){let s=0;const t=new Date();for(let i=0;i<S.log.length;i++){if(Math.round((t-new Date(S.log[i].date+'T12:00:00'))/86400000)===i)s++;else break;}return s;}
function eLevel(nowH,wH){
  const e=(nowH-wH+24)%24,pi=Math.PI;let v;
  if(e<1.5)v=.3+(e/1.5)*.4;else if(e<5)v=.7+Math.sin((e-1.5)/3.5*pi)*.3;
  else if(e<7)v=1-(e-5)/2*.35;else if(e<9)v=.65+Math.sin((e-7)/2*pi)*.2;
  else if(e<11)v=.85-(e-9)/2*.3;else if(e<14)v=.55-(e-11)/3*.25;
  else v=Math.max(.1,.3-(e-14)*.03);
  return Math.max(.05,Math.min(1,v*Math.max(.6,1-getDebt()/30*.35)));
}
function bedAlert(){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number),n=new Date();
  let tM=th*60+tm,nM=n.getHours()*60+n.getMinutes();
  if(tM<720)tM+=1440;if(nM<720)nM+=1440;
  const d=tM-nM;return(d>0&&d<=180)?d:null;
}
function cdown(m){if(m<60)return m+'min';return `${Math.floor(m/60)}h${m%60?` ${m%60}min`:''}`.trim();}

// ── DEBT PAGE ─────────────────────────────────────────────────
function rDebt(){
  const debt=getDebt(),last=S.log[0]||null,streak=getStreak(),tb=targetBed();
  const mins=bedAlert();
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',month:'short',day:'numeric'});
  document.getElementById('streak-pill').textContent=streak>0?`${streak} day streak`:'Start logging';

  const dC=debt<5?'var(--green)':debt<10?'var(--amber)':'var(--red)';
  const dPct=Math.min(100,Math.round(debt/20*100));
  const arcLen=Math.round(dPct/100*175.9);
  const lEff=last?eff(last.hrs,last.quality||3,last.wakeups||0):null;
  const lDef=last?bedDef(last.bed):0;
  const qC=last?(last.quality>=4?'var(--green)':last.quality<=2?'var(--red)':'var(--amber)'):'var(--border2)';
  const qArc=last?Math.round((last.quality||3)/5*100):0;

  // Bedtime countdown
  const[th2,tm2]=tb.split(':').map(Number);
  const n2=new Date();let tM2=th2*60+tm2,nM2=n2.getHours()*60+n2.getMinutes();
  if(tM2<720)tM2+=1440;if(nM2<720)nM2+=1440;
  const bLeft=tM2-nM2;
  const bColor=bLeft<0?'var(--red)':bLeft<60?'var(--amber)':'var(--green)';
  const bBg=bLeft<0?'var(--red-l)':bLeft<60?'var(--amber-l)':'var(--green-l)';

  // Tip
  const[wh]=S.wakeTime.split(':').map(Number);
  const tip=TIPS[tipIdx%TIPS.length];
  const tipH=tip.h.replace('{cutoff}',fmtH((wh+10)%24)).replace('{bed}',fmt(tb)).replace('{need}',S.need+'h').replace('{peak}',fmtH(wh+2)+'–'+fmtH(wh+5));
  const tipB=tip.b;
  const tipDots=TIPS.map((_,i)=>`<div class="tip-dot${i===tipIdx%TIPS.length?' on':''}"></div>`).join('');

  // Goal
  let goalH='';
  if(S.goal&&S.goal.startDate){
    const elapsed=Math.max(0,Math.round((new Date()-new Date(S.goal.startDate))/86400000));
    const dLeft=Math.max(0,S.goal.targetDays-elapsed);
    const reduced=Math.max(0,S.goal.startDebt-debt);
    const targetR=S.goal.startDebt-S.goal.targetDebt;
    const pct=Math.min(100,targetR>0?Math.round(reduced/targetR*100):0);
    goalH=`<div class="goal-card">
      <div class="goal-header"><div class="goal-title">Debt goal</div><div class="goal-pct">${pct}%</div></div>
      <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
      <div class="goal-footer">
        <span>${S.goal.targetDebt}h target · ${dLeft} days left</span>
        <span style="color:var(--text2)">${debt>S.goal.targetDebt?`${debt}h → ${S.goal.targetDebt}h`:'🎉 Goal reached!'}</span>
      </div>
    </div>`;
  }

  document.getElementById('page-debt').innerHTML=
    (mins?`<div class="alert-banner" style="background:var(--accent-l);color:var(--accent)">🌙 Bedtime in ${cdown(mins)} — target ${fmt(tb)}</div>`:'')
    +`<div class="debt-card">
      <div class="debt-top-row">
        <div>
          <div class="debt-label">Total sleep debt</div>
          <div class="debt-number${debt<5?' green':debt<10?' amber':''}">${debt}</div>
          <div class="debt-unit">hours owed</div>
          <div class="safe-badge" style="margin-top:8px">Safe zone: under 5h</div>
        </div>
        <div class="arc-wrap">
          <svg width="70" height="70" viewBox="0 0 70 70">
            <circle cx="35" cy="35" r="28" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="7"/>
            <circle cx="35" cy="35" r="28" fill="none" stroke="${debt<5?'#1a9e45':debt<10?'#c47b00':'#d63230'}" stroke-width="7"
              stroke-dasharray="${arcLen} 175.9" stroke-linecap="round"/>
          </svg>
          <div class="arc-inner"><div class="arc-pct" style="color:${dC}">${dPct}%</div><div class="arc-sub">of max</div></div>
        </div>
      </div>
      <div class="debt-bar-track"><div class="debt-bar-fill" style="width:${Math.min(100,debt/20*100)}%;background:${dC}"></div></div>
      <div class="debt-meta-row">
        <div class="debt-meta-text">${S.need}h need · ${debt<5?'In safe zone':`${(debt-5).toFixed(1)}h above safe zone`}</div>
      </div>
    </div>

    <div class="ln-row">
      <div class="ln-card">
        <div class="ln-card-label">Last night</div>
        <div style="display:flex;align-items:center;gap:10px">
          <svg width="44" height="44" viewBox="0 0 44 44" style="flex-shrink:0">
            <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="4"/>
            ${last?`<circle cx="22" cy="22" r="18" fill="none" stroke="${last.quality>=4?'#1a9e45':last.quality<=2?'#d63230':'#c47b00'}" stroke-width="4" stroke-dasharray="${Math.round((last.quality||3)/5*113.1)} 113.1" stroke-linecap="round" transform="rotate(-90 22 22)"/>`:''}
          </svg>
          <div>
            <div class="ln-main-num" style="color:${last&&lEff>=S.need?'var(--green)':last&&lEff>=S.need*.8?'var(--amber)':'var(--red)'}">${last?lEff+'h':'—'}</div>
            <div class="ln-sub">${last?last.hrs+'h raw / '+S.need+'h need':''}</div>
          </div>
        </div>
      </div>
      <div class="bedtime-card">
        <div class="ln-card-label">Target bed</div>
        <div class="bedtime-time">${fmt(tb)}</div>
        <div class="bedtime-pill" style="background:${bBg};color:${bColor}">${bLeft>0?cdown(bLeft)+' away':bLeft===0?'Now':'Passed'}</div>
      </div>
    </div>

    ${last?`<div class="ln-detail-card">
      <div class="ln-detail-row"><span class="ln-detail-label">Slept at</span><span class="ln-detail-value">${fmt(last.bed)}</span></div>
      <div class="ln-detail-row"><span class="ln-detail-label">Woke at</span><span class="ln-detail-value">${fmt(last.wake)}</span></div>
      <div class="ln-detail-row"><span class="ln-detail-label">Bedtime</span><span class="ln-detail-value" style="color:${lDef>0?'var(--amber)':'var(--green)'}">${lDef>0?lDef+'h past target':'On time ✓'}</span></div>
      <div class="ln-detail-row"><span class="ln-detail-label">vs need</span><span class="ln-detail-value" style="color:${lEff>=S.need?'var(--green)':'var(--red)'}">${lEff>=S.need?'+':''}${Math.round((lEff-S.need)*10)/10}h ${lEff>=S.need?'surplus':'deficit'}</span></div>
      <div class="ln-detail-row"><span class="ln-detail-label">Quality</span><span class="ln-detail-value">${['','😵 Terrible','😩 Poor','😐 Okay','🙂 Good','⚡ Great'][last.quality||3]}</span></div>
      ${last.wakeups?`<div class="ln-detail-row"><span class="ln-detail-label">Woke up</span><span class="ln-detail-value">${last.wakeups}x</span></div>`:''}
      ${last.tags&&last.tags.length?`<div class="ln-detail-row"><span class="ln-detail-label">Tags</span><span class="ln-detail-value" style="color:var(--accent)">${last.tags.join(', ')}</span></div>`:''}
      ${last.note?`<div class="ln-detail-row"><span class="ln-detail-label">Note</span><span class="ln-detail-value" style="color:var(--text2);font-weight:400">"${last.note}"</span></div>`:''}
    </div>`:''}

    ${buildTimeline()}

    <div class="tip-card">
      <div class="tip-headline">${tipH}</div>
      <div class="tip-body">${tipB}</div>
      <div class="tip-footer">
        <div class="tip-dots">${tipDots}</div>
        <span class="tip-next-btn" onclick="tipIdx++;rDebt()">Next →</span>
      </div>
    </div>

    ${goalH}`;
}

function buildTimeline(){
  const[wh]=S.wakeTime.split(':').map(Number);
  const n=new Date(),nowH=n.getHours()+n.getMinutes()/60;
  const zones=[
    {label:'Rise',h:0,len:1.5,color:'#c7b8f5'},
    {label:'Focus',h:1.5,len:3.5,color:'#86efac'},
    {label:'Dip',h:5,len:2,color:'#fde68a'},
    {label:'Wind',h:7,len:2,color:'#93c5fd'},
    {label:'Peak',h:9,len:2,color:'#6ee7b7'},
    {label:'Down',h:11,len:5,color:'#fca5a5'},
  ];
  const elapsed=(nowH-wh+24)%24;
  const markerPct=Math.min(100,Math.max(0,elapsed/16*100));
  let curZone=zones[zones.length-1];
  for(const z of zones)if(elapsed>=z.h&&elapsed<z.h+z.len)curZone=z;
  const pills=zones.map(z=>`<div class="zpill" style="background:${z.color}20;color:${z.color.replace('86ef','16a3').replace('fde6','92400').replace('93c5','1e40').replace('6ee7','059669').replace('fca5','991b').replace('c7b8','5856d6')}">${fmtH((wh+z.h)%24)} ${z.label}</div>`).join('');

  return `<div class="energy-card">
    <div class="energy-header">
      <div class="energy-title">Energy today</div>
      <div class="energy-now" style="color:#5856d6">${curZone.label} now</div>
    </div>
    <div class="energy-sub">${fmtH(wh)} wake → ${fmtH((wh+16)%24)} wind-down</div>
    <div class="tl-strip">
      ${zones.map(z=>`<div class="tl-seg" style="flex:${z.len};background:${z.color}"></div>`).join('')}
      <div class="tl-marker" style="left:${markerPct}%"></div>
    </div>
    <div class="tl-labels">
      <span>${fmtH(wh)}</span><span>${fmtH((wh+4)%24)}</span><span>${fmtH((wh+8)%24)}</span><span>${fmtH((wh+12)%24)}</span><span>${fmtH((wh+16)%24)}</span>
    </div>
    <div class="zone-pills">${pills}</div>
  </div>`;
}

// ── TODAY PAGE ────────────────────────────────────────────────
function rToday(){
  const last=S.log[0]||null,[wh]=S.wakeTime.split(':').map(Number);
  const td=tod(),ci=S.checkins?.find(c=>c.date===td);
  const now=new Date(),isMorn=now.getHours()>=6&&now.getHours()<=11;

  let ciH='';
  if(isMorn&&!ci){
    ciH=`<div class="mood-card">
      <div style="font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Morning check-in</div>
      <div style="font-size:14px;color:var(--text2)">How are you feeling today?</div>
      <div class="mood-row">${['😵','😩','😐','🙂','⚡'].map((e,i)=>`<button class="mbtn" onclick="logMood(${i+1},'${e}')">${e}</button>`).join('')}</div>
    </div>`;
  }else if(ci){
    ciH=`<div class="mood-card"><div style="font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Today's mood</div><div style="font-size:28px">${ci.emoji}</div></div>`;
  }

  if(!last){
    document.getElementById('page-today').innerHTML=ciH+`<div style="margin:0 16px;background:var(--surface);border-radius:var(--r-xl);padding:32px 20px;text-align:center">
      <div style="font-size:44px;margin-bottom:14px">🌙</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Log last night first</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6">Your day plan appears here after logging sleep.</div>
      <button class="primary-btn" style="width:auto;padding:12px 24px" onclick="go('log',document.querySelectorAll('.nav-item')[2])">Log sleep →</button>
    </div>`;
    return;
  }

  const ef=eff(last.hrs,last.quality||3,last.wakeups||0),need=S.need,def=need-ef;
  let dtype,dc,dbg,dsum;
  if(def<=0){dtype='Well rested';dc='var(--green)';dbg='var(--green-l)';dsum=`${ef}h effective — at your need. Sharp, focused day ahead.`;}
  else if(def<1.5){dtype='Mildly short';dc='var(--amber)';dbg='var(--amber-l)';dsum=`${def.toFixed(1)}h short. Mostly fine, dip expected around ${fmtH((wh+7)%24)}.`;}
  else if(def<3){dtype='Underslept';dc='var(--amber)';dbg='var(--amber-l)';dsum=`${def.toFixed(1)}h short. Expect some fog and slower reactions.`;}
  else{dtype='Significantly short';dc='var(--red)';dbg='var(--red-l)';dsum=`${def.toFixed(1)}h short. Protect your schedule today.`;}

  const zones=[
    {start:wh+2,end:wh+5,color:def<1.5?'#86efac':'#fde68a',tc:def<1.5?'#065f46':'#78350f',label:'Focus',desc:def<1.5?'Best focus window. Deep work, hard decisions, creative tasks.':'Energy reduced. Do your most important task early before it drops further.'},
    {start:wh+6,end:wh+8,color:def>=1.5?'#fca5a5':'#ddd6fe',tc:def>=1.5?'#7f1d1d':'#3b0764',label:'Dip',desc:def>=1.5?'Post-lunch crash is harder today. Avoid critical decisions.':'Natural dip. Emails, admin, routine tasks.'},
    {start:wh+8,end:wh+10,color:def<3?'#93c5fd':'#fde68a',tc:def<3?'#1e3a5f':'#78350f',label:'Second wind',desc:def<3?'Second wind. Meetings, calls, collaborative work.':'Second wind blunted. Light tasks only.'},
    {start:wh+11,end:wh+14,color:'#ddd6fe',tc:'#3b0764',label:'Wind-down',desc:'Energy dropping. Begin winding down. Dim screens.'},
  ];

  const napRec=def>=3?{icon:'💤',text:`Nap recommended — ${fmtH((wh+6)%24)} to ${fmtH((wh+8)%24)}`,bg:'var(--red-l)',bc:'var(--red)'}
    :def>=1.5?{icon:'💤',text:`Optional nap before ${fmtH((wh+8)%24)}`,bg:'var(--amber-l)',bc:'var(--amber)'}
    :{icon:'✓',text:'No nap needed — good to go',bg:'var(--green-l)',bc:'var(--green)'};

  const tb=targetBed();
  const[th,tm]=tb.split(':').map(Number);
  const nw=new Date();let tM=th*60+tm,nM=nw.getHours()*60+nw.getMinutes();
  if(tM<720)tM+=1440;if(nM<720)nM+=1440;
  const mLeft=tM-nM;

  window._zones=zones;

  document.getElementById('page-today').innerHTML=ciH+`
    <div class="day-hero">
      <div class="day-badge" style="background:${dbg};color:${dc}">${dtype}</div>
      <div class="day-type" style="color:${dc}">${ef}h <span style="font-size:16px;font-weight:400;color:var(--text2)">/ ${need}h</span></div>
      <div class="day-hrs">${def<=0?'At your sleep need':def.toFixed(1)+'h below your need'}</div>
      <div class="day-summary">${dsum}</div>
    </div>

    <div class="vt-card">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">Your day — tap a zone</div>
      <div class="vt-strip" id="vt">
        ${zones.map((z,i)=>`<div class="vt-seg" style="flex:${z.end-z.start};background:${z.color};color:${z.tc}" onclick="showZone(${i})">${z.label}</div>`).join('')}
      </div>
      <div class="vt-detail" id="vtd">Tap a zone to see what to focus on during that time.</div>
    </div>

    <div class="pills-row">
      <div class="pill-card"><div class="pill-val">${fmtH((wh+10)%24)}</div><div class="pill-lbl">Last coffee</div></div>
      <div class="pill-card"><div class="pill-val">${fmt(tb)}</div><div class="pill-lbl">Target bed</div></div>
      <div class="pill-card"><div class="pill-val" style="color:${mLeft>0?'var(--text)':'var(--red)'}">${mLeft>0?cdown(mLeft):'Now'}</div><div class="pill-lbl">Bed in</div></div>
    </div>

    <div class="nap-row" style="background:${napRec.bg};color:${napRec.bc}">
      <span style="font-size:18px">${napRec.icon}</span>
      <span style="font-size:14px;font-weight:500">${napRec.text}</span>
    </div>

    <div style="margin:0 16px 12px;background:var(--surface);border-radius:var(--r-lg);padding:14px 16px;">
      <div style="font-size:13px;color:var(--text2);line-height:1.7">
        Tonight: <strong>${fmt(tb)}</strong> for your full ${need}h.
        ${def>=2?' Short night today — prioritise hitting this.':' Keep the rhythm.'}
        ${mLeft>0&&mLeft<90?`<br><span style="color:var(--accent);font-weight:500">That's ${cdown(mLeft)} away. Start winding down soon.</span>`:''}
      </div>
    </div>`;
}

function showZone(i){
  const z=window._zones[i];
  const d=document.getElementById('vtd');
  if(d){
    d.innerHTML=`<strong style="color:${z.tc}">${fmtH(z.start%24)} – ${fmtH(z.end%24)} · ${z.label}</strong><br>${z.desc}`;
    d.style.borderLeftColor=z.color;

}

function logMood(score,emoji){
  const td=tod();if(!S.checkins)S.checkins=[];

function toggleAdv(){

}

function toggleNap(){

  const open=s.style.display==='block';
  s.style.display=open?'none':'block';
  b.style.display=open?'block':'none';
}

function setQ(v,el){lq=v;document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');updPrev();}
function setWU(v,el){lwu=v;document.querySelectorAll('.wbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');updPrev();}
function toggleTag(t,el){if(ltags.includes(t)){ltags=ltags.filter(x=>x!==t);el.classList.remove('sel');}else{ltags.push(t);el.classList.add('sel');}}

function updPrev(){
  const bed=document.getElementById('lb')?.value,wake=document.getElementById('lw')?.value;
  const onset=parseInt(document.getElementById('lo')?.value||15),date=document.getElementById('log-date')?.value;
  if(!bed||!wake)return;
  const raw=calcHrs(bed,wake,onset),ef2=eff(raw,lq,lwu),bd=bedDef(bed),tb=targetBed();
  const ex=S.log.find(e=>e.date===date);
  const el=document.getElementById('prev');
  if(el)el.innerHTML=`${raw.toFixed(1)}h raw · <strong>${ef2.toFixed(1)}h effective</strong> &nbsp;·&nbsp; <span style="color:${bd>0?'var(--amber)':'var(--green)'}">${bd>0?`${bd}h past target ${fmt(tb)}`:'Bedtime on target ✓'}</span>${ex?` &nbsp;·&nbsp; <span style="color:var(--accent)">Updates ${fmtDate(date)}</span>`:''}`;
}

function doLog(){
  const bed=document.getElementById('lb').value,wake=document.getElementById('lw').value;
  const onset=parseInt(document.getElementById('lo')?.value||15),date=document.getElementById('log-date').value;
  const note=document.getElementById('log-note').value.trim();
  const hrs=calcHrs(bed,wake,onset);
  if(hrs<1||hrs>16){alert('Check your times');return;}
  S.log=S.log.filter(e=>e.date!==date);
  S.log.push({date,bed,wake,hrs,onset,quality:lq,wakeups:lwu,tags:[...ltags],note});
  S.log.sort((a,b)=>b.date.localeCompare(a.date));
  if(S.log.length>365)S.log=S.log.slice(0,365);
  saveFS();go('today',document.querySelectorAll('.nav-item')[1]);
}

function doNap(){
  const start=document.getElementById('ns').value,mins=parseInt(document.getElementById('nd').value),date=document.getElementById('nap-date').value;
  if(!S.naps)S.naps=[];
  S.naps.push({date,start,mins});
  saveFS();showToast('Nap saved ✓');toggleNap();
}

function delEntry(date){if(!confirm(`Delete entry for ${fmtDate(date)}?`))return;S.log=S.log.filter(e=>e.date!==date);saveFS();rLog();}

// ── INSIGHTS PAGE ─────────────────────────────────────────────
function rInsights(){
  const pl=getPL(insPeriod),effs=pl.map(e=>eff(e.hrs,e.quality||3,e.wakeups||0));
  const hasData=S.log.length>=3;
  const avg=effs.length?Math.round(effs.reduce((s,v)=>s+v,0)/effs.length*10)/10:0;
  const best=effs.length?Math.max(...effs):0,worst=effs.length?Math.min(...effs):0;
  const cons=calcCons(S.log.slice(0,30));
  const ins=hasData?genInsights():[];

  const previews=[
    {icon:'📅',title:'Best & worst sleep days',body:'Discover which days of the week you consistently sleep best and worst.',needs:7},
    {icon:'🔗',title:'Mood vs sleep correlation',body:'See how your morning mood scores track with your effective sleep hours.',needs:14},
    {icon:'🏷️',title:'Tag impact analysis',body:'Find out how alcohol, stress, cinema and other tags affect your sleep.',needs:10},
    {icon:'⏰',title:'Bedtime consistency score',body:'Track how consistent your bedtimes are over time.',needs:5},
  ];

  document.getElementById('page-insights').innerHTML=`
    <div class="ptabs">${['week','month','year','all'].map(p=>`<div class="ptab${insPeriod===p?' on':''}" onclick="setP('${p}')">${p==='all'?'All':p.charAt(0).toUpperCase()+p.slice(1)}</div>`).join('')}</div>

    ${hasData?`<div class="ps-grid">
      <div class="ps-card"><div class="ps-val" style="color:${avg>=S.need?'var(--green)':'var(--red)'}">${avg}h</div><div class="ps-lbl">Avg effective</div></div>
      <div class="ps-card"><div class="ps-val">${pl.length}</div><div class="ps-lbl">Nights logged</div></div>
      <div class="ps-card"><div class="ps-val" style="color:var(--green)">${best}h</div><div class="ps-lbl">Best night</div></div>
      <div class="ps-card"><div class="ps-val" style="color:var(--red)">${worst}h</div><div class="ps-lbl">Worst night</div></div>
    </div>`:``}

    <div class="insight-card">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Sleep heatmap</div>
      <div id="hm"></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--text3);flex-wrap:wrap">
        <span>Less</span>${['#e5e7eb','#fca5a5','#fde68a','#86efac','#1a9e45'].map(c=>`<div style="width:11px;height:11px;border-radius:2px;background:${c}"></div>`).join('')}<span>More</span><span style="margin-left:4px;color:var(--text3)">vs ${S.need}h need</span>
      </div>
    </div>

    <div class="insight-card">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Bedtime consistency</div>
      <div class="cons-row">
        <div class="ring-wrap">
          <svg width="70" height="70" viewBox="0 0 70 70"><circle cx="35" cy="35" r="28" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="6"/><circle cx="35" cy="35" r="28" fill="none" stroke="${cons>=80?'#1a9e45':cons>=60?'#c47b00':'#d63230'}" stroke-width="6" stroke-dasharray="${Math.round(cons/100*175.9)} 175.9" stroke-linecap="round"/></svg>
          <div class="ring-inner"><div class="ring-num" style="color:${cons>=80?'var(--green)':cons>=60?'var(--amber)':'var(--red)'}">${cons}</div><div class="ring-sub">/ 100</div></div>
        </div>
        <div>
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">${cons>=80?'Very consistent':cons>=60?'Fairly consistent':'Inconsistent'}</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.5">Consistent bedtimes improve sleep quality even when total hours stay the same.</div>
        </div>
      </div>
    </div>

    ${hasData?`<div class="insight-card">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Sleep by day of week</div>
      <div id="dow"></div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">avg effective · need: ${S.need}h</div>
    </div>
    <div class="insight-card">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Debt trend</div>
      <div class="trend-wrap"><canvas id="tc"></canvas></div>
    </div>`:''}

    ${ins.length?ins.map(i=>`<div class="insight-card">
      <div class="insight-icon">${i.icon}</div>
      <div class="insight-title">${i.title}</div>
      <div class="insight-body">${i.body}</div>
    </div>`).join(''):''}

    ${!hasData||ins.length<previews.length?`<div class="insight-card" style="margin-top:4px">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Unlocking soon</div>
      ${previews.filter(p=>S.log.length<p.needs).map(p=>`<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:20px;flex-shrink:0;opacity:.4">${p.icon}</span>
        <div style="opacity:.5">
          <div style="font-size:14px;font-weight:600;margin-bottom:3px">${p.title}</div>
          <div style="font-size:12px;color:var(--text2);line-height:1.5">${p.body}</div>
          <div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:600">Needs ${p.needs} nights · you have ${S.log.length}</div>
        </div>
      </div>`).join('')}
    </div>`:''}

    <div class="insight-card">
      <div style="font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Projection</div>
      <div id="proj"></div>
    </div>

    <button class="secondary-btn" onclick="doExport()" style="margin-bottom:20px">Export data as CSV</button>`;

  buildHM();
  if(hasData){buildDOW();buildTrend(pl);}
  buildProj();
}

function setP(p){insPeriod=p;rInsights();}

function getPL(period){
  const now=new Date(),c=new Date(now);
  if(period==='week')c.setDate(c.getDate()-7);
  else if(period==='month')c.setDate(c.getDate()-30);
  else if(period==='year')c.setFullYear(c.getFullYear()-1);
  else return S.log;
  return S.log.filter(e=>new Date(e.date+'T12:00:00')>=c);
}

function calcCons(logs){
  if(logs.length<3)return 0;
  const mins=logs.map(e=>{let[h,m]=e.bed.split(':').map(Number),v=h*60+m;if(v<720)v+=1440;return v;});
  const mean=mins.reduce((s,v)=>s+v,0)/mins.length;
  const std=Math.sqrt(mins.reduce((s,v)=>s+(v-mean)**2,0)/mins.length);
  return Math.max(0,Math.round(100-std/.9));
}

function buildHM(){
  const c=document.getElementById('hm');if(!c)return;
  const lm={};S.log.forEach(e=>{lm[e.date]=eff(e.hrs,e.quality||3,e.wakeups||0);});
  const now=new Date(),start=new Date(now);
  start.setDate(start.getDate()-111);start.setDate(start.getDate()-start.getDay());
  const weeks=[];let cur=new Date(start);
  while(cur<=now){const w=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);w.push({date:ds,ef:lm[ds]??null});cur.setDate(cur.getDate()+1);}weeks.push(w);}
  function cc(ef2){if(ef2===null)return '#e5e7eb';const r=ef2/S.need;return r>=1?'#1a9e45':r>=.85?'#86efac':r>=.7?'#fde68a':r>=.5?'#fca5a5':'#ef4444';}
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],days=['S','M','T','W','T','F','S'];
  let mH='<div style="display:flex;margin-left:22px;margin-bottom:3px;gap:3px">',lastM=-1;
  weeks.forEach(w=>{const d=new Date(w[0].date+'T12:00:00');if(d.getMonth()!==lastM){mH+=`<div style="font-size:9px;color:var(--text3);font-weight:500;min-width:13px">${months[d.getMonth()]}</div>`;lastM=d.getMonth();}else{mH+='<div style="min-width:13px"></div>';}});
  mH+='</div>';
  let gH=`<div style="display:flex;gap:3px;overflow-x:auto"><div style="display:flex;flex-direction:column;gap:3px;margin-right:3px">${days.map(d=>`<div style="font-size:9px;color:var(--text3);height:13px;display:flex;align-items:center">${d}</div>`).join('')}</div>`;
  weeks.forEach(w=>{gH+='<div style="display:flex;flex-direction:column;gap:3px">';w.forEach(day=>{gH+=`<div style="width:13px;height:13px;border-radius:2px;background:${cc(day.ef)};flex-shrink:0" title="${day.ef!==null?day.date+': '+day.ef+'h':day.date}"></div>`;});gH+='</div>';});
  gH+='</div>';
  c.innerHTML=mH+gH;
}

function buildDOW(){
  const el=document.getElementById('dow');if(!el)return;
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],b=Array(7).fill(null).map(()=>[]);
  S.log.forEach(e=>{b[new Date(e.date+'T12:00:00').getDay()].push(eff(e.hrs,e.quality||3,e.wakeups||0));});
  const avgs=b.map(x=>x.length?Math.round(x.reduce((s,v)=>s+v,0)/x.length*10)/10:null);
  const maxA=Math.max(...avgs.filter(v=>v!==null),S.need+1);
  el.innerHTML=dn.map((d,i)=>{
    if(avgs[i]===null)return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"></div><div class="dow-val" style="color:var(--text3)">—</div></div>`;
    const pct=Math.round(avgs[i]/maxA*100),c=avgs[i]>=S.need?'#1a9e45':avgs[i]>=S.need*.85?'#c47b00':'#d63230';
    return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"><div class="dow-fill" style="width:${pct}%;background:${c}"></div></div><div class="dow-val" style="color:${c}">${avgs[i]}h</div></div>`;
  }).join('');
}

function buildTrend(logs){
  const c=document.getElementById('tc');if(!c)return;
  const sorted=[...S.log].sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<2)return;
  let net=S.startingDebt;const dm={};
  sorted.forEach(e=>{const def=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(def>0)net+=def;else net-=recov(-def);net=Math.max(0,net);dm[e.date]=Math.round(net*10)/10;});
  const recent=sorted.slice(-30);
  if(tChart)tChart.destroy();
  tChart=new Chart(c,{type:'line',data:{labels:recent.map(e=>new Date(e.date+'T12:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'})),datasets:[{data:recent.map(e=>dm[e.date]||0),borderColor:'#007aff',backgroundColor:'rgba(0,122,255,.06)',fill:true,tension:.3,pointRadius:2,borderWidth:2,pointBackgroundColor:'#007aff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}h debt`}}},
      scales:{x:{ticks:{color:'rgba(60,60,67,.36)',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},y:{min:0,ticks:{color:'rgba(60,60,67,.36)',font:{size:10}},grid:{color:'rgba(60,60,67,.08)'},border:{display:false}}}}});
}

function buildProj(){
  const el=document.getElementById('proj');if(!el)return;
  const debt=getDebt();
  const recent=S.log.slice(0,7);
  // Calculate actual average effective sleep from recent logs
  const avgEff=recent.length?recent.map(e=>eff(e.hrs,e.quality||3,e.wakeups||0)).reduce((s,v)=>s+v,0)/recent.length:S.need-2;
  // Nightly delta: positive = recovering, negative = building debt
  const nightly=Math.round((avgEff-S.need)*10)/10;
  let running=debt;
  const note=nightly>=0?`Recovering ${nightly}h/night avg`:`Adding ${Math.abs(nightly)}h debt/night avg`;
  el.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${note}</div>`+
  ['Week 2','Week 3','Week 4','Month 2','Month 3'].map((w,i)=>{
    // Don't clamp to 0 — show actual trajectory
    const delta=nightly*(i<3?7:28);
    running=Math.max(0,running+delta);
    const rv=Math.round(running*10)/10,clr=rv<5?'var(--green)':rv<10?'var(--amber)':'var(--red)';
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px"><span style="color:var(--text2)">${w}</span><span style="font-weight:600;color:${clr}">${rv}h debt</span></div>`;
  }).join('')+'<div style="font-size:12px;color:var(--text3);margin-top:8px">Based on your recent average of ${avg2}h/night</div>'.replace('${avg2}',avg2);
}

function genInsights(){
  const ins=[];if(S.log.length<7)return ins;
  const ae=S.log.map(e=>({...e,ef:eff(e.hrs,e.quality||3,e.wakeups||0)}));
  const bkts=Array(7).fill(null).map(()=>[]);
  ae.forEach(e=>{bkts[new Date(e.date+'T12:00:00').getDay()].push(e.ef);});
  const avgs=bkts.map(b=>b.length>=2?b.reduce((s,v)=>s+v,0)/b.length:null);
  const valid=avgs.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(valid.length>=3){
    const worst=valid.reduce((a,b)=>a.v<b.v?a:b),best=valid.reduce((a,b)=>a.v>b.v?a:b);
    if(worst.v<S.need-.5)ins.push({icon:'📉',title:`${dn[worst.i]}s — your worst nights`,body:`You average ${Math.round(worst.v*10)/10}h, which is ${Math.round((S.need-worst.v)*10)/10}h below your need. Consider what's different about that night.`});
    if(best.v>=S.need-.3)ins.push({icon:'🏆',title:`${dn[best.i]}s — your best nights`,body:`You average ${Math.round(best.v*10)/10}h. Whatever you do differently that night is worth protecting.`});
  }
  const md=S.checkins?.length>=5?S.checkins:[];
  if(md.length>=5){
    const pairs=[];md.forEach(ci=>{const prev=S.log.find(e=>e.date===ci.date);if(prev)pairs.push({mood:ci.score,ef:eff(prev.hrs,prev.quality||3,prev.wakeups||0)});});
    if(pairs.length>=5){
      const hi=pairs.filter(p=>p.ef>=S.need-.5),lo=pairs.filter(p=>p.ef<S.need-1);
      if(hi.length>=2&&lo.length>=2){
        const hm=Math.round(hi.reduce((s,p)=>s+p.mood,0)/hi.length*10)/10,lm=Math.round(lo.reduce((s,p)=>s+p.mood,0)/lo.length*10)/10;
        const mE=['','😵','😩','😐','🙂','⚡'];
        if(hm>lm+.5)ins.push({icon:'🔗',title:'Your mood tracks your sleep',body:`Well-slept days you feel ${mE[Math.round(hm)]} (${hm}/5). After short nights it drops to ${mE[Math.round(lm)]} (${lm}/5). The correlation is real.`});
      }
    }
  }
  const we=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;});
  const wd=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  if(we.length>=3&&wd.length>=5){
    const weA=Math.round(we.reduce((s,e)=>s+e.ef,0)/we.length*10)/10,wdA=Math.round(wd.reduce((s,e)=>s+e.ef,0)/wd.length*10)/10;
    if(weA>wdA+.5)ins.push({icon:'📅',title:`${Math.round((weA-wdA)*10)/10}h more sleep on weekends`,body:`Weekdays: ${wdA}h avg. Weekends: ${weA}h avg. You're recovering on weekends — which helps, but consistent weekday sleep prevents the debt from building.`});
  }
  const tc=calcCons(S.log.slice(0,30));
  if(tc<60)ins.push({icon:'⏰',title:'Inconsistent bedtimes',body:`Consistency score: ${tc}/100. Irregular timing disrupts your circadian rhythm even when total hours look fine.`});
  const tagC={};ae.forEach(e=>{(e.tags||[]).forEach(t=>{if(!tagC[t])tagC[t]={count:0,effs:[]};tagC[t].count++;tagC[t].effs.push(e.ef);});});
  const allA=Math.round(ae.reduce((s,e)=>s+e.ef,0)/ae.length*10)/10;
  Object.entries(tagC).forEach(([tag,data])=>{if(data.count>=3){const tA=Math.round(data.effs.reduce((s,v)=>s+v,0)/data.effs.length*10)/10;if(tA<allA-.5)ins.push({icon:'🏷️',title:`${tag} nights average ${tA}h`,body:`That's ${Math.round((allA-tA)*10)/10}h less than your overall average of ${allA}h. Worth being aware of.`});}});
  return ins.slice(0,6);
}

        <div class="settings-row">
          <div class="settings-row-label">Sleep need</div>

          <div class="settings-note">Your Rise-calculated need: 9.5h</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Wake time</div>
          <input type="time" value="${S.wakeTime}" class="settings-time" oninput="S.wakeTime=this.value;saveFS();">
        </div>

    <div class="settings-section">
      <div class="settings-header">Starting debt</div>

        <div class="settings-row">
          <div class="settings-row-label">Baseline debt</div>

            <button class="s-btn" onclick="S.startingDebt=12.5;saveFS();rSettings()">Set to 12.5h</button>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-header">Debt goal</div>

        <div class="settings-row">
          <div class="settings-row-label">Target debt</div>
          <div class="settings-slider-row"><input type="range" min="0" max="10" step="0.5" value="${S.goal?.targetDebt||5}" oninput="document.getElementById('gd').textContent=this.value+'h'"><div class="settings-slider-val" id="gd">${S.goal?.targetDebt||5}h</div></div>
          <div class="settings-note">Safe zone is under 5h. Under 2h is optimal.</div>

        </div>
      </div>

    </div>

    <div class="settings-section">
      <div class="settings-header">Account</div>
      <div class="settings-body">
        <div class="settings-row">
          <div style="font-size:15px">${CU?.email||''}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:4px">Signed in · data syncs across devices</div>
        </div>
      </div>
      <button class="secondary-btn destructive-btn" style="margin-top:8px" onclick="doSignOut()">Sign out</button>
    </div>

    <div class="settings-section">
      <div class="settings-header">Data</div>
      <div class="settings-body">
        <div class="settings-row">
          <div style="font-size:15px;color:var(--red);cursor:pointer" onclick="clearAll()">Delete all data</div>
          <div style="font-size:13px;color:var(--text3);margin-top:4px">Permanently removes all sleep logs</div>
        </div>
      </div>
    </div>`;
}

function setGoal(){
  const tD=parseFloat(document.getElementById('gd').textContent)||5;
  const tDays=parseInt(document.getElementById('gdays').textContent)||60;
  S.goal={targetDebt:tD,targetDays:tDays,startDate:tod(),startDebt:getDebt()};
  saveFS();showToast('Goal set ✓');rSettings();
}
function lv(key,val,id,sfx){S[key]=parseFloat(val);const el=document.getElementById(id);if(el)el.textContent=parseFloat(val).toFixed(1).replace('.0','')+sfx;saveFS();}
async function clearAll(){if(!confirm('Permanently delete all Somnus data?'))return;S.log=[];S.naps=[];S.checkins=[];S.startingDebt=12.5;S.goal={targetDebt:5,targetDays:60,startDate:null,startDebt:null};await uDoc().set(S);rDebt();}
function doExport(){
  if(!S.log.length){alert('No data');return;}
  const rows=['Date,Bedtime,Wake,Onset,Raw(h),Quality,Wakeups,Tags,Note,Effective(h),Deficit(h)'];
  S.log.forEach(e=>{const ef2=eff(e.hrs,e.quality||3,e.wakeups||0);rows.push(`${e.date},${e.bed},${e.wake},${e.onset||15},${e.hrs},${e.quality||3},${e.wakeups||0},"${(e.tags||[]).join(';')}","${e.note||''}",${ef2},${Math.round((S.need-ef2)*10)/10}`);});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='somnus.csv';a.click();
}
