<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Somnus">
<title>Somnus — Sleep Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
:root {
  --bg: #000000;
  --bg2: #111111;
  --bg3: #1c1c1e;
  --bg4: #2c2c2e;
  --surface: rgba(255,255,255,0.06);
  --surface2: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.16);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.30);
  --green: #30d158;
  --green-l: rgba(48,209,88,0.15);
  --amber: #ff9f0a;
  --amber-l: rgba(255,159,10,0.15);
  --red: #ff453a;
  --red-l: rgba(255,69,58,0.15);
  --blue: #0a84ff;
  --purple: #bf5af2;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  background: #000;
  position: relative;
  overflow-x: hidden;
}

/* Gradient background */
.gradient-bg {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 430px;
  height: 100vh;
  z-index: 0;
  pointer-events: none;
  transition: background 1.2s ease;
}
.content-layer {
  position: relative;
  z-index: 1;
  padding-top: var(--safe-top);
  padding-bottom: calc(100px + var(--safe-bottom));
}

/* ── Loading ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; background: #000;
}
.spinner {
  width: 26px; height: 26px;
  border: 2px solid rgba(255,255,255,0.12);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Auth ── */
#auth-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 24px; text-align: center;
  padding-top: calc(40px + var(--safe-top));
}
.auth-moon { font-size: 60px; margin-bottom: 20px; }
.auth-logo { font-size: 34px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
.auth-logo span { color: var(--green); }
.auth-tag { font-size: 15px; color: var(--text2); margin-bottom: 36px; line-height: 1.6; }
.auth-field {
  width: 100%; max-width: 320px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 14px;
  padding: 14px 16px; font-size: 16px;
  font-family: inherit; color: #fff; outline: none; margin-bottom: 10px;
  transition: border .15s;
}
.auth-field:focus { border-color: rgba(255,255,255,0.4); }
.auth-field::placeholder { color: var(--text3); }
#auth-error { font-size: 13px; color: var(--red); margin-bottom: 10px; max-width: 320px; display: none; }
.auth-btn-p {
  width: 100%; max-width: 320px; background: #fff; color: #000;
  border: none; border-radius: 14px; padding: 15px;
  font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 10px;
  transition: opacity .15s;
}
.auth-btn-p:active { opacity: .8; }
.auth-btn-s {
  width: 100%; max-width: 320px; background: transparent; color: #fff;
  border: 1px solid var(--border2); border-radius: 14px; padding: 14px;
  font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.auth-note { font-size: 12px; color: var(--text3); margin-top: 16px; line-height: 1.5; max-width: 280px; }

/* ── Header ── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px 8px;
}
.logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.logo-dot { color: var(--green); }
.header-right { display: flex; align-items: center; gap: 8px; }
.streak-pill {
  font-size: 11px; font-weight: 600; color: var(--green);
  background: var(--green-l); border-radius: 20px; padding: 4px 10px;
  border: 1px solid rgba(48,209,88,0.25);
}
.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; color: var(--text2);
  transition: background .15s;
}
.icon-btn:active { background: rgba(255,255,255,0.15); }

/* ── Quick log pills ── */
.ql-bar {
  padding: 0 20px 12px;
  display: flex; gap: 8px;
}
.ql-pill {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 14px; border-radius: 22px; border: 1px solid;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.ql-pill:active { transform: scale(.97); }
.ql-pill-bed {
  background: rgba(191,90,242,0.12); border-color: rgba(191,90,242,0.25); color: var(--purple);
}
.ql-pill-wake {
  background: rgba(255,214,10,0.10); border-color: rgba(255,214,10,0.25); color: #ffd60a;
}
.ql-pill-done {
  background: rgba(48,209,88,0.10); border-color: rgba(48,209,88,0.25); color: var(--green);
}
.ql-pill-edit {
  font-size: 11px; opacity: .8;
}

/* ── Floating pill nav ── */
.nav {
  position: fixed;
  bottom: calc(12px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 390px;
  background: rgba(20,20,20,0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 36px; display: flex; padding: 6px; z-index: 100;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.05);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; cursor: pointer; padding: 8px 4px;
  border-radius: 28px; transition: background .2s;
}
.nav-item.active { background: rgba(255,255,255,0.12); }
.nav-icon { font-size: 18px; color: var(--text3); line-height: 1; transition: color .15s; }
.nav-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: .02em; transition: color .15s; }
.nav-item.active .nav-icon, .nav-item.active .nav-label { color: #fff; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Section ── */
.sec { margin-bottom: 28px; }
.sec-label {
  font-size: 13px; font-weight: 600; color: var(--text3);
  padding: 0 20px; margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: .06em;
}

/* ── Hero debt ── */
.debt-hero { padding: 8px 20px 24px; }
.debt-status { font-size: 13px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 4px; }
.debt-num { font-size: 100px; font-weight: 700; line-height: .9; letter-spacing: -5px; }
.debt-unit { font-size: 17px; font-weight: 400; color: var(--text2); margin-top: 6px; margin-bottom: 18px; }
.debt-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.debt-bar-fill { height: 100%; border-radius: 2px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.debt-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center; }
.debt-meta-item { font-size: 13px; color: var(--text2); }
.safe-badge {
  font-size: 11px; font-weight: 600; color: var(--green);
  background: var(--green-l); border: 1px solid rgba(48,209,88,0.2);
  border-radius: 20px; padding: 3px 10px;
}

/* ── 2-col strip ── */
.strip {
  margin: 0 20px 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.strip-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 16px; padding: 14px;
}
.strip-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.strip-val { font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -.03em; }
.strip-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* ── Detail rows ── */
.d-rows { margin: 0 20px 20px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.d-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.d-row:last-child { border-bottom: none; }
.d-label { font-size: 14px; color: var(--text2); }
.d-val { font-size: 14px; font-weight: 600; }

/* ── Energy timeline ── */
.energy-wrap { margin: 0 20px 20px; }
.tl-row { display: flex; gap: 2px; height: 8px; border-radius: 4px; overflow: hidden; position: relative; margin: 8px 0; }
.tl-seg { height: 100%; }
.tl-now { position: absolute; top: -2px; bottom: -2px; width: 2px; background: #fff; border-radius: 1px; box-shadow: 0 0 6px rgba(255,255,255,.6); }
.zone-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.zone-pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid; }

/* ── Tip card ── */
.tip-wrap { margin: 0 20px 20px; }
.tip-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
.tip-head { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
.tip-body { font-size: 13px; color: var(--text2); line-height: 1.55; }
.tip-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.tip-dots { display: flex; gap: 4px; }
.tip-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); }
.tip-dot.on { background: #fff; }
.tip-next { font-size: 12px; color: var(--text3); cursor: pointer; font-weight: 500; }

/* ── Goal card ── */
.goal-wrap { margin: 0 20px 20px; }
.goal-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
.goal-top { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.goal-arc-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
.goal-arc-wrap svg { transform: rotate(-90deg); }
.goal-arc-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.goal-arc-pct { font-size: 16px; font-weight: 700; line-height: 1; }
.goal-arc-sub { font-size: 9px; color: var(--text3); margin-top: 1px; }
.goal-info { flex: 1; }
.goal-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.goal-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }
.goal-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); padding-top: 10px; border-top: 1px solid var(--border); }

/* ── Alert ── */
.alert-bar { margin: 0 20px 14px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 10px; }

/* ── TODAY TAB ── */
.plan-hero { padding: 0 20px 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.plan-type { font-size: 32px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 4px; }
.plan-sub { font-size: 14px; color: var(--text2); line-height: 1.6; }

.vt-wrap { margin: 0 20px 20px; }
.vt-strip { height: 40px; display: flex; border-radius: 12px; overflow: hidden; cursor: pointer; margin: 10px 0 8px; }
.vt-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
.vt-detail { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: var(--text2); line-height: 1.5; min-height: 48px; }

.pills-row { display: flex; gap: 8px; margin: 0 20px 20px; }
.pill-box { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; text-align: center; }
.pill-val { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.pill-lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

.nap-row { margin: 0 20px 20px; border-radius: 14px; padding: 13px 16px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; border: 1px solid; }

.mood-wrap { margin: 0 20px 20px; }
.mood-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
.mood-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.mood-sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.mood-row { display: flex; gap: 6px; }
.mbtn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 10px 0; font-size: 20px; cursor: pointer; text-align: center; transition: all .15s; }
.mbtn.sel { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.1); }

/* ── LOG TAB ── */
.log-sec { margin: 0 20px 20px; }
.log-sec-title { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.log-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.log-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); min-height: 52px; }
.log-row:last-child { border-bottom: none; }
.log-lbl { font-size: 16px; color: #fff; }
.log-inp {
  background: transparent; border: none; color: #fff;
  font-size: 16px; font-family: inherit; font-weight: 500;
  text-align: right; outline: none; max-width: 150px;
  -webkit-appearance: none;
}
.log-inp option { background: #1c1c1e; }
.log-inp::placeholder { color: var(--text3); }

/* More details toggle */
.more-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer;
  background: rgba(255,255,255,0.03); border-top: 1px solid var(--border);
}
.more-toggle-lbl { font-size: 14px; color: var(--text2); font-weight: 500; }
.more-toggle-icon { font-size: 13px; color: var(--text3); transition: transform .2s; }
.more-toggle-icon.open { transform: rotate(180deg); }
.more-details { display: none; }
.more-details.open { display: block; }

/* Quality */
.qual-row { display: flex; gap: 5px; padding: 10px 16px; }
.qbtn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 8px 2px; font-size: 10px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text2); line-height: 1.4; transition: all .15s; }
.qbtn .qi { font-size: 16px; display: block; margin-bottom: 2px; }
.qbtn.sel { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; }
.wakeup-row { display: flex; gap: 6px; padding: 10px 16px; }
.wbtn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 9px 4px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text2); transition: all .15s; }
.wbtn.sel { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; padding: 10px 16px; }
.tag { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text2); cursor: pointer; transition: all .15s; }
.tag.sel { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; }
.notes-area { width: 100%; background: transparent; border: none; color: #fff; font-size: 15px; font-family: inherit; padding: 12px 16px; resize: none; height: 72px; outline: none; }
.notes-area::placeholder { color: var(--text3); }

.preview-box { margin: 0 20px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: var(--text2); line-height: 1.6; min-height: 44px; }

.primary-btn { display: block; width: 100%; background: #fff; color: #000; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; text-align: center; transition: opacity .15s; }
.primary-btn:active { opacity: .85; }
.secondary-btn { display: block; width: 100%; background: rgba(255,255,255,0.06); color: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; text-align: center; }

/* History */
.hist-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.hist-entry { border-bottom: 1px solid var(--border); }
.hist-entry:last-child { border-bottom: none; }
.hist-main { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hist-info { flex: 1; min-width: 0; }
.hist-date { font-size: 14px; font-weight: 600; }
.hist-times { font-size: 11px; color: var(--text3); margin-top: 2px; }
.hist-tags { font-size: 10px; color: var(--green); margin-top: 2px; opacity: .8; }
.hist-hrs { font-size: 16px; font-weight: 700; flex-shrink: 0; }
.hist-expanded { display: none; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border); }
.hist-exp-row { display: flex; justify-content: space-between; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
.hist-exp-row:last-child { border-bottom: none; }
.hist-exp-lbl { color: var(--text2); }
.hist-exp-val { font-weight: 600; }
.hist-actions { display: flex; border-top: 1px solid var(--border); }
.hist-action { flex: 1; padding: 12px; font-size: 14px; font-weight: 600; background: none; border: none; cursor: pointer; font-family: inherit; }
.hist-action.edit { color: var(--text2); border-right: 1px solid var(--border); }
.hist-action.del { color: var(--red); }

/* ── INSIGHTS TAB ── */
.ptabs { display: flex; gap: 6px; margin: 0 20px 20px; }
.ptab { flex: 1; padding: 9px; font-size: 12px; font-weight: 600; text-align: center; border: 1px solid var(--border); border-radius: 22px; cursor: pointer; color: var(--text3); background: transparent; transition: all .15s; }
.ptab.on { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.2); }

.ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 20px 20px; }
.ps-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.ps-val { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.ps-lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

.ins-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
.ins-icon { font-size: 18px; margin-bottom: 6px; }
.ins-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.ins-body { font-size: 12px; color: var(--text2); line-height: 1.6; }

.cons-ring { display: flex; align-items: center; gap: 16px; }
.ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-num { font-size: 18px; font-weight: 700; line-height: 1; }
.ring-sub { font-size: 9px; color: var(--text3); font-weight: 500; }

.dow-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dow-lbl { font-size: 11px; font-weight: 600; color: var(--text2); width: 28px; }
.dow-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.dow-fill { height: 100%; border-radius: 3px; }
.dow-val { font-size: 11px; font-weight: 600; width: 32px; text-align: right; }

.trend-wrap { height: 100px; position: relative; margin: 8px 0; }

.proj-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.proj-row:last-child { border-bottom: none; }

// ── Math ──────────────────────────────────────────────────────
function calcHrs(bed,wake,onset=15){
  let[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);
  let b=bh*60+bm+onset,w=wh*60+wm;
  if(w<=bh*60+bm)w+=1440;
  return Math.max(0,Math.round((w-b)/60*10)/10);
}
function eff(hrs,q=3,wu=0){return Math.round(Math.max(0,hrs*([0,.75,.85,1,1.05,1.1][q]||1)-wu*.15)*10)/10;}
function targetBed(){
  const[wh,wm]=S.wakeTime.split(':').map(Number);
  const m=((wh*60+wm-S.need*60)%1440+1440)%1440;
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;
}
function fmt(t){let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';if(h===0)h=12;else if(h>12)h-=12;return `${h}:${String(m).padStart(2,'0')}${ap}`;}
function fmtH(h){return `${h===0?12:h>12?h-12:h}${h<12?'am':'pm'}`;}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function today(){return new Date().toISOString().slice(0,10);}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function nowTimeStr(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

function bedDef(bed){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number);
  let[ah,am]=bed.split(':').map(Number);
  let tM=th*60+tm,aM=ah*60+am;
  if(aM<720)aM+=1440;if(tM<720)tM+=1440;
  return Math.max(0,Math.round((aM-tM)/60*10)/10);
}
function recov(x){return x<=0?0:Math.round(Math.log(1+x*2)*.8*10)/10;}
function napCredit(date){return(S.naps||[]).filter(n=>n.date===date).reduce((s,n)=>s+n.mins/60*.55,0);}

function getDebt(){
  const r=S.log.slice(0,14);
  if(!r.length)return Math.round(S.startingDebt*10)/10;
  let net=S.startingDebt;
  r.forEach(e=>{
    const d=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);
    if(d>0)net+=d;else net-=recov(-d);
  });
  return Math.round(Math.max(0,net)*10)/10;
}
function getStreak(){
  let s=0;const t=new Date();
  for(let i=0;i<S.log.length;i++){
    if(Math.round((t-new Date(S.log[i].date+'T12:00:00'))/86400000)===i)s++;else break;
  }
  return s;
}
function eLevel(nowH,wH){
  const e=(nowH-wH+24)%24,pi=Math.PI;let v;
  if(e<1.5)v=.3+(e/1.5)*.4;else if(e<5)v=.7+Math.sin((e-1.5)/3.5*pi)*.3;
  else if(e<7)v=1-(e-5)/2*.35;else if(e<9)v=.65+Math.sin((e-7)/2*pi)*.2;
  else if(e<11)v=.85-(e-9)/2*.3;else if(e<14)v=.55-(e-11)/3*.25;
  else v=Math.max(.1,.3-(e-14)*.03);
  return Math.max(.05,Math.min(1,v*Math.max(.6,1-getDebt()/30*.35)));
}
function bedAlert(){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number),n=new Date();
  let tM=th*60+tm,nM=n.getHours()*60+n.getMinutes();
  if(tM<720)tM+=1440;if(nM<720)nM+=1440;
  const d=tM-nM;return(d>0&&d<=180)?d:null;
}
function cdown(m){if(m<60)return m+'min';return Math.floor(m/60)+'h'+(m%60>0?' '+m%60+'min':'');}

// ── Quick Log ─────────────────────────────────────────────────
// Bed button: 8pm–5am (20:00–05:00)
// Wake button: 5am–11am (05:00–11:00)

function qlDateForBed(){
  // If time is 0–5, bed date is yesterday
  const h=new Date().getHours();
  return h<5?yesterday():today();
}

function getQLState(){
  const h=new Date().getHours();
  const td=today(),yd=yesterday();
  const todayLogged=S.log.find(e=>e.date===td||e.date===yd);

  // Wake button: 5am–11am
  if(h>=5&&h<=11){
    const wDone=S.ql?.wakeDate===td;
    return {
      showWake:true, wakeDone:wDone,
      showBed:false, bedDone:false
    };
  }
  // Bed button: 8pm–5am (20–23 or 0–5)
  if(h>=20||h<5){
    const bedDate=qlDateForBed();
    const bDone=S.ql?.bedDate===bedDate;
    // Also show wake pill if wake was recorded today
    const wDone=S.ql?.wakeDate===td;
    return {
      showBed:true, bedDone:bDone,
      showWake:wDone, wakeDone:wDone
    };
  }
  // Show wake if recorded today even outside normal hours
  const wDone=S.ql?.wakeDate===td;
  if(wDone) return {showWake:true,wakeDone:true,showBed:false,bedDone:false};
  return {showWake:false,wakeDone:false,showBed:false,bedDone:false};
}

function renderQL(){
  const el=document.getElementById('ql-bar');
  if(!el)return;
  const st=getQLState();
  let html='';

  if(st.showBed){
    if(st.bedDone){
      html+=`<div class="ql-pill ql-pill-done ql-pill-edit" onclick="openQLEdit('bed')">🛌 ${fmt(S.ql.bedTime)} · tap to edit</div>`;
    } else {
      html+=`<div class="ql-pill ql-pill-bed" onclick="recordBed()">🛌 Just went to bed</div>`;
    }
  }
  if(st.showWake){
    if(st.wakeDone){
      html+=`<div class="ql-pill ql-pill-done ql-pill-edit" onclick="openQLEdit('wake')">☀️ ${fmt(S.ql.wakeTime)} · tap to edit</div>`;
    } else {
      html+=`<div class="ql-pill ql-pill-wake" onclick="recordWake()">☀️ Just woke up</div>`;
    }
  }
  el.innerHTML=html;
  el.style.display=(st.showBed||st.showWake)?'flex':'none';
}

function recordBed(){
  const t=nowTimeStr();
  const d=qlDateForBed();
  if(!S.ql)S.ql={};
  S.ql.bedTime=t; S.ql.bedDate=d;
  saveFS(); renderQL();
  showToast('Bedtime recorded: '+fmt(t));
}
function recordWake(){
  const t=nowTimeStr();
  const d=today();
  if(!S.ql)S.ql={};
  S.ql.wakeTime=t; S.ql.wakeDate=d;
  saveFS(); renderQL();
  showToast('Wake time recorded: '+fmt(t));
}

function openQLEdit(type){
  qlEditType=type;
  const title=type==='bed'?'Edit bedtime':'Edit wake time';
  const current=type==='bed'?S.ql?.bedTime:S.ql?.wakeTime;
  document.getElementById('ql-modal-title').textContent=title;
  document.getElementById('ql-edit-time').value=current||nowTimeStr();
  document.getElementById('ql-modal').classList.add('open');
}
function closeQLModal(){document.getElementById('ql-modal').classList.remove('open');}
function saveQLTime(){
  const t=document.getElementById('ql-edit-time').value;
  if(!S.ql)S.ql={};
  if(qlEditType==='bed'){S.ql.bedTime=t;}
  else{S.ql.wakeTime=t;}
  saveFS(); closeQLModal(); renderQL();
  showToast('Time updated: '+fmt(t));
}

// Pre-fill log from QL
function getQLPrefill(){
  const yd=yesterday();
  const bed=(S.ql?.bedDate===yd||S.ql?.bedDate===today())?S.ql.bedTime:null;
  const wake=S.ql?.wakeDate===today()?S.ql.wakeTime:null;
  return {bed,wake};
}

    ${last?`<div class="sec">

function dailyNeeded2(debt,target,daysLeft){
  if(daysLeft<=0)return 0;
  return Math.round((debt-target)/daysLeft*10)/10;
}

function setP(p){insPeriod=p;rInsights();}
function getPL(period){
  const now=new Date(),cutoff=new Date(now);
  if(period==='week')cutoff.setDate(cutoff.getDate()-7);
  else if(period==='month')cutoff.setDate(cutoff.getDate()-30);
  else if(period==='year')cutoff.setFullYear(cutoff.getFullYear()-1);
  else return S.log;
  return S.log.filter(e=>new Date(e.date+'T12:00:00')>=cutoff);
}
function calcCons(logs){
  if(logs.length<3)return 0;
  const mins=logs.map(e=>{let[h,m]=e.bed.split(':').map(Number),v=h*60+m;if(v<720)v+=1440;return v;});
  const mean=mins.reduce((s,v)=>s+v,0)/mins.length;
  const std=Math.sqrt(mins.reduce((s,v)=>s+(v-mean)**2,0)/mins.length);
  return Math.max(0,Math.round(100-std/.9));
}
function buildHM(){
  const c=document.getElementById('hm');if(!c)return;
  const logMap={};S.log.forEach(e=>{logMap[e.date]=eff(e.hrs,e.quality||3,e.wakeups||0);});
  const now=new Date(),start=new Date(now);
  start.setDate(start.getDate()-111);start.setDate(start.getDate()-start.getDay());
  const weeks=[];let cur=new Date(start);
  while(cur<=now){const week=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);week.push({date:ds,v:logMap[ds]??null,f:cur>now});cur.setDate(cur.getDate()+1);}weeks.push(week);}
  function cc(v){if(v===null)return '#1a1a1a';const r=v/S.need;return r>=1?'#0f4a20':r>=.85?'#0f3320':r>=.7?'#4a3010':r>=.5?'#4a1515':'#3a0a0a';}
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],days=['S','M','T','W','T','F','S'];
  let mH='<div style="display:flex;margin-left:22px;margin-bottom:4px;gap:3px;">',lm=-1;
  weeks.forEach(w=>{const d=new Date(w[0].date+'T12:00:00');if(d.getMonth()!==lm){mH+=`<div style="font-size:9px;color:var(--text3);min-width:13px">${months[d.getMonth()]}</div>`;lm=d.getMonth();}else{mH+='<div style="min-width:13px"></div>';}});
  mH+='</div>';
  let gH=`<div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px;margin-right:4px">${days.map(d=>`<div style="font-size:9px;color:var(--text3);height:13px;display:flex;align-items:center">${d}</div>`).join('')}</div>`;
  weeks.forEach(w=>{gH+='<div style="display:flex;flex-direction:column;gap:3px">';w.forEach(day=>{gH+=`<div style="width:13px;height:13px;border-radius:2px;background:${day.f?'transparent':cc(day.v)};flex-shrink:0" title="${day.v!==null?`${day.date}: ${day.v}h`:day.date}"></div>`;});gH+='</div>';});
  gH+='</div>';
  c.innerHTML=`<div style="overflow-x:auto">${mH}${gH}</div>`;
}
function buildDOW(){
  const el=document.getElementById('dow');if(!el)return;
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],b=Array(7).fill(null).map(()=>[]);
  S.log.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();b[d].push(eff(e.hrs,e.quality||3,e.wakeups||0));});
  const avgs=b.map(bk=>bk.length?Math.round(bk.reduce((s,v)=>s+v,0)/bk.length*10)/10:null);
  const mx=Math.max(...avgs.filter(v=>v!==null),S.need+1);
  el.innerHTML=dn.map((d,i)=>{
    if(!avgs[i])return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"></div><div class="dow-val" style="color:var(--text3)">—</div></div>`;
    const p=Math.round(avgs[i]/mx*100),c=avgs[i]>=S.need?'var(--green)':avgs[i]>=S.need*.85?'var(--amber)':'var(--red)';
    return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"><div class="dow-fill" style="width:${p}%;background:${c}"></div></div><div class="dow-val" style="color:${c}">${avgs[i]}h</div></div>`;
  }).join('');
}
function buildTrend(logs){
  const c=document.getElementById('tc');if(!c)return;
  const sorted=[...S.log].sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<2)return;
  let net=S.startingDebt;const dm={};
  sorted.forEach(e=>{const d=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(d>0)net+=d;else net-=recov(-d);net=Math.max(0,net);dm[e.date]=Math.round(net*10)/10;});
  const r=sorted.slice(-30);
  const labels=r.map(e=>new Date(e.date+'T12:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'}));
  const data=r.map(e=>dm[e.date]||0);
  if(tChart)tChart.destroy();
  tChart=new Chart(c,{type:'line',data:{labels,datasets:[{label:'Debt',data,borderColor:'rgba(255,255,255,0.7)',backgroundColor:'rgba(255,255,255,0.04)',fill:true,tension:.3,pointRadius:2,borderWidth:2,pointBackgroundColor:'rgba(255,255,255,0.7)'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}h debt`}}},
      scales:{x:{ticks:{color:'rgba(255,255,255,0.25)',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},y:{min:0,ticks:{color:'rgba(255,255,255,0.25)',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}}}}});
}
function genInsights(){
  const ins=[];if(S.log.length<7)return ins;
  const ae=S.log.map(e=>({...e,ef:eff(e.hrs,e.quality||3,e.wakeups||0)}));
  const b=Array(7).fill(null).map(()=>[]);
  ae.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();b[d].push(e.ef);});
  const avgs=b.map(bk=>bk.length>=2?bk.reduce((s,v)=>s+v,0)/bk.length:null);
  const valid=avgs.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(valid.length>=3){
    const worst=valid.reduce((a,b)=>a.v<b.v?a:b),best=valid.reduce((a,b)=>a.v>b.v?a:b);
    if(worst.v<S.need-.5)ins.push({icon:'📉',title:`${dn[worst.i]}s are your worst nights`,body:`You average ${Math.round(worst.v*10)/10}h — ${Math.round((S.need-worst.v)*10)/10}h below your need.`});
    if(best.v>=S.need-.3)ins.push({icon:'🏆',title:`${dn[best.i]}s are your best nights`,body:`You average ${Math.round(best.v*10)/10}h. Protect what you do that night.`});
  }
  const md=S.checkins?.length>=5?S.checkins:[];
  if(md.length>=5){
    const pairs=[];md.forEach(ci=>{const prev=S.log.find(e=>e.date===ci.date);if(prev)pairs.push({mood:ci.score,ef:eff(prev.hrs,prev.quality||3,prev.wakeups||0)});});
    if(pairs.length>=5){
      const hi=pairs.filter(p=>p.ef>=S.need-.5),lo=pairs.filter(p=>p.ef<S.need-1);
      if(hi.length>=2&&lo.length>=2){
        const hm=Math.round(hi.reduce((s,p)=>s+p.mood,0)/hi.length*10)/10,lm=Math.round(lo.reduce((s,p)=>s+p.mood,0)/lo.length*10)/10;
        const mE=['','😵','😩','😐','🙂','⚡'];
        if(hm>lm+.5)ins.push({icon:'🔗',title:'Your mood tracks your sleep',body:`Well-slept days: ${mE[Math.round(hm)]} (${hm}/5). Short nights: ${mE[Math.round(lm)]} (${lm}/5).`});
      }
    }
  }
  const we=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;});
  const wd=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  if(we.length>=3&&wd.length>=5){
    const weA=Math.round(we.reduce((s,e)=>s+e.ef,0)/we.length*10)/10,wdA=Math.round(wd.reduce((s,e)=>s+e.ef,0)/wd.length*10)/10;
    if(weA>wdA+.5)ins.push({icon:'📅',title:`${Math.round((weA-wdA)*10)/10}h more sleep on weekends`,body:`Weekdays: ${wdA}h avg. Weekends: ${weA}h avg. Using weekends to recover debt.`});
  }
  const cons=calcCons(S.log.slice(0,30));
  if(cons<60)ins.push({icon:'⏰',title:'Inconsistent bedtimes are costing you',body:`Consistency score: ${cons}/100. Irregular timing disrupts circadian rhythm even when total hours look okay.`});
  return ins.slice(0,5);
}
function doExport(){
  if(!S.log.length){alert('No data');return;}
  const rows=['Date,Bedtime,Wake,Raw(h),Quality,Wakeups,Tags,Note,Effective(h),Deficit(h)'];
  S.log.forEach(e=>{const ef2=eff(e.hrs,e.quality||3,e.wakeups||0);rows.push(`${e.date},${e.bed},${e.wake},${e.hrs},${e.quality||3},${e.wakeups||0},"${(e.tags||[]).join(';')}","${e.note||''}",${ef2},${Math.round((S.need-ef2)*10)/10}`);});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='somnus.csv';a.click();
}
