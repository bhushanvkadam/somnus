<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Somnus">
<title>Somnus — Sleep Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5b47e0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Somnus">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f2ef;
  --border:#e8e8e4;--border2:#d4d4ce;
  --text:#1a1a18;--text2:#6b6b63;--text3:#ababA0;
  --accent:#5b47e0;--accent-l:#eeecfb;--accent-d:#4535c8;
  --green:#16a34a;--green-l:#dcfce7;
  --amber:#b45309;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --blue:#1d4ed8;--blue-l:#dbeafe;
  --r:12px;--r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;margin:0;padding:0;}
.app{max-width:480px;margin:0 auto;background:var(--bg);}
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 24px;text-align:center}
.auth-logo{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.auth-logo span{color:var(--accent)}
.auth-tag{font-size:15px;color:var(--text2);margin-bottom:48px;line-height:1.5}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;max-width:320px;background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;padding:14px 20px;font-size:15px;font-weight:600;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s}
.btn-google:hover{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d)}
.btn-google img{width:20px;height:20px}
.auth-note{font-size:12px;color:var(--text3);margin-top:20px;line-height:1.5}
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px}
.spinner{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#main-app{display:none;}
.header{padding:max(12px,env(safe-area-inset-top)) 18px 0;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo-dot{color:var(--accent)}
.hdr-date{font-size:12px;color:var(--text3);margin-top:2px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.streak-pill{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-l);border-radius:20px;padding:4px 10px}
.user-pill{display:flex;align-items:center;gap:6px;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);object-fit:cover}
.user-name{font-size:12px;color:var(--text2);font-weight:500;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(247,247,245,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 4px env(safe-area-inset-bottom,8px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;border-radius:10px;transition:background .15s}
.nav-item:hover{background:var(--surface2)}
.nav-icon{font-size:19px;color:var(--text3);line-height:1}
.nav-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.02em}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--accent)}
.page{display:none;padding-bottom:96px}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin:0 14px 10px}
.card-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.big-num{font-size:52px;font-weight:300;line-height:1;letter-spacing:-3px}
.big-unit{font-size:17px;color:var(--text2);font-weight:400}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 14px 10px}
.mgrid-2{grid-template-columns:repeat(2,1fr)}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.mbox .mv{font-size:19px;font-weight:600;line-height:1;color:var(--text)}
.mbox .ml{font-size:10px;color:var(--text3);font-weight:500;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.mbox .ms{font-size:10px;color:var(--text3);margin-top:3px}
.track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:12px 0 5px}
.fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.track-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.alert{margin:0 14px 10px;border-radius:var(--r);padding:12px 14px;font-size:13px;line-height:1.5;font-weight:500;border:1px solid}
.tip{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.5}
.tip:last-child{border-bottom:none;padding-bottom:0}
.tdot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.ewrap{height:120px;position:relative;margin:8px 0 4px}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input[type=time],.field input[type=date],.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;font-family:inherit;font-weight:500;padding:11px 14px;outline:none;transition:border .15s,background .15s;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--accent-d)}
.btn:active{transform:scale(.98)}
.btn-outline{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:var(--surface2)}
.btn-red{color:var(--red);border-color:#fca5a5}
.btn-red:hover{background:var(--red-l)!important;border-color:var(--red)!important}
.qual-row{display:flex;gap:5px}
.qbtn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:var(--text2);line-height:1.4}
.qbtn .qi{font-size:18px;display:block;margin-bottom:2px}
.qbtn.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d)}
.wakeup-row{display:flex;gap:6px}
.wbtn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 4px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:var(--text2)}
.wbtn.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d)}
.pblock{border-radius:var(--r);padding:13px 14px;margin-bottom:8px;border:1px solid}
.ptime{font-size:10px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.pdesc{font-size:13px;line-height:1.5}
.lentry{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.lentry:last-child{border-bottom:none}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.linfo{flex:1;min-width:0}
.ldate{font-size:13px;font-weight:600}
.ltimes{font-size:11px;color:var(--text3);margin-top:2px}
.lhrs{font-size:15px;font-weight:700;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:5px;border-radius:6px;transition:.12s}
.icon-btn:hover{color:var(--text);background:var(--surface2)}
.wbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wlbl{font-size:11px;font-weight:600;color:var(--text3);width:24px;text-align:right}
.wtrack{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.wfill{height:100%;border-radius:3px}
.wval{font-size:12px;font-weight:600;width:32px}
.srow-s{display:flex;align-items:center;gap:12px}
.srow-s input[type=range]{flex:1;accent-color:var(--accent)}
.sval{font-size:14px;font-weight:700;color:var(--accent);min-width:38px}
.badge{display:inline-block;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
.mood-row{display:flex;gap:6px;margin-top:10px}
.mbtn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 0;font-size:22px;cursor:pointer;text-align:center;transition:all .15s}
.mbtn:hover,.mbtn.sel{border-color:var(--accent);background:var(--accent-l)}
.checkin{margin:0 14px 10px;background:linear-gradient(135deg,var(--accent-l),#e8f0fe);border:1px solid rgba(91,71,224,.15);border-radius:var(--r-lg);padding:16px}
.srow2{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.srow2:last-child{border-bottom:none}
.proj-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.proj-row:last-child{border-bottom:none}
.preview-box{background:var(--accent-l);border:1px solid rgba(91,71,224,.15);border-radius:var(--r);padding:11px 13px;font-size:13px;color:var(--accent-d);font-weight:500;margin-bottom:13px;line-height:1.6;min-height:44px}
.snote{font-size:12px;color:var(--text3);line-height:1.5;margin-top:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom,0px))}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.save-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:8px 16px;border-radius:20px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.save-toast.show{opacity:1}
/* Insights */
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap{display:grid;grid-template-rows:repeat(7,14px);grid-auto-flow:column;gap:2px;width:max-content}
.hm-cell{width:14px;height:14px;border-radius:3px;background:var(--surface2)}
.hm-days{display:grid;grid-template-rows:repeat(7,14px);gap:2px;margin-right:6px;font-size:9px;color:var(--text3);align-items:center;flex-shrink:0}
.insight{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.insight-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.insight-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.insight-body{font-size:12px;color:var(--text2);line-height:1.5}
.period-tabs{display:flex;gap:4px;margin-bottom:14px}
.ptab{flex:1;padding:7px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text2);background:var(--surface);transition:all .15s}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.corr-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.corr-row:last-child{border-bottom:none}
.corr-emoji{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.corr-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.corr-bar{height:100%;border-radius:3px;background:var(--accent)}
.corr-val{font-size:11px;font-weight:600;color:var(--text2);width:28px;text-align:right;flex-shrink:0}
.dow-row{display:flex;align-items:flex-end;gap:6px;height:80px;margin:8px 0 4px}
.dow-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.dow-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.dow-bar{width:80%;border-radius:4px 4px 0 0;min-height:3px}
.dow-lbl{font-size:10px;color:var(--text3);font-weight:500}
</style>
</head>
<body>
<div class="app">
  <div id="loading-screen"><div class="spinner"></div><div style="font-size:13px;color:var(--text3)">Loading Somnus…</div></div>

  <div id="auth-screen" style="display:none">
    <div style="font-size:72px;margin-bottom:24px">🌙</div>
    <div class="auth-logo">Somnus<span>.</span></div>
    <div class="auth-tag">Your personal sleep debt tracker.<br>Science-backed. Beautifully simple.</div>
    <div style="width:100%;max-width:320px;">
      <input type="email" id="auth-email" placeholder="Email address"
        style="width:100%;background:#f2f2ef;border:1.5px solid #d4d4ce;border-radius:12px;padding:14px 16px;font-size:15px;font-family:inherit;color:#1a1a18;outline:none;margin-bottom:10px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter')document.getElementById('auth-pass').focus()">
      <input type="password" id="auth-pass" placeholder="Password"
        style="width:100%;background:#f2f2ef;border:1.5px solid #d4d4ce;border-radius:12px;padding:14px 16px;font-size:15px;font-family:inherit;color:#1a1a18;outline:none;margin-bottom:10px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter')doEmailSignIn()">
      <div id="auth-error" style="font-size:12px;color:#dc2626;margin-bottom:8px;display:none;"></div>
      <button onclick="doEmailSignIn()" id="auth-btn"
        style="width:100%;background:#5b47e0;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;">
        Sign in
      </button>
      <button onclick="doEmailRegister()" id="auth-reg-btn"
        style="width:100%;background:transparent;color:#5b47e0;border:1.5px solid #5b47e0;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">
        Create account
      </button>
      <div style="font-size:12px;color:#ababA0;margin-top:12px;text-align:center;">Stays signed in. Works on all browsers.</div>
    </div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:#1a1a18;">Check your email</div>
      <div style="font-size:13px;color:#6b6b63;line-height:1.6;margin-bottom:20px;">We sent a sign-in link to <strong id="auth-sent-email" style="color:#1a1a18;"></strong>. Tap it to sign in.</div>
      <button onclick="checkAuthNow()" style="width:100%;background:#5b47e0;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;">I clicked the link — open app</button>
      <button onclick="resetAuth()" style="background:none;border:none;color:#5b47e0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Use a different email</button>
    </div>
  </div>

  <div id="main-app">
    <div class="header">
      <div>
        <div class="logo">Somnus<span class="logo-dot">.</span></div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
      <div class="hdr-right">
        <div class="user-pill" onclick="showUserMenu()">
          <img class="user-avatar" id="user-avatar" src="" alt="">
          <span class="user-name" id="user-name"></span>
        </div>
        <div class="streak-pill" id="streak-pill"></div>
      </div>
    </div>
    <div id="page-debt" class="page active"></div>
    <div id="page-plan" class="page"></div>
    <div id="page-log" class="page"></div>
    <div id="page-insights" class="page"></div>
    <div id="page-settings" class="page"></div>
    <div class="nav">
      <div class="nav-item active" onclick="go('debt',this)"><div class="nav-icon">◑</div><div class="nav-label">Debt</div></div>
      <div class="nav-item" onclick="go('plan',this)"><div class="nav-icon">◈</div><div class="nav-label">Today</div></div>
      <div class="nav-item" onclick="go('log',this)"><div class="nav-icon">⊕</div><div class="nav-label">Log</div></div>
      <div class="nav-item" onclick="go('insights',this)"><div class="nav-icon">◉</div><div class="nav-label">Insights</div></div>
      <div class="nav-item" onclick="go('settings',this)"><div class="nav-icon">◎</div><div class="nav-label">Settings</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Edit entry</div>
    <input type="hidden" id="edit-date">
    <div class="frow" style="margin-bottom:12px">
      <div class="field"><label>Bedtime</label><input type="time" id="edit-bed"></div>
      <div class="field"><label>Wake time</label><input type="time" id="edit-wake"></div>
    </div>
    <div class="field"><label>Sleep onset</label>
      <select id="edit-onset"><option value="5">5 min</option><option value="15" selected>15 min</option><option value="30">30 min</option><option value="45">45 min</option><option value="60">60+ min</option></select>
    </div>
    <div class="field" style="margin-bottom:16px"><label>Sleep quality</label>
      <select id="edit-quality"><option value="1">😵 Terrible</option><option value="2">😩 Poor</option><option value="3" selected>😐 Okay</option><option value="4">🙂 Good</option><option value="5">⚡ Great</option></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn-outline" onclick="closeEdit()">Cancel</button>
      <button class="btn" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <img id="um-avatar" src="" style="width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border2)" alt="">
      <div><div style="font-size:15px;font-weight:600" id="um-name"></div><div style="font-size:12px;color:var(--text3)" id="um-email"></div></div>
    </div>
    <div style="display:grid;gap:8px">
      <button class="btn-outline" onclick="closeUserMenu()">Cancel</button>
      <button class="btn-outline btn-red" onclick="doSignOut()">Sign out</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

const auth=firebase.auth();

let S={need:9.5,wakeTime:'07:00',log:[],naps:[],startingDebt:12.5,checkins:[]};
let CU=null,eChart=null,lq=3,lw=0,insPeriod='week';

auth.onAuthStateChanged(async user=>{
  document.getElementById('loading-screen').style.display='none';

// ── Math ─
function calcHrs(bed,wake,onset=15){
  let[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);
  let b=bh*60+bm+onset,w=wh*60+wm;
  if(w<=bh*60+bm)w+=1440;
  return Math.max(0,Math.round((w-b)/60*10)/10);
}
function effHrs(hrs,q=3,wu=0){return Math.round(Math.max(0,hrs*([0,.75,.85,1,1.05,1.1][q]||1)-wu*.15)*10)/10;}
function tBed(){const[wh,wm]=S.wakeTime.split(':').map(Number);const m=((wh*60+wm-S.need*60)%1440+1440)%1440;return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;}
function fmt(t){let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';if(h===0)h=12;else if(h>12)h-=12;return `${h}:${String(m).padStart(2,'0')}${ap}`;}
function fmtH(h){return `${h===0?12:h>12?h-12:h}${h<12?'am':'pm'}`;}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function today(){return new Date().toISOString().slice(0,10);}
function bDef(bed){
  const tb=tBed();const[th,tm]=tb.split(':').map(Number);let[ah,am]=bed.split(':').map(Number);
  let tM=th*60+tm,aM=ah*60+am;if(aM<180)aM+=1440;if(tM<180)tM+=1440;
  return Math.max(0,Math.round((aM-tM)/60*10)/10);
}
function recov(x){return x<=0?0:Math.round(Math.log(1+x*2)*.8*10)/10;}
function napCredit(date){return(S.naps||[]).filter(n=>n.date===date).reduce((s,n)=>s+n.mins/60*.55,0);}
function getDebt(){
  const r=S.log.slice(0,14);if(!r.length)return Math.round(S.startingDebt*10)/10;
  let net=S.startingDebt;
  r.forEach(e=>{const nap=napCredit(e.date);const eff=effHrs(e.hrs,e.quality||3,e.wakeups||0);const def=S.need-eff-nap;if(def>0)net+=def;else net-=recov(Math.abs(def));});
  return Math.round(Math.max(0,net)*10)/10;
}
function getStreak(){let s=0;const t=new Date();for(let i=0;i<S.log.length;i++){const d=new Date(S.log[i].date+'T12:00:00');if(Math.round((t-d)/86400000)===i)s++;else break;}return s;}
function energyAt(nowH,wakeH){
  const e=(nowH-wakeH+24)%24,pi=Math.PI;let v;
  if(e<1.5)v=.3+(e/1.5)*.4;else if(e<5)v=.7+Math.sin((e-1.5)/3.5*pi)*.3;
  else if(e<7)v=1-((e-5)/2)*.35;else if(e<9)v=.65+Math.sin((e-7)/2*pi)*.2;
  else if(e<11)v=.85-((e-9)/2)*.3;else if(e<14)v=.55-((e-11)/3)*.25;
  else v=Math.max(.1,.3-(e-14)*.03);
  return Math.max(.05,Math.min(1,v*Math.max(.6,1-(getDebt()/30)*.35)));
}
function bedAlert(){
  const tb=tBed();const[th,tm]=tb.split(':').map(Number);const n=new Date();
  let tM=th*60+tm,nM=n.getHours()*60+n.getMinutes();
  if(tM<180)tM+=1440;if(nM<180)nM+=1440;const d=tM-nM;return(d>0&&d<=120)?d:null;
}
function consistencyScore(r){
  if(r.length<3)return 0;
  const beds=r.map(e=>{let[h,m]=e.bed.split(':').map(Number);let mins=h*60+m;if(mins<180)mins+=1440;return mins;});
  const avg=beds.reduce((s,v)=>s+v,0)/beds.length;
  const sd=Math.sqrt(beds.reduce((s,v)=>s+(v-avg)**2,0)/beds.length);
  return Math.max(0,Math.round(100-sd/60*30));
}

function drawEnergy(){

  const ni=Math.max(0,Math.min(16,Math.round(nowH-wh)));
  if(eChart)eChart.destroy();
  eChart=new Chart(c,{type:'line',data:{labels,datasets:[
    {data,borderColor:'#5b47e0',backgroundColor:'rgba(91,71,224,.06)',fill:true,tension:.4,pointRadius:0,borderWidth:2},
    {data:data.map((v,i)=>i===ni?v:null),borderColor:'#5b47e0',backgroundColor:'#5b47e0',pointRadius:data.map((_,i)=>i===ni?5:0),showLine:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},
    scales:{x:{ticks:{color:'#ababA0',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},

        <div class="field"><label>Nap start</label><input type="time" id="ns" value="13:00"></div>
      </div>
      <div class="field"><label>Duration</label>
        <select id="ndur"><option value="20">20 min</option><option value="30">30 min</option><option value="45">45 min</option><option value="60">60 min</option><option value="90">90 min</option></select>

  updPrev();rHist();
}
function setQ(v,el){lq=v;document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');updPrev();}
function setW(v,el){lw=v;document.querySelectorAll('.wbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');updPrev();}
function updPrev(){
  const bed=document.getElementById('lb')?.value,wake=document.getElementById('lw2')?.value;
  const onset=parseInt(document.getElementById('lo')?.value||15),date=document.getElementById('ld')?.value;
  if(!bed||!wake)return;
  const raw=calcHrs(bed,wake,onset),eff=effHrs(raw,lq,lw),bd=bDef(bed),tb=tBed();
  const existing=S.log.find(e=>e.date===date);
  const el=document.getElementById('prev');
  if(el)el.innerHTML=`${raw.toFixed(1)}h raw · <strong>${eff.toFixed(1)}h effective</strong><br>`+
    `<span style="color:${bd>0?'#b45309':'#16a34a'};font-size:12px">${bd>0?`Bedtime ${bd}h past target ${fmt(tb)}`:'Bedtime on target ✓'}</span>`+
    (existing?`<br><span style="color:var(--accent);font-size:12px">Will update entry for ${fmtDate(date)}</span>`:'');
}
function doLog(){
  const bed=document.getElementById('lb').value,wake=document.getElementById('lw2').value;
  const onset=parseInt(document.getElementById('lo').value),date=document.getElementById('ld').value;
  const hrs=calcHrs(bed,wake,onset);
  if(hrs<1||hrs>16){alert('Check your times');return;}
  S.log=S.log.filter(e=>e.date!==date);
  S.log.push({date,bed,wake,hrs,onset,quality:lq,wakeups:lw});
  S.log.sort((a,b)=>b.date.localeCompare(a.date));
  if(S.log.length>365)S.log=S.log.slice(0,365);
  save();go('plan',document.querySelectorAll('.nav-item')[1]);
}
function doNap(){
  const start=document.getElementById('ns').value,mins=parseInt(document.getElementById('ndur').value),date=document.getElementById('nd2').value;
  if(!S.naps)S.naps=[];S.naps.push({date,start,mins});save();toast('Nap saved ✓');rLog();
}
function rHist(){
  const el=document.getElementById('hist');if(!el)return;
  if(!S.log.length){el.innerHTML='<div style="font-size:13px;color:var(--text3);padding:20px 0;text-align:center">No entries yet</div>';return;}
  const qi=['','😵','😩','😐','🙂','⚡'];
  el.innerHTML=S.log.slice(0,30).map(e=>{
    const eff=effHrs(e.hrs,e.quality||3,e.wakeups||0),good=eff>=S.need-.5,c=good?'var(--green)':'var(--red)';
    return `<div class="lentry">
      <div class="ldot" style="background:${c}"></div>
      <div class="linfo"><div class="ldate">${fmtDate(e.date)}</div><div class="ltimes">${e.bed}→${e.wake} · ${qi[e.quality||3]}${e.wakeups?` · ${e.wakeups}x`:''}</div></div>
      <div style="text-align:right;flex-shrink:0"><div class="lhrs" style="color:${c}">${eff}h</div>${eff!==e.hrs?`<div style="font-size:10px;color:var(--text3)">${e.hrs}h raw</div>`:''}</div>
      <button class="icon-btn" onclick="openEdit('${e.date}')">✎</button>

}
function delEntry(date){if(!confirm(`Delete entry for ${fmtDate(date)}?`))return;S.log=S.log.filter(e=>e.date!==date);save();rLog();}
function openEdit(date){
  const e=S.log.find(e=>e.date===date);if(!e)return;
  document.getElementById('edit-date').value=date;document.getElementById('edit-bed').value=e.bed;
  document.getElementById('edit-wake').value=e.wake;document.getElementById('edit-onset').value=e.onset||15;
  document.getElementById('edit-quality').value=e.quality||3;document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}
function saveEdit(){
  const date=document.getElementById('edit-date').value,bed=document.getElementById('edit-bed').value;
  const wake=document.getElementById('edit-wake').value,onset=parseInt(document.getElementById('edit-onset').value);
  const quality=parseInt(document.getElementById('edit-quality').value),hrs=calcHrs(bed,wake,onset);

}

// ── Insights page ─
function rInsights(){
  if(S.log.length<3){
    document.getElementById('page-insights').innerHTML=`<div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">📊</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Not enough data yet</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">Log at least 3 nights to unlock insights, patterns, and your sleep heatmap.</div>
    </div>`;return;
  }
  document.getElementById('page-insights').innerHTML=`
    <div style="padding:0 14px;margin-bottom:10px">
      <div class="period-tabs">
        <div class="ptab${insPeriod==='week'?' active':''}" onclick="setPeriod('week')">Week</div>
        <div class="ptab${insPeriod==='month'?' active':''}" onclick="setPeriod('month')">Month</div>
        <div class="ptab${insPeriod==='all'?' active':''}" onclick="setPeriod('all')">All time</div>
      </div>
    </div>
    <div id="ins-summary"></div>
    <div id="ins-heatmap"></div>

    <div id="ins-insights"></div>

  renderSummary();renderHeatmap();renderDOW();renderInsightCards();renderMoodCorr();

}

function setPeriod(p){insPeriod=p;rInsights();}

function getPeriodLog(){
  if(insPeriod==='all')return S.log;
  const days=insPeriod==='week'?7:30;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
  return S.log.filter(e=>e.date>=cutoff.toISOString().slice(0,10));
}

function renderSummary(){
  const r=getPeriodLog();if(!r.length){document.getElementById('ins-summary').innerHTML='';return;}
  const effs=r.map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0));
  const avg=Math.round(effs.reduce((s,v)=>s+v,0)/effs.length*10)/10;
  const best=Math.max(...effs),worst=Math.min(...effs);
  const onTime=r.filter(e=>bDef(e.bed)===0).length;
  const debt=getDebt();
  const avgQ=Math.round(r.reduce((s,e)=>s+(e.quality||3),0)/r.length*10)/10;
  const cs=consistencyScore(r);
  document.getElementById('ins-summary').innerHTML=`
    <div class="mgrid mgrid-2"><div class="mbox"><div class="mv" style="color:${avg>=S.need?'var(--green)':'var(--red)'}">${avg}h</div><div class="ml">Avg effective</div></div>
      <div class="mbox"><div class="mv" style="color:${debt<5?'var(--green)':debt<10?'var(--amber)':'var(--red)'}">${debt}h</div><div class="ml">Current debt</div></div></div>
    <div class="mgrid"><div class="mbox"><div class="mv">${best}h</div><div class="ml">Best night</div></div>
      <div class="mbox"><div class="mv">${worst}h</div><div class="ml">Worst night</div></div>
      <div class="mbox"><div class="mv">${onTime}/${r.length}</div><div class="ml">On-time beds</div></div></div>
    <div class="mgrid mgrid-2"><div class="mbox"><div class="mv">${avgQ}/5</div><div class="ml">Avg quality</div></div>
      <div class="mbox"><div class="mv" style="color:${cs>=70?'var(--green)':cs>=40?'var(--amber)':'var(--red)'}">${cs}%</div><div class="ml">Consistency</div></div></div>`;
}

function renderHeatmap(){
  const el=document.getElementById('ins-heatmap');
  if(S.log.length<5){el.innerHTML='';return;}
  const logMap={};
  S.log.forEach(e=>{logMap[e.date]=effHrs(e.hrs,e.quality||3,e.wakeups||0);});
  const today2=new Date();
  const start=new Date(today2);start.setDate(start.getDate()-363);
  while(start.getDay()!==0)start.setDate(start.getDate()-1);
  const cells=[];const monthLabels=[];let lastMonth=-1,colCount=0;
  const cur=new Date(start);
  while(cur<=today2){
    if(cur.getDay()===0){
      const mo=cur.getMonth();
      if(mo!==lastMonth){monthLabels.push({col:colCount,label:cur.toLocaleDateString('en-IN',{month:'short'})});lastMonth=mo;}
      colCount++;
    }
    const ds=cur.toISOString().slice(0,10);
    const eff=logMap[ds];
    let color;
    if(eff===undefined)color='var(--surface2)';
    else if(eff>=S.need)color='#16a34a';
    else if(eff>=S.need-.5)color='#4ade80';
    else if(eff>=S.need-1.5)color='#fbbf24';
    else if(eff>=S.need-3)color='#f97316';
    else color='#ef4444';
    cells.push({ds,eff,color});
    cur.setDate(cur.getDate()+1);
  }
  const mlHTML=monthLabels.map((m,i)=>{const next=monthLabels[i+1];const w=next?(next.col-m.col)*16:60;return `<div style="width:${w}px;flex-shrink:0;font-size:10px;color:var(--text3);font-weight:500">${m.label}</div>`;}).join('');
  el.innerHTML=`<div class="card">
    <div class="card-label">Sleep calendar — 52 weeks</div>
    <div class="heatmap-wrap">
      <div style="display:flex;margin-left:28px;margin-bottom:4px;width:max-content">${mlHTML}</div>
      <div style="display:flex">
        <div class="hm-days"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
        <div class="heatmap">${cells.map(c=>`<div class="hm-cell" style="background:${c.color}" title="${c.ds}${c.eff!==undefined?' · '+c.eff+'h':''}"></div>`).join('')}</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:10px;font-size:11px;color:var(--text3)">
      <span>Less</span>${['var(--surface2)','#fbbf24','#f97316','#4ade80','#16a34a'].map(c=>`<div style="width:12px;height:12px;border-radius:2px;background:${c}"></div>`).join('')}<span>More</span>
    </div>
  </div>`;
}

function renderDOW(){
  const r=getPeriodLog();if(r.length<5){document.getElementById('ins-dow').innerHTML='';return;}
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dd=Array(7).fill(null).map(()=>({total:0,count:0}));
  r.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();const eff=effHrs(e.hrs,e.quality||3,e.wakeups||0);dd[d].total+=eff;dd[d].count++;});
  const avgs=dd.map(d=>d.count?Math.round(d.total/d.count*10)/10:null);
  const validAvgs=avgs.filter(Boolean);if(!validAvgs.length)return;
  const maxA=Math.max(...validAvgs);
  const barsHTML=days.map((day,i)=>{
    const v=avgs[i];
    if(!v)return `<div class="dow-col"><div class="dow-bar-wrap"><div class="dow-bar" style="height:3px;background:var(--surface2)"></div></div><div class="dow-lbl">${day.slice(0,2)}</div></div>`;
    const pct=Math.round(v/maxA*100);
    const c=v>=S.need?'var(--green)':v>=S.need-.5?'#4ade80':v>=S.need-1.5?'var(--amber)':'var(--red)';
    return `<div class="dow-col"><div style="font-size:10px;font-weight:600;color:${c}">${v}h</div><div class="dow-bar-wrap"><div class="dow-bar" style="height:${pct}%;background:${c}"></div></div><div class="dow-lbl">${day.slice(0,2)}</div></div>`;
  }).join('');
  const bestDay=days[avgs.indexOf(Math.max(...validAvgs))];
  const worstDay=days[avgs.indexOf(Math.min(...validAvgs))];
  document.getElementById('ins-dow').innerHTML=`<div class="card">
    <div class="card-label">Sleep by day of week</div>
    <div class="dow-row">${barsHTML}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6">Best: <strong>${bestDay}</strong> · Worst: <strong>${worstDay}</strong></div>
  </div>`;
}

function renderInsightCards(){
  const r=S.log;if(r.length<5){document.getElementById('ins-insights').innerHTML='';return;}
  const insights=[];
  // Weekend vs weekday
  const wdays=r.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  const wends=r.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;});
  if(wdays.length>=3&&wends.length>=1){
    const wdA=wdays.map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0)).reduce((s,v)=>s+v,0)/wdays.length;
    const weA=wends.map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0)).reduce((s,v)=>s+v,0)/wends.length;
    const diff=Math.round((weA-wdA)*10)/10;
    if(Math.abs(diff)>=0.4)insights.push({icon:diff>0?'🛌':'⚡',
      title:diff>0?`You sleep ${diff}h more on weekends`:`Weekends surprisingly shorter`,
      body:diff>0?`Weekday avg: ${Math.round(wdA*10)/10}h vs weekend: ${Math.round(weA*10)/10}h. You're using weekends to recover debt. This helps short-term but doesn't fully repair it.`
        :`Unusual pattern. Weekend avg ${Math.round(weA*10)/10}h vs weekday ${Math.round(wdA*10)/10}h — social nights or activity?`});
  }
  // Consistency
  const cs=consistencyScore(r.slice(0,14));
  if(cs<50)insights.push({icon:'⏰',title:'Inconsistent bedtimes',body:`Your bedtime varies significantly. Consistency matters almost as much as duration — irregular sleep disrupts your circadian rhythm even if total hours are okay.`});
  else if(cs>=80)insights.push({icon:'✅',title:'Great bedtime consistency',body:`Your bedtime is very regular (${cs}% score). This is one of the strongest predictors of sleep quality and daytime energy.`});
  // Trend
  if(r.length>=14){
    const r7=r.slice(0,7).map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0));
    const p7=r.slice(7,14).map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0));
    const rA=r7.reduce((s,v)=>s+v,0)/r7.length,pA=p7.reduce((s,v)=>s+v,0)/p7.length;
    const tr=Math.round((rA-pA)*10)/10;
    if(Math.abs(tr)>=0.3)insights.push({icon:tr>0?'📈':'📉',
      title:tr>0?`Sleep improving — +${tr}h this week`:`Sleep declining — ${tr}h this week`,
      body:tr>0?`Last 7 nights: ${Math.round(rA*10)/10}h avg vs ${Math.round(pA*10)/10}h the week before. On the right track.`
        :`Last 7 nights: ${Math.round(rA*10)/10}h avg vs ${Math.round(pA*10)/10}h the week before. Something changed in your schedule.`});
  }
  // Quality vs hours mismatch
  const hiHrsLoQ=r.filter(e=>e.hrs>=S.need&&(e.quality||3)<=2);
  if(hiHrsLoQ.length>=2)insights.push({icon:'🤔',title:'Long sleep, poor quality',body:`${hiHrsLoQ.length} nights with enough hours but poor quality. Possible causes: stress, alcohol, late eating, or room temperature.`});
  // Wakeups
  const hiWU=r.filter(e=>(e.wakeups||0)>=3);
  if(hiWU.length>=3)insights.push({icon:'😤',title:'Frequent night wakeups',body:`${hiWU.length} nights with 3+ wakeups. Fragmented sleep is significantly less restorative. Common causes: caffeine too late, stress, room temp, sleep apnea.`});
  // Bedtime correlation
  const onT=r.filter(e=>bDef(e.bed)===0);const late=r.filter(e=>bDef(e.bed)>0.5);
  if(onT.length>=3&&late.length>=3){
    const oA=onT.map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0)).reduce((s,v)=>s+v,0)/onT.length;
    const lA=late.map(e=>effHrs(e.hrs,e.quality||3,e.wakeups||0)).reduce((s,v)=>s+v,0)/late.length;
    const diff=Math.round((oA-lA)*10)/10;
    if(diff>0.3)insights.push({icon:'🎯',title:`On-time bedtime = +${diff}h sleep`,body:`When you hit your target bedtime you get ${diff}h more effective sleep on average. Bedtime discipline is your single biggest lever.`});
  }
  if(!insights.length)insights.push({icon:'💤',title:'Keep logging for insights',body:'After 14+ nights, Somnus detects your personal patterns and gives specific, data-driven observations.'});
  document.getElementById('ins-insights').innerHTML=`<div style="padding:0 14px">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Your patterns</div>
    ${insights.map(i=>`<div class="insight"><div class="insight-icon">${i.icon}</div><div><div class="insight-title">${i.title}</div><div class="insight-body">${i.body}</div></div></div>`).join('')}
  </div>`;
}

function renderMoodCorr(){
  const el=document.getElementById('ins-mood');
  const paired=[];
  S.log.forEach(e=>{
    const ci=S.checkins&&S.checkins.find(c=>c.date===e.date);
    if(ci)paired.push({eff:effHrs(e.hrs,e.quality||3,e.wakeups||0),mood:ci.score,emoji:ci.emoji});
  });
  if(paired.length<3){el.innerHTML='';return;}
  const byMood={};
  paired.forEach(p=>{if(!byMood[p.mood])byMood[p.mood]={total:0,count:0,emoji:p.emoji};byMood[p.mood].total+=p.eff;byMood[p.mood].count++;});
  const maxAvg=Math.max(...Object.values(byMood).map(v=>v.total/v.count));
  const rows=[5,4,3,2,1].filter(m=>byMood[m]).map(m=>{
    const avg=Math.round(byMood[m].total/byMood[m].count*10)/10;
    const pct=Math.round(avg/maxAvg*100);
    return `<div class="corr-row"><div class="corr-emoji">${byMood[m].emoji}</div><div class="corr-bar-wrap"><div class="corr-bar" style="width:${pct}%"></div></div><div class="corr-val">${avg}h</div></div>`;
  }).join('');
  const scores=paired.map(p=>p.mood),effs=paired.map(p=>p.eff);
  const aS=scores.reduce((s,v)=>s+v,0)/scores.length,aE=effs.reduce((s,v)=>s+v,0)/effs.length;
  const corr=scores.reduce((s,v,i)=>s+(v-aS)*(effs[i]-aE),0)/(Math.sqrt(scores.reduce((s,v)=>s+(v-aS)**2,0))*Math.sqrt(effs.reduce((s,v)=>s+(v-aE)**2,0))||1);
  el.innerHTML=`<div class="card">
    <div class="card-label">Mood vs sleep (${paired.length} days)</div>
    ${rows}
    <div style="font-size:12px;color:var(--text2);margin-top:12px;line-height:1.5">
      ${corr>0.3?`Your mood correlates with how much effective sleep you got the night before (r=${Math.round(corr*100)/100}). More sleep → better days.`
        :`${paired.length<7?'Log your mood each morning (Today tab) to build this correlation.':'No strong pattern yet — keep logging.'}`}
    </div>
  </div>`;
}

// ── Settings ─
function rSettings(){
  document.getElementById('page-settings').innerHTML=`
    <div class="card"><div class="card-label">Sleep need</div>
      <div class="srow-s" style="margin-bottom:8px"><input type="range" min="6" max="11" step="0.5" value="${S.need}" oninput="lv('need',this.value,'nd','h')"><div class="sval" id="nd">${S.need}h</div></div>

    </div>
    <div class="card"><div class="card-label">Wake time</div>

    </div>
    <div class="card"><div class="card-label">Starting debt</div>
      <div class="srow-s" style="margin-bottom:8px"><input type="range" min="0" max="30" step="0.5" value="${S.startingDebt}" oninput="lv('startingDebt',this.value,'sd','h')"><div class="sval" id="sd">${S.startingDebt}h</div></div>
      <div class="snote" style="margin-bottom:14px">Set from Rise. Yours: 12.5h.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-outline" onclick="S.startingDebt=0;save();rSettings()">Reset to 0</button>
        <button class="btn-outline" onclick="S.startingDebt=12.5;save();rSettings()">Set to 12.5h</button>

    </div>
    <div class="card"><div class="card-label">Account</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px">Signed in as <strong>${CU?.email||''}</strong>.<br>Data syncs automatically to Firebase.</div>
      <button class="btn-outline btn-red" onclick="doSignOut()">Sign out</button>
    </div>
    <div class="card"><div class="card-label">Danger zone</div>
      <div class="snote" style="margin-bottom:14px">Permanently deletes all sleep logs from Firebase.</div>
      <button class="btn-outline btn-red" onclick="clearAll()">Delete all data</button>
    </div>`;
}
function lv(key,val,id,sfx){S[key]=parseFloat(val);document.getElementById(id).textContent=val+sfx;save();}
async function clearAll(){if(!confirm('Permanently delete all Somnus data?'))return;S.log=[];S.naps=[];S.checkins=[];S.startingDebt=12.5;await save();rDebt();}
function doExport(){
  if(!S.log.length){alert('No data to export');return;}
  const rows=['Date,Bedtime,Wake,Onset(min),Raw(h),Quality,Wakeups,Effective(h),Deficit(h)'];
  S.log.forEach(e=>{const eff=effHrs(e.hrs,e.quality||3,e.wakeups||0);rows.push(`${e.date},${e.bed},${e.wake},${e.onset||15},${e.hrs},${e.quality||3},${e.wakeups||0},${eff},${Math.round((S.need-eff)*10)/10}`);});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='somnus-sleep-log.csv';a.click();
}
</script>

<script>
// ── PWA: Service worker ────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('SW:',r.scope))
      .catch(e=>console.warn('SW failed:',e));
  });
}

// ── PWA: Android install prompt ────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(()=>{
    if(deferredPrompt&&document.getElementById('main-app').style.display!=='none')
      showInstallBanner();
  },30000);
});
function showInstallBanner(){
  if(document.getElementById('ibanner'))return;
  const b=document.createElement('div');
  b.id='ibanner';
  b.style.cssText='position:fixed;bottom:80px;left:14px;right:14px;background:#1a1a18;color:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:150;font-family:"Plus Jakarta Sans",sans-serif;box-shadow:0 4px 24px rgba(0,0,0,.2);animation:slideUp .3s ease;';
  b.innerHTML='<div style="font-size:26px;flex-shrink:0;">🌙</div><div style="flex:1"><div style="font-size:13px;font-weight:700;margin-bottom:2px;">Add Somnus to home screen</div><div style="font-size:11px;color:rgba(255,255,255,.6);">Install for the full app experience</div></div><button onclick="doInstall()" style="background:#5b47e0;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;">Install</button><button onclick="this.closest(\'#ibanner\').remove()" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>';
  document.body.appendChild(b);
}
function doInstall(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById('ibanner');if(b)b.remove();});
}

// ── PWA: iOS Safari hint (shows once after 10s) ────────────────
window.addEventListener('load',()=>{
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  if(isIOS&&!isStandalone&&!localStorage.getItem('ios-hint-shown')){
    setTimeout(()=>{
      if(document.getElementById('main-app').style.display==='none')return;
      const h=document.createElement('div');
      h.style.cssText='position:fixed;bottom:80px;left:14px;right:14px;background:#1a1a18;color:#fff;border-radius:14px;padding:16px;z-index:150;font-family:"Plus Jakarta Sans",sans-serif;line-height:1.5;animation:slideUp .3s ease;';
      h.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;">📲 Install Somnus</div><button onclick="this.closest(\'div[style]\').remove();localStorage.setItem(\'ios-hint-shown\',\'1\')" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;line-height:1;">✕</button></div><div style="font-size:13px;color:rgba(255,255,255,.7);">Tap <strong style="color:#fff">Share ↑</strong> at the bottom of Safari, then <strong style="color:#fff">Add to Home Screen</strong>.</div>';
      document.body.appendChild(h);
      localStorage.setItem('ios-hint-shown','1');
    },10000);
  }
});
</script>
<style>@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}</style>
</body>
</html>
