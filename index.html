<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Somnus">
<title>Somnus — Sleep Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0f0f">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.3);
  --green: #30d158;
  --green-l: rgba(48,209,88,0.12);
  --amber: #ff9f0a;
  --amber-l: rgba(255,159,10,0.12);
  --red: #ff453a;
  --red-l: rgba(255,69,58,0.12);
  --accent: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  position: relative;
}

/* ── Loading ── */
#loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; min-height: 100dvh; gap: 16px; background: var(--bg);
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Auth ── */
#auth-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; min-height: 100dvh; padding: 40px 24px; text-align: center;
  background: var(--bg);
}
.auth-logo { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; color: #fff; }
.auth-logo span { color: var(--green); }
.auth-tag { font-size: 15px; color: var(--text2); margin-bottom: 40px; line-height: 1.6; }
.auth-field {
  width: 100%; max-width: 320px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 14px 16px;
  font-size: 15px; font-family: inherit; color: #fff;
  outline: none; margin-bottom: 10px; transition: border .15s;
}
.auth-field:focus { border-color: rgba(255,255,255,0.4); }
.auth-field::placeholder { color: var(--text3); }
#auth-error { font-size: 12px; color: var(--red); margin-bottom: 8px; max-width: 320px; display: none; }
.auth-btn-p {
  width: 100%; max-width: 320px; background: #fff; color: #000;
  border: none; border-radius: 12px; padding: 14px;
  font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 10px;
}
.auth-btn-s {
  width: 100%; max-width: 320px; background: transparent; color: #fff;
  border: 1px solid var(--border2); border-radius: 12px; padding: 13px;
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.auth-note { font-size: 12px; color: var(--text3); margin-top: 14px; line-height: 1.5; max-width: 280px; }

/* ── Main ── */
#main-app { display: none; padding-bottom: 100px; }

/* ── Header ── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 12px;
}
.logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
.logo-dot { color: var(--green); }
.header-right { display: flex; align-items: center; gap: 10px; }
.streak-pill {
  font-size: 11px; font-weight: 600; color: var(--green);
  background: var(--green-l); border-radius: 20px; padding: 4px 10px;
  border: 1px solid rgba(48,209,88,0.2);
}
.avatar-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; cursor: pointer;
}
.settings-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; color: var(--text2);
}

/* ── Floating pill nav ── */
.nav {
  position: fixed; bottom: env(safe-area-inset-bottom, 12px);
  left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 390px;
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: 32px;
  display: flex; padding: 8px; z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; cursor: pointer; padding: 8px 4px;
  border-radius: 24px; transition: background 0.2s;
}
.nav-item.active { background: rgba(255,255,255,0.1); }
.nav-icon { font-size: 17px; color: var(--text3); line-height: 1; transition: color 0.15s; }
.nav-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.02em; transition: color 0.15s; }
.nav-item.active .nav-icon { color: #fff; }
.nav-item.active .nav-label { color: #fff; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Section spacing ── */
.section { margin-bottom: 28px; }
.section-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 0 20px; margin-bottom: 10px;
}

/* ── Hero debt block ── */
.debt-hero { padding: 12px 20px 24px; }
.debt-status-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 6px;
}
.debt-big {
  font-size: 96px; font-weight: 900; line-height: 0.95;
  letter-spacing: -0.04em; margin-bottom: 4px;
}
.debt-sub { font-size: 15px; color: var(--text2); font-weight: 400; margin-bottom: 16px; }
.debt-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 0; margin-bottom: 10px; }
.debt-bar-fill { height: 100%; border-radius: 0; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
.debt-meta { font-size: 12px; color: var(--text3); display: flex; gap: 10px; flex-wrap: wrap; }
.debt-meta span { display: flex; align-items: center; gap: 4px; }
.safe-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  background: rgba(48,209,88,0.15); color: var(--green);
  border: 1px solid rgba(48,209,88,0.25);
  border-radius: 20px; padding: 3px 9px;
}

/* ── Last night row ── */
.ln-row {
  display: flex; gap: 0;
  padding: 0 20px; margin-bottom: 28px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.ln-col {
  flex: 1; padding: 14px 0;
  border-right: 1px solid var(--border);
}
.ln-col:last-child { border-right: none; padding-left: 14px; }
.ln-col:first-child { padding-right: 14px; }
.ln-col-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.ln-col-val { font-size: 26px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; }
.ln-col-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── Detail rows ── */
.detail-rows { padding: 0 20px; }
.d-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.d-row:last-child { border-bottom: none; }
.d-label { font-size: 14px; color: var(--text2); }
.d-val { font-size: 14px; font-weight: 600; color: #fff; }

/* ── Energy timeline ── */
.energy-wrap { padding: 0 20px; margin-bottom: 28px; }
.tl-strip {
  height: 8px; display: flex; border-radius: 4px;
  overflow: hidden; position: relative; margin: 10px 0 8px;
}
.tl-marker {
  position: absolute; top: -3px; bottom: -3px;
  width: 2px; background: #fff; border-radius: 1px;
}
.zone-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.zone-pill {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; border: 1px solid;
  opacity: 0.85;
}
.zone-now { opacity: 1; }

/* ── Tip card ── */
.tip-wrap { padding: 0 20px; margin-bottom: 28px; }
.tip-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px;
}
.tip-main { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.4; margin-bottom: 5px; }
.tip-body { font-size: 13px; color: var(--text2); line-height: 1.5; }
.tip-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.tip-dots { display: flex; gap: 4px; }
.tip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
.tip-dot.on { background: #fff; }
.tip-next { font-size: 12px; color: var(--text2); cursor: pointer; font-weight: 500; }

/* ── Goal card ── */
.goal-wrap { padding: 0 20px; margin-bottom: 28px; }
.goal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
.goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.goal-title { font-size: 13px; font-weight: 600; color: #fff; }
.goal-pct { font-size: 13px; font-weight: 600; color: var(--text2); }
.goal-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 0; overflow: hidden; margin-bottom: 8px; }
.goal-bar-fill { height: 100%; background: var(--green); border-radius: 0; transition: width 0.5s; }
.goal-footer { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); }

/* ── Alert ── */
.alert-wrap { padding: 0 20px; margin-bottom: 16px; }
.alert-pill {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  font-size: 13px; font-weight: 500; color: var(--text2);
}

/* ── TODAY PLAN ── */
.plan-hero { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.plan-type { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 4px; }
.plan-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }

.vt-wrap { padding: 0 20px; margin-bottom: 24px; }
.vt-strip {
  height: 36px; display: flex; border-radius: 10px;
  overflow: hidden; cursor: pointer; margin: 10px 0 8px;
}
.vt-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: rgba(0,0,0,0.6); }
.vt-detail {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; font-size: 13px;
  color: var(--text2); line-height: 1.5; min-height: 44px;
}

.pills-row { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 24px; }
.pill-box {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 10px; text-align: center;
}
.pill-val { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.pill-lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

.nap-banner {
  margin: 0 20px 24px;
  border-radius: 12px; padding: 13px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 600; border: 1px solid;
}

/* ── Mood ── */
.mood-wrap { padding: 0 20px; margin-bottom: 24px; }
.mood-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
.mood-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.mood-sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.mood-row { display: flex; gap: 6px; }
.mbtn {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 0; font-size: 20px;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.mbtn.sel { border-color: rgba(255,255,255,0.4); background: var(--surface2); }

/* ── LOG TAB ── */
.log-section { padding: 0 20px; margin-bottom: 24px; }
.log-section-title {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
}
.log-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.log-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
}
.log-row:last-child { border-bottom: none; }
.log-row-label { font-size: 15px; color: var(--text); }
.log-row-input {
  background: transparent; border: none; color: #fff;
  font-size: 15px; font-family: inherit; font-weight: 500;
  text-align: right; outline: none; max-width: 140px;
  -webkit-appearance: none; appearance: none;
}
.log-row-input option { background: #1a1a1a; }

/* Tags */
.tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 16px; }
.tag {
  padding: 6px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.tag.sel { border-color: rgba(255,255,255,0.4); background: var(--surface2); color: #fff; }

/* Quality */
.qual-row { display: flex; gap: 5px; padding: 10px 16px; }
.qbtn {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 2px;
  font-size: 10px; font-weight: 600; cursor: pointer;
  text-align: center; color: var(--text2); line-height: 1.4;
}
.qbtn .qi { font-size: 16px; display: block; margin-bottom: 2px; }
.qbtn.sel { border-color: rgba(255,255,255,0.4); background: var(--surface2); color: #fff; }

.wakeup-row { display: flex; gap: 6px; padding: 10px 16px; }
.wbtn {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 4px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  text-align: center; color: var(--text2);
}
.wbtn.sel { border-color: rgba(255,255,255,0.4); background: var(--surface2); color: #fff; }

.notes-area {
  width: 100%; background: transparent; border: none;
  color: #fff; font-size: 14px; font-family: inherit;
  padding: 12px 16px; resize: none; height: 72px; outline: none;
}
.notes-area::placeholder { color: var(--text3); }

.preview-strip {
  margin: 0 20px 16px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; font-size: 13px; color: var(--text2);
  font-weight: 500; line-height: 1.6; min-height: 44px;
}

/* History */
.hist-entry { border-bottom: 1px solid var(--border); }
.hist-entry:last-child { border-bottom: none; }
.hist-main {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; cursor: pointer;
}
.hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hist-info { flex: 1; min-width: 0; }
.hist-date { font-size: 14px; font-weight: 600; color: #fff; }
.hist-times { font-size: 11px; color: var(--text3); margin-top: 2px; }
.hist-tags { font-size: 10px; color: rgba(48,209,88,0.8); margin-top: 2px; }
.hist-hrs { font-size: 16px; font-weight: 700; flex-shrink: 0; }
.hist-arrow { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.hist-expanded { display: none; background: var(--bg3); border-top: 1px solid var(--border); }
.hist-exp-row {
  display: flex; justify-content: space-between;
  padding: 9px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.hist-exp-row:last-child { border-bottom: none; }
.hist-exp-label { color: var(--text2); }
.hist-exp-val { font-weight: 600; color: #fff; }
.hist-actions { display: flex; border-top: 1px solid var(--border); }
.hist-action {
  flex: 1; padding: 11px; font-size: 13px; font-weight: 600;
  background: none; border: none; cursor: pointer; font-family: inherit;
}
.hist-action.edit { color: rgba(255,255,255,0.6); border-right: 1px solid var(--border); }
.hist-action.del { color: var(--red); }

/* ── INSIGHTS TAB ── */
.ins-section { padding: 0 20px; margin-bottom: 24px; }
.ptabs { display: flex; gap: 6px; padding: 0 20px; margin-bottom: 20px; }
.ptab {
  flex: 1; padding: 8px; font-size: 12px; font-weight: 600;
  text-align: center; border: 1px solid var(--border);
  border-radius: 20px; cursor: pointer; color: var(--text3); background: transparent;
}
.ptab.on { background: var(--surface2); color: #fff; border-color: var(--border2); }

.ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px; margin-bottom: 20px; }
.ps-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.ps-val { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.ps-lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

.insight-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 8px;
}
.insight-icon { font-size: 18px; margin-bottom: 6px; }
.insight-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.insight-body { font-size: 12px; color: var(--text2); line-height: 1.6; }

.cons-ring { display: flex; align-items: center; gap: 16px; }
.ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-num { font-size: 18px; font-weight: 700; line-height: 1; }
.ring-sub { font-size: 9px; color: var(--text3); font-weight: 500; }

.dow-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dow-lbl { font-size: 11px; font-weight: 600; color: var(--text2); width: 28px; }
.dow-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.dow-fill { height: 100%; border-radius: 3px; }
.dow-val { font-size: 11px; font-weight: 600; width: 32px; text-align: right; }

.trend-wrap { height: 100px; position: relative; margin: 8px 0 4px; }

.proj-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.proj-row:last-child { border-bottom: none; }

/* ── SETTINGS sheet ── */
.settings-sheet {
  position: fixed; inset: 0; z-index: 300;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
}
.settings-sheet.open { display: flex; }
.settings-inner {
  background: #1c1c1e; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 430px; max-height: 88vh;
  overflow-y: auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
}
.sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.s-section { margin-bottom: 24px; }
.s-section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.s-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.s-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; border-bottom: 1px solid var(--border); }
.s-row:last-child { border-bottom: none; }
.s-row-label { font-size: 15px; color: #fff; }
.s-row-val { font-size: 15px; color: var(--text2); font-weight: 500; }
.s-input {
  background: transparent; border: none; color: #fff;
  font-size: 15px; font-family: inherit; font-weight: 600;
  text-align: right; outline: none; width: 80px;
  -webkit-appearance: none; appearance: none;
}
.s-input[type=number]::-webkit-inner-spin-button { opacity: 1; }

// ── Math ──────────────────────────────────────────────────────
function calcHrs(bed,wake,onset=15){
  let[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);
  let b=bh*60+bm+onset,w=wh*60+wm;
  if(w<=bh*60+bm)w+=1440;
  return Math.max(0,Math.round((w-b)/60*10)/10);
}
function eff(hrs,q=3,wu=0){return Math.round(Math.max(0,hrs*([0,.75,.85,1,1.05,1.1][q]||1)-wu*.15)*10)/10;}
function targetBed(){
  const[wh,wm]=S.wakeTime.split(':').map(Number);
  const m=((wh*60+wm-S.need*60)%1440+1440)%1440;
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;
}
function fmt(t){let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';if(h===0)h=12;else if(h>12)h-=12;return `${h}:${String(m).padStart(2,'0')}${ap}`;}
function fmtH(h){return `${h===0?12:h>12?h-12:h}${h<12?'am':'pm'}`;}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function today(){return new Date().toISOString().slice(0,10);}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}

function bedDef(bed){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number);
  let[ah,am]=bed.split(':').map(Number);
  let tM=th*60+tm,aM=ah*60+am;
  if(aM<720)aM+=1440;if(tM<720)tM+=1440;
  return Math.max(0,Math.round((aM-tM)/60*10)/10);
}
function recov(x){return x<=0?0:Math.round(Math.log(1+x*2)*.8*10)/10;}
function napCredit(date){return(S.naps||[]).filter(n=>n.date===date).reduce((s,n)=>s+n.mins/60*.55,0);}
function getDebt(){
  const r=S.log.slice(0,14);
  if(!r.length)return Math.round(S.startingDebt*10)/10;
  let net=S.startingDebt;
  r.forEach(e=>{
    const d=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);
    if(d>0)net+=d;else net-=recov(-d);
  });
  return Math.round(Math.max(0,net)*10)/10;
}
function getStreak(){
  let s=0;const t=new Date();
  for(let i=0;i<S.log.length;i++){
    if(Math.round((t-new Date(S.log[i].date+'T12:00:00'))/86400000)===i)s++;else break;
  }
  return s;
}
function eLevel(nowH,wH){
  const e=(nowH-wH+24)%24,pi=Math.PI;let v;
  if(e<1.5)v=.3+(e/1.5)*.4;else if(e<5)v=.7+Math.sin((e-1.5)/3.5*pi)*.3;
  else if(e<7)v=1-(e-5)/2*.35;else if(e<9)v=.65+Math.sin((e-7)/2*pi)*.2;
  else if(e<11)v=.85-(e-9)/2*.3;else if(e<14)v=.55-(e-11)/3*.25;
  else v=Math.max(.1,.3-(e-14)*.03);
  return Math.max(.05,Math.min(1,v*Math.max(.6,1-getDebt()/30*.35)));
}
function bedAlert(){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number),n=new Date();
  let tM=th*60+tm,nM=n.getHours()*60+n.getMinutes();
  if(tM<720)tM+=1440;if(nM<720)nM+=1440;
  const d=tM-nM;return(d>0&&d<=180)?d:null;
}
function cdown(m){if(m<60)return m+'min';return Math.floor(m/60)+'h '+(m%60>0?m%60+'min':'');}

// ── HOME PAGE ─────────────────────────────────────────────────
function rHome(){
  const debt=getDebt(),last=S.log[0]||null,streak=getStreak(),tb=targetBed();
  const mins=bedAlert();

  document.getElementById('streak-pill').textContent=streak>0?`${streak} day streak`:'start logging';
  document.getElementById('hdr-date')&&(document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'}));

  const dC=debt<5?'var(--green)':debt<10?'var(--amber)':'var(--red)';
  const dPct=Math.min(100,Math.round(debt/20*100));
  const lEff=last?eff(last.hrs,last.quality||3,last.wakeups||0):null;
  const lDef=last?bedDef(last.bed):0;
  const[wh]=S.wakeTime.split(':').map(Number);

  // Bedtime countdown
  const n=new Date();
  let tM=parseInt(tb.split(':')[0])*60+parseInt(tb.split(':')[1]);
  let nM=n.getHours()*60+n.getMinutes();
  if(tM<720)tM+=1440;if(nM<720)nM+=1440;
  const mLeft=tM-nM;
  const bedC=mLeft<60?'var(--red)':mLeft<120?'var(--amber)':'var(--green)';

  // Goal
  let goalH='';
  if(S.goal?.startDate){
    const elapsed=Math.max(0,Math.round((new Date()-new Date(S.goal.startDate))/86400000));
    const dLeft=Math.max(0,S.goal.targetDays-elapsed);
    const reduced=Math.max(0,(S.goal.startDebt||0)-debt);
    const targetR=(S.goal.startDebt||0)-S.goal.targetDebt;
    const pct=Math.min(100,targetR>0?Math.round(reduced/targetR*100):0);
    goalH=`<div class="goal-wrap"><div class="goal-card">
      <div class="goal-header"><span class="goal-title">Debt goal</span><span class="goal-pct">${pct}%</span></div>
      <div class="goal-bar"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
      <div class="goal-footer">
        <span>${S.goal.targetDebt}h target · ${dLeft} days left</span>
        <span>${debt>S.goal.targetDebt?`${debt}h → ${S.goal.targetDebt}h`:'🎉 Done!'}</span>
      </div>
    </div></div>`;
  }

  // Tips
  const [th2]=S.wakeTime.split(':').map(Number);
  const tip=TIPS[tipIdx%TIPS.length];
  const tipH=tip.h.replace('{cutoff}',fmtH((th2+10)%24)).replace('{bed}',fmt(tb)).replace('{need}',S.need+'h').replace('{peak}',fmtH(th2+2)+'–'+fmtH(th2+5));
  const tipDots=TIPS.map((_,i)=>`<div class="tip-dot${i===tipIdx%TIPS.length?' on':''}"></div>`).join('');

  // Energy timeline
  const nowH=n.getHours()+n.getMinutes()/60;
  const zones=[
    {l:'Rise',h:0,len:1.5,c:'#6e56cf',tc:'#fff'},
    {l:'Focus',h:1.5,len:3.5,c:'#30d158',tc:'#000'},
    {l:'Dip',h:5,len:2,c:'#ff9f0a',tc:'#000'},
    {l:'Wind',h:7,len:2,c:'#64d2ff',tc:'#000'},
    {l:'Peak',h:9,len:2,c:'#30d158',tc:'#000'},
    {l:'Down',h:11,len:5,c:'#ff453a',tc:'#fff'},
  ];
  const elapsed2=(nowH-wh+24)%24;
  let curZone=zones[zones.length-1];
  for(const z of zones){if(elapsed2>=z.h&&elapsed2<z.h+z.len){curZone=z;break;}}
  const markerPct=Math.min(100,Math.max(0,elapsed2/16*100));
  const segsH=zones.map(z=>`<div style="flex:${z.len};background:${z.c}"></div>`).join('');
  const pillsH=zones.map(z=>`<div class="zone-pill${z.l===curZone.l?' zone-now':''}" style="background:${z.c}20;border-color:${z.c}40;color:${z.c}">${fmtH((wh+z.h)%24)} ${z.l}</div>`).join('');

  // Alert
  const alertH=mins!==null?`<div class="alert-wrap"><div class="alert-pill">🌙 <span>Bedtime in <strong>${cdown(mins)}</strong> — target ${fmt(tb)}</span></div></div>`:'';

  document.getElementById('page-home').innerHTML=alertH+`

    <div class="debt-hero">
      <div class="debt-status-label" style="color:${dC}">${debt<5?'Safe zone':debt<10?'Significant debt':'Critical debt'}</div>
      <div class="debt-big" style="color:${dC}">${debt}</div>
      <div class="debt-sub">hrs owed</div>
      <div class="debt-bar"><div class="debt-bar-fill" style="width:${dPct}%;background:${dC}"></div></div>
      <div class="debt-meta">
        <span>${S.need}h need</span>
        <span>·</span>
        <span>bed ${fmt(tb)}</span>
        <span>·</span>
        <span class="safe-badge">Safe: under 5h</span>
      </div>
    </div>

    <div class="ln-row">
      <div class="ln-col">
        <div class="ln-col-label">Last night</div>
        <div class="ln-col-val" style="color:${last&&lEff>=S.need?'var(--green)':last&&lEff>=S.need*.85?'var(--amber)':'var(--red)'}">${last?lEff+'h':'—'}</div>
        <div class="ln-col-sub">${last?last.hrs+'h raw':''}</div>
      </div>
      <div class="ln-col">
        <div class="ln-col-label">Target bed</div>
        <div class="ln-col-val">${fmt(tb)}</div>
        <div class="ln-col-sub" style="color:${bedC}">${mLeft>0?'in '+cdown(mLeft):'now'}</div>
      </div>
    </div>

    ${last?`<div class="section">
      <div class="section-label">Last night detail</div>
      <div class="detail-rows">
        <div class="d-row"><span class="d-label">Slept at</span><span class="d-val">${fmt(last.bed)}</span></div>
        <div class="d-row"><span class="d-label">Woke at</span><span class="d-val">${fmt(last.wake)}</span></div>
        <div class="d-row"><span class="d-label">Bedtime deficit</span><span class="d-val" style="color:${lDef>0?'var(--amber)':'var(--green)'}">${lDef>0?'+'+lDef+'h late':'On target'}</span></div>
        <div class="d-row"><span class="d-label">vs need</span><span class="d-val" style="color:${lEff>=S.need?'var(--green)':'var(--red)'}">${lEff>=S.need?'+':''}${Math.round((lEff-S.need)*10)/10}h</span></div>
        <div class="d-row"><span class="d-label">Quality</span><span class="d-val">${['','Terrible','Poor','Okay','Good','Great'][last.quality||3]}</span></div>
        ${last.wakeups?`<div class="d-row"><span class="d-label">Wakeups</span><span class="d-val">${last.wakeups}x</span></div>`:''}
        ${last.tags?.length?`<div class="d-row"><span class="d-label">Tags</span><span class="d-val" style="color:var(--green);font-size:12px">${last.tags.join(' · ')}</span></div>`:''}
        ${last.note?`<div class="d-row"><span class="d-label">Note</span><span class="d-val" style="color:var(--text2);font-size:13px;font-style:italic">"${last.note}"</span></div>`:''}
      </div>
    </div>`:''}

    <div class="section">
      <div class="section-label">Energy — ${curZone.l} zone now</div>
      <div class="energy-wrap">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px">
          <span>${fmtH(wh%24)}</span><span>${fmtH((wh+8)%24)}</span><span>${fmtH((wh+16)%24)}</span>
        </div>
        <div class="tl-strip">
          ${segsH}
          <div class="tl-marker" style="left:${markerPct}%"></div>
        </div>
        <div class="zone-pills">${pillsH}</div>
      </div>
    </div>

    <div class="tip-wrap">
      <div class="tip-card">
        <div class="tip-main">${tipH}</div>
        <div class="tip-body">${tip.b}</div>
        <div class="tip-footer">
          <div class="tip-dots">${tipDots}</div>
          <span class="tip-next" onclick="tipIdx++;rHome()">Next →</span>
        </div>
      </div>
    </div>

    ${goalH}`;
}

// ── PLAN PAGE ─────────────────────────────────────────────────
function rPlan(){
  const last=S.log[0]||null;
  const[wh]=S.wakeTime.split(':').map(Number);
  const td=today();
  const ci=S.checkins?.find(c=>c.date===td);
  const now=new Date(),isMorn=now.getHours()>=6&&now.getHours()<=11;

  let ciH='';
  if(isMorn&&!ci){
    ciH=`<div class="mood-wrap"><div class="mood-card">
      <div class="mood-title">Morning check-in</div>
      <div class="mood-sub">How are you feeling today?</div>
      <div class="mood-row">${['😵','😩','😐','🙂','⚡'].map((e,i)=>`<button class="mbtn" onclick="logMood(${i+1},'${e}')">${e}</button>`).join('')}</div>
    </div></div>`;
  }else if(ci){
    ciH=`<div class="mood-wrap"><div class="mood-card">
      <div class="mood-title">Today's mood</div>
      <div style="font-size:28px;margin-top:6px">${ci.emoji}</div>
    </div></div>`;
  }

  if(!last){
    document.getElementById('page-plan').innerHTML=ciH+`<div class="empty-state">
      <div class="empty-icon">🌙</div>
      <div class="empty-title">Log last night first</div>
      <div class="empty-body">Your personalised day plan appears after logging sleep.</div>
      <button class="primary-btn" onclick="go('log',document.querySelectorAll('.nav-item')[2])">Log sleep →</button>
    </div>`;
    return;
  }

  const ef=eff(last.hrs,last.quality||3,last.wakeups||0),need=S.need,def=need-ef;
  let dtype,dc,dsub;
  if(def<=0){dtype='Well rested';dc='var(--green)';dsub=`${ef}h effective — at your need. Expect a sharp, focused day.`;}
  else if(def<1.5){dtype='Mildly short';dc='var(--green)';dsub=`${ef}h effective (${def.toFixed(1)}h short). Mostly good — dip expected mid-afternoon.`;}
  else if(def<3){dtype='Underslept';dc='var(--amber)';dsub=`${ef}h effective (${def.toFixed(1)}h short). Some fog and slower reactions today.`;}
  else{dtype='Significantly short';dc='var(--red)';dsub=`${ef}h effective (${def.toFixed(1)}h short). Protect your schedule today.`;}

  const p1s=wh+2,p1e=wh+5,d1s=wh+6,d1e=wh+8,p2s=wh+8,p2e=wh+10,d2s=wh+11,d2e=wh+14;
  const vzones=[
    {bg:'rgba(48,209,88,0.3)',tc:'#30d158',l:'Focus',d:def<1.5?'Best focus. Deep work, hard decisions.':'Reduced focus. Do important tasks early.',start:p1s,end:p1e},
    def>=1.5?{bg:'rgba(255,69,58,0.3)',tc:'#ff453a',l:'Crash',d:'Post-lunch crash hits harder. Avoid critical decisions.',start:d1s,end:d1e}
    :{bg:'rgba(110,86,207,0.3)',tc:'#6e56cf',l:'Dip',d:'Natural dip. Emails, admin, routine tasks.',start:d1s,end:d1e},
    def<3?{bg:'rgba(100,210,255,0.3)',tc:'#64d2ff',l:'Wind 2',d:'Second wind. Meetings, calls, collaborative work.',start:p2s,end:p2e}
    :{bg:'rgba(255,159,10,0.3)',tc:'#ff9f0a',l:'Blunted',d:'Second wind blunted. Light tasks only.',start:p2s,end:p2e},
    {bg:'rgba(110,86,207,0.3)',tc:'#6e56cf',l:'Wind down',d:'Energy dropping. Dim screens, begin wind-down.',start:d2s,end:d2e},
  ];

  const tb=targetBed();
  const n2=new Date();
  let tM2=parseInt(tb.split(':')[0])*60+parseInt(tb.split(':')[1]);
  let nM2=n2.getHours()*60+n2.getMinutes();
  if(tM2<720)tM2+=1440;if(nM2<720)nM2+=1440;
  const mLeft2=tM2-nM2;

  const napRec=def>=3?{show:true,txt:`Nap recommended — ${fmtH((wh+6)%24)} to ${fmtH((wh+8)%24)}`,bg:'rgba(255,69,58,0.1)',bc:'rgba(255,69,58,0.2)',tc:'var(--red)'}
    :def>=1.5?{show:true,txt:`Optional nap before ${fmtH((wh+8)%24)} if you feel the dip`,bg:'rgba(255,159,10,0.1)',bc:'rgba(255,159,10,0.2)',tc:'var(--amber)'}
    :{show:false,txt:'No nap needed — skip to protect tonight\'s sleep',bg:'rgba(48,209,88,0.1)',bc:'rgba(48,209,88,0.2)',tc:'var(--green)'};

  document.getElementById('page-plan').innerHTML=ciH+`
    <div class="plan-hero">
      <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Today's outlook</div>
      <div class="plan-type" style="color:${dc}">${dtype}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">${ef}h effective · ${need}h needed</div>
      <div style="font-size:14px;color:var(--text2);margin-top:10px;line-height:1.6">${dsub}</div>
    </div>

    <div class="vt-wrap">
      <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Hour by hour — tap a zone</div>
      <div class="vt-strip">${vzones.map((z,i)=>`<div class="vt-seg" style="flex:${z.end-z.start};background:${z.bg};color:${z.tc};" onclick="showVZ(${i})">${z.l}</div>`).join('')}</div>
      <div class="vt-detail" id="vt-d">Tap a zone to see what to do during that time.</div>
    </div>
    <script>window._vz=${JSON.stringify(vzones)};<\/script>

    <div class="pills-row">
      <div class="pill-box">
        <div class="pill-val">${fmtH((wh+10)%24)}</div>
        <div class="pill-lbl">Last coffee</div>
      </div>
      <div class="pill-box">
        <div class="pill-val">${fmt(tb)}</div>
        <div class="pill-lbl">Target bed</div>
      </div>
      <div class="pill-box">
        <div class="pill-val" style="color:${mLeft2<60?'var(--red)':mLeft2<120?'var(--amber)':'var(--green)'}">${mLeft2>0?cdown(mLeft2):'Now'}</div>
        <div class="pill-lbl">Bed in</div>
      </div>
    </div>

    <div class="nap-banner" style="background:${napRec.bg};border-color:${napRec.bc};color:${napRec.tc}">
      <span style="font-size:18px">${napRec.show?'💤':'✓'}</span>
      <span>${napRec.txt}</span>
    </div>

    <div class="section">
      <div class="section-label">Tonight</div>
      <div class="detail-rows">
        <div class="d-row"><span class="d-label">Target bedtime</span><span class="d-val">${fmt(tb)}</span></div>
        <div class="d-row"><span class="d-label">Sleep needed</span><span class="d-val">${need}h</span></div>
        ${mLeft2>0&&mLeft2<120?`<div class="d-row"><span class="d-label">Wind-down now</span><span class="d-val" style="color:var(--amber)">In ${cdown(mLeft2)}</span></div>`:''}
      </div>
    </div>`;
  window._vz=vzones;
}

function showVZ(i){
  const z=window._vz?.[i];if(!z)return;
  const[wh]=S.wakeTime.split(':').map(Number);
  document.getElementById('vt-d').innerHTML=`<span style="font-weight:600;color:${z.tc}">${fmtH(z.start%24)}–${fmtH(z.end%24)} · ${z.l}</span><br><span style="color:var(--text2)">${z.d}</span>`;
}

function logMood(score,emoji){
  const td=today();
  if(!S.checkins)S.checkins=[];
  S.checkins=S.checkins.filter(c=>c.date!==td);
  S.checkins.push({date:td,score,emoji});
  saveFS();rPlan();
}

function toggleNap(){
  const f=document.getElementById('nap-form');
  f.style.display=f.style.display==='none'?'block':'none';
}

function setQ(v,el){logQ=v;document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');updPrev();}
function setWU(v,el){logWU=v;document.querySelectorAll('.wbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');updPrev();}
function toggleTag(t,el){
  if(logTags.includes(t)){logTags=logTags.filter(x=>x!==t);el.classList.remove('sel');}
  else{logTags.push(t);el.classList.add('sel');}
}

function updPrev(){
  const bed=document.getElementById('lb')?.value;
  const wake=document.getElementById('lw')?.value;
  const date=document.getElementById('ld')?.value;
  if(!bed||!wake)return;
  const raw=calcHrs(bed,wake,15),ef2=eff(raw,logQ,logWU),bd=bedDef(bed),tb=targetBed();
  const ex=S.log.find(e=>e.date===date);
  const el=document.getElementById('prev');
  if(el)el.innerHTML=`${raw.toFixed(1)}h raw · <strong style="color:#fff">${ef2.toFixed(1)}h effective</strong>
    <br><span style="font-size:12px;color:${bd>0?'var(--amber)':'var(--green)'}">${bd>0?`Bedtime ${bd}h past target ${fmt(tb)}`:'Bedtime on target ✓'}</span>
    ${ex?`<br><span style="font-size:12px;color:var(--green)">Updates entry for ${fmtDate(date)}</span>`:''}`;
}

function doLog(){
  const bed=document.getElementById('lb').value,wake=document.getElementById('lw').value;
  const date=document.getElementById('ld').value,note=document.getElementById('ln').value.trim();
  const hrs=calcHrs(bed,wake,15);
  if(hrs<1||hrs>16){alert('Check your times');return;}
  S.log=S.log.filter(e=>e.date!==date);
  S.log.push({date,bed,wake,hrs,onset:15,quality:logQ,wakeups:logWU,tags:[...logTags],note});
  S.log.sort((a,b)=>b.date.localeCompare(a.date));
  if(S.log.length>365)S.log=S.log.slice(0,365);
  saveFS();
  go('plan',document.querySelectorAll('.nav-item')[1]);
}

function doNap(){
  const start=document.getElementById('ns').value;
  const mins=parseInt(document.getElementById('ndur').value);
  const date=document.getElementById('nd-date').value;
  if(!S.naps)S.naps=[];
  S.naps.push({date,start,mins});
  saveFS();showToast('Nap saved ✓');
  document.getElementById('nap-form').style.display='none';
}

function rHist(){
  const el=document.getElementById('hist');if(!el)return;
  if(!S.log.length){
    el.innerHTML='<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">No entries yet</div>';
    return;
  }
  const qI=['','😵','😩','😐','🙂','⚡'];
  el.innerHTML=S.log.slice(0,21).map(e=>{
    const ef2=eff(e.hrs,e.quality||3,e.wakeups||0);
    const good=ef2>=S.need-.5;
    const c=good?'var(--green)':'var(--red)';
    const bd=bedDef(e.bed);
    return `<div class="hist-entry" id="he-${e.date}">
      <div class="hist-main" onclick="toggleHist('${e.date}')">
        <div class="hist-dot" style="background:${c}"></div>
        <div class="hist-info">
          <div class="hist-date">${fmtDate(e.date)}</div>
          <div class="hist-times">${e.bed}→${e.wake} · ${qI[e.quality||3]}${e.wakeups?` · ${e.wakeups}x`:''}</div>
          ${e.tags?.length?`<div class="hist-tags">${e.tags.join(' · ')}</div>`:''}
        </div>
        <div class="hist-hrs" style="color:${c}">${ef2}h</div>
        <div class="hist-arrow">›</div>
      </div>
      <div class="hist-expanded" id="hx-${e.date}">
        <div class="hist-exp-row"><span class="hist-exp-label">Raw sleep</span><span class="hist-exp-val">${e.hrs}h</span></div>
        <div class="hist-exp-row"><span class="hist-exp-label">Effective</span><span class="hist-exp-val">${ef2}h</span></div>
        <div class="hist-exp-row"><span class="hist-exp-label">vs need</span><span class="hist-exp-val" style="color:${ef2>=S.need?'var(--green)':'var(--red)'}">${ef2>=S.need?'+':''}${Math.round((ef2-S.need)*10)/10}h</span></div>
        <div class="hist-exp-row"><span class="hist-exp-label">Bedtime deficit</span><span class="hist-exp-val" style="color:${bd>0?'var(--amber)':'var(--green)'}">${bd>0?'+'+bd+'h late':'On target'}</span></div>
        ${e.note?`<div class="hist-exp-row"><span class="hist-exp-label">Note</span><span class="hist-exp-val" style="color:var(--text2);font-style:italic">"${e.note}"</span></div>`:''}
        <div class="hist-actions">
          <button class="hist-action edit" onclick="openEdit('${e.date}')">Edit</button>
          <button class="hist-action del" onclick="delEntry('${e.date}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleHist(date){
  const x=document.getElementById('hx-'+date);
  if(x)x.style.display=x.style.display==='block'?'none':'block';
}
function delEntry(date){if(!confirm(`Delete entry for ${fmtDate(date)}?`))return;S.log=S.log.filter(e=>e.date!==date);saveFS();rLog();}
function openEdit(date){
  const e=S.log.find(e=>e.date===date);if(!e)return;
  document.getElementById('edit-date').value=date;
  document.getElementById('edit-bed').value=e.bed;
  document.getElementById('edit-wake').value=e.wake;
  document.getElementById('edit-onset').value=e.onset||15;
  document.getElementById('edit-quality').value=e.quality||3;
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}
function saveEdit(){
  const date=document.getElementById('edit-date').value;
  const bed=document.getElementById('edit-bed').value,wake=document.getElementById('edit-wake').value;
  const onset=parseInt(document.getElementById('edit-onset').value),quality=parseInt(document.getElementById('edit-quality').value);
  const hrs=calcHrs(bed,wake,onset);
  S.log=S.log.map(e=>e.date===date?{...e,bed,wake,hrs,onset,quality}:e);
  saveFS();closeEdit();rLog();
}

// ── INSIGHTS PAGE ─────────────────────────────────────────────
function rInsights(){
  if(S.log.length<3){
    document.getElementById('page-insights').innerHTML=`
      <div style="padding:0 20px;margin-bottom:20px">
        <div class="ptabs" style="padding:0">${['week','month','year','all'].map(p=>`<div class="ptab${insPeriod===p?' on':''}" onclick="setP('${p}')">${p==='all'?'All':p.charAt(0).toUpperCase()+p.slice(1)}</div>`).join('')}</div>
      </div>
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-title">Insights unlock soon</div>
        <div class="empty-body">Log ${3-S.log.length} more night${3-S.log.length===1?'':'s'} to unlock patterns and insights.</div>
      </div>
      <div style="padding:0 20px">
        <div class="log-section-title">What you'll see</div>
        ${[
          {icon:'🗓️',title:'Sleep heatmap',body:'16 weeks of colour-coded squares showing your sleep vs need at a glance.'},
          {icon:'⏰',title:'Bedtime consistency',body:'A score showing how regular your sleep timing is — as important as duration.'},
          {icon:'📅',title:'Day of week patterns',body:'Your best and worst sleep days. Reveals hidden lifestyle patterns.'},
          {icon:'🔗',title:'Mood vs sleep correlation',body:'After logging morning mood for 5+ days, we show how sleep quality affects your feelings.'},
          {icon:'📈',title:'Debt trend',body:'How your sleep debt has moved over time as you log more nights.'},
        ].map(i=>`<div class="insight-card" style="opacity:0.4">
          <div class="insight-icon">${i.icon}</div>
          <div class="insight-title">${i.title}</div>
          <div class="insight-body">${i.body}</div>
        </div>`).join('')}
      </div>`;
    return;
  }

  const pl=getPL(insPeriod),effs=pl.map(e=>eff(e.hrs,e.quality||3,e.wakeups||0));
  const avg=effs.length?Math.round(effs.reduce((s,v)=>s+v,0)/effs.length*10)/10:0;
  const best=effs.length?Math.max(...effs):0,worst=effs.length?Math.min(...effs):0;
  const cons=calcCons(pl),ins=genInsights();
  const debt=getDebt(),nightly=avg-S.need;
  let running=debt;

  document.getElementById('page-insights').innerHTML=`
    <div class="ptabs">${['week','month','year','all'].map(p=>`<div class="ptab${insPeriod===p?' on':''}" onclick="setP('${p}')">${p==='all'?'All':p.charAt(0).toUpperCase()+p.slice(1)}</div>`).join('')}</div>

    <div class="ps-grid">
      <div class="ps-card"><div class="ps-val" style="color:${avg>=S.need?'var(--green)':'var(--red)'}">${avg}h</div><div class="ps-lbl">Avg effective</div></div>
      <div class="ps-card"><div class="ps-val">${pl.length}</div><div class="ps-lbl">Nights logged</div></div>
      <div class="ps-card"><div class="ps-val" style="color:var(--green)">${best}h</div><div class="ps-lbl">Best night</div></div>
      <div class="ps-card"><div class="ps-val" style="color:var(--red)">${worst}h</div><div class="ps-lbl">Worst night</div></div>
    </div>

    <div class="ins-section">
      <div class="log-section-title">Sleep heatmap</div>
      <div class="log-card" style="padding:14px"><div id="hm"></div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:10px;font-size:11px;color:var(--text3);flex-wrap:wrap">
          <span>Less</span>${['#333','#7f1d1d','#713f12','#14532d','#166534'].map(c=>`<div style="width:11px;height:11px;border-radius:2px;background:${c};flex-shrink:0"></div>`).join('')}<span>More</span>
        </div>
      </div>
    </div>

    <div class="ins-section">
      <div class="log-section-title">Bedtime consistency</div>
      <div class="log-card" style="padding:16px">
        <div class="cons-ring">
          <div class="ring-wrap">
            <svg width="72" height="72" viewBox="0 0 72 72">
              <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
              <circle cx="36" cy="36" r="30" fill="none" stroke="${cons>=80?'var(--green)':cons>=60?'var(--amber)':'var(--red)'}" stroke-width="6"
                stroke-dasharray="${Math.round(cons/100*188.5)} 188.5" stroke-linecap="round"/>
            </svg>
            <div class="ring-label">
              <div class="ring-num" style="color:${cons>=80?'var(--green)':cons>=60?'var(--amber)':'var(--red)'}">${cons}</div>
              <div class="ring-sub">/ 100</div>
            </div>
          </div>
          <div>
            <div style="font-size:14px;font-weight:600;margin-bottom:4px">${cons>=80?'Very consistent':cons>=60?'Fairly consistent':'Inconsistent'}</div>
            <div style="font-size:12px;color:var(--text2);line-height:1.6">Based on bedtime variance. Timing matters as much as duration.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="ins-section">
      <div class="log-section-title">Sleep by day of week</div>
      <div class="log-card" style="padding:16px">
        <div id="dow"></div>
        <div style="font-size:11px;color:var(--text3);margin-top:8px">avg effective · need: ${S.need}h</div>
      </div>
    </div>

    <div class="ins-section">
      <div class="log-section-title">Debt trend</div>
      <div class="log-card" style="padding:16px">
        <div class="trend-wrap"><canvas id="tc"></canvas></div>
      </div>
    </div>

    ${ins.length?`<div class="ins-section">
      <div class="log-section-title">Insights</div>
      ${ins.map(i=>`<div class="insight-card">
        <div class="insight-icon">${i.icon}</div>
        <div class="insight-title">${i.title}</div>
        <div class="insight-body">${i.body}</div>
      </div>`).join('')}
    </div>`:''}

    <div class="ins-section">
      <div class="log-section-title">Projection</div>
      <div class="log-card" style="padding:4px 16px">
        <div style="font-size:12px;color:var(--text2);padding:10px 0;border-bottom:1px solid var(--border)">${nightly>=0?`Recovering ${Math.round(nightly*10)/10}h/night avg`:`Adding ${Math.round(Math.abs(nightly)*10)/10}h debt/night avg`}</div>
        ${['Week 2','Week 3','Week 4','Month 2','Month 3'].map((w,i)=>{
          running=Math.max(0,running+nightly*(i<3?7:28));
          const rv=Math.round(running*10)/10;
          const c=rv<5?'var(--green)':rv<10?'var(--amber)':'var(--red)';
          return `<div class="proj-row"><span style="color:var(--text2)">${w}</span><span style="font-weight:600;color:${c}">${rv}h debt</span></div>`;
        }).join('')}
      </div>
    </div>

    <div class="ins-section">
      <button class="primary-btn" style="background:var(--bg2);color:#fff;border:1px solid var(--border)" onclick="doExport()">Export CSV</button>
    </div>`;

  buildHM();buildDOW();buildTrend(pl);
}

function setP(p){insPeriod=p;rInsights();}

function getPL(period){
  const now=new Date(),cutoff=new Date(now);
  if(period==='week')cutoff.setDate(cutoff.getDate()-7);
  else if(period==='month')cutoff.setDate(cutoff.getDate()-30);
  else if(period==='year')cutoff.setFullYear(cutoff.getFullYear()-1);
  else return S.log;
  return S.log.filter(e=>new Date(e.date+'T12:00:00')>=cutoff);
}

function calcCons(logs){
  if(logs.length<3)return 0;
  const mins=logs.map(e=>{let[h,m]=e.bed.split(':').map(Number),v=h*60+m;if(v<720)v+=1440;return v;});
  const mean=mins.reduce((s,v)=>s+v,0)/mins.length;
  const std=Math.sqrt(mins.reduce((s,v)=>s+(v-mean)**2,0)/mins.length);
  return Math.max(0,Math.round(100-std/.9));
}

function buildHM(){
  const c=document.getElementById('hm');if(!c)return;
  const logMap={};S.log.forEach(e=>{logMap[e.date]=eff(e.hrs,e.quality||3,e.wakeups||0);});
  const now=new Date(),start=new Date(now);
  start.setDate(start.getDate()-111);start.setDate(start.getDate()-start.getDay());
  const weeks=[];let cur=new Date(start);
  while(cur<=now){const week=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);week.push({date:ds,v:logMap[ds]??null,f:cur>now});cur.setDate(cur.getDate()+1);}weeks.push(week);}
  function cc(v){if(v===null)return '#222';const r=v/S.need;return r>=1?'#166534':r>=.85?'#14532d':r>=.7?'#713f12':r>=.5?'#7f1d1d':'#450a0a';}
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],days=['S','M','T','W','T','F','S'];
  let mH='<div style="display:flex;margin-left:22px;margin-bottom:4px;gap:3px;">',lm=-1;
  weeks.forEach(w=>{const d=new Date(w[0].date+'T12:00:00');if(d.getMonth()!==lm){mH+=`<div style="font-size:9px;color:var(--text3);min-width:13px">${months[d.getMonth()]}</div>`;lm=d.getMonth();}else{mH+='<div style="min-width:13px"></div>';}});
  mH+='</div>';
  let gH=`<div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px;margin-right:4px">${days.map(d=>`<div style="font-size:9px;color:var(--text3);height:13px;display:flex;align-items:center">${d}</div>`).join('')}</div>`;
  weeks.forEach(w=>{gH+='<div style="display:flex;flex-direction:column;gap:3px">';w.forEach(day=>{gH+=`<div style="width:13px;height:13px;border-radius:2px;background:${day.f?'transparent':cc(day.v)};flex-shrink:0" title="${day.v!==null?`${day.date}: ${day.v}h`:day.date}"></div>`;});gH+='</div>';});
  gH+='</div>';
  c.innerHTML=`<div style="overflow-x:auto">${mH}${gH}</div>`;
}

function buildDOW(){
  const el=document.getElementById('dow');if(!el)return;
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],b=Array(7).fill(null).map(()=>[]);
  S.log.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();b[d].push(eff(e.hrs,e.quality||3,e.wakeups||0));});
  const avgs=b.map(bk=>bk.length?Math.round(bk.reduce((s,v)=>s+v,0)/bk.length*10)/10:null);
  const mx=Math.max(...avgs.filter(v=>v!==null),S.need+1);
  el.innerHTML=dn.map((d,i)=>{
    if(!avgs[i])return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"></div><div class="dow-val" style="color:var(--text3)">—</div></div>`;
    const p=Math.round(avgs[i]/mx*100),c=avgs[i]>=S.need?'var(--green)':avgs[i]>=S.need*.85?'var(--amber)':'var(--red)';
    return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"><div class="dow-fill" style="width:${p}%;background:${c}"></div></div><div class="dow-val" style="color:${c}">${avgs[i]}h</div></div>`;
  }).join('');
}

function buildTrend(logs){
  const c=document.getElementById('tc');if(!c)return;
  const sorted=[...S.log].sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<2)return;
  let net=S.startingDebt;const dm={};
  sorted.forEach(e=>{const d=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(d>0)net+=d;else net-=recov(-d);net=Math.max(0,net);dm[e.date]=Math.round(net*10)/10;});
  const r=sorted.slice(-30);
  const labels=r.map(e=>new Date(e.date+'T12:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'}));
  const data=r.map(e=>dm[e.date]||0);
  if(tChart)tChart.destroy();
  tChart=new Chart(c,{
    type:'line',
    data:{labels,datasets:[{label:'Debt',data,borderColor:'#fff',backgroundColor:'rgba(255,255,255,0.04)',fill:true,tension:.3,pointRadius:2,borderWidth:2,pointBackgroundColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}h debt`}}},
      scales:{
        x:{ticks:{color:'rgba(255,255,255,0.3)',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},
        y:{min:0,ticks:{color:'rgba(255,255,255,0.3)',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}}
      }
    }
  });
}

function genInsights(){
  const ins=[];if(S.log.length<7)return ins;
  const ae=S.log.map(e=>({...e,ef:eff(e.hrs,e.quality||3,e.wakeups||0)}));
  const b=Array(7).fill(null).map(()=>[]);
  ae.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();b[d].push(e.ef);});
  const avgs=b.map(bk=>bk.length>=2?bk.reduce((s,v)=>s+v,0)/bk.length:null);
  const valid=avgs.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(valid.length>=3){
    const worst=valid.reduce((a,b)=>a.v<b.v?a:b),best=valid.reduce((a,b)=>a.v>b.v?a:b);
    if(worst.v<S.need-.5)ins.push({icon:'📉',title:`${dn[worst.i]}s are your worst nights`,body:`You average ${Math.round(worst.v*10)/10}h — ${Math.round((S.need-worst.v)*10)/10}h below your need.`});
    if(best.v>=S.need-.3)ins.push({icon:'🏆',title:`${dn[best.i]}s are your best nights`,body:`You average ${Math.round(best.v*10)/10}h. Protect whatever you do that night.`});
  }
  const md=S.checkins?.length>=5?S.checkins:[];
  if(md.length>=5){
    const pairs=[];md.forEach(ci=>{const prev=S.log.find(e=>e.date===ci.date);if(prev)pairs.push({mood:ci.score,ef:eff(prev.hrs,prev.quality||3,prev.wakeups||0)});});
    if(pairs.length>=5){
      const hi=pairs.filter(p=>p.ef>=S.need-.5),lo=pairs.filter(p=>p.ef<S.need-1);
      if(hi.length>=2&&lo.length>=2){
        const hm=Math.round(hi.reduce((s,p)=>s+p.mood,0)/hi.length*10)/10,lm=Math.round(lo.reduce((s,p)=>s+p.mood,0)/lo.length*10)/10;
        const mE=['','😵','😩','😐','🙂','⚡'];
        if(hm>lm+.5)ins.push({icon:'🔗',title:'Your mood tracks your sleep',body:`Well-slept days: ${mE[Math.round(hm)]} (${hm}/5). Short nights: ${mE[Math.round(lm)]} (${lm}/5).`});
      }
    }
  }
  const we=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;});
  const wd=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  if(we.length>=3&&wd.length>=5){
    const weA=Math.round(we.reduce((s,e)=>s+e.ef,0)/we.length*10)/10,wdA=Math.round(wd.reduce((s,e)=>s+e.ef,0)/wd.length*10)/10;
    if(weA>wdA+.5)ins.push({icon:'📅',title:`${Math.round((weA-wdA)*10)/10}h more sleep on weekends`,body:`Weekdays: ${wdA}h. Weekends: ${weA}h. Using weekends to recover debt.`});
  }
  const cons=calcCons(S.log.slice(0,30));
  if(cons<60)ins.push({icon:'⏰',title:'Inconsistent bedtimes hurt you',body:`Consistency score: ${cons}/100. Irregular timing disrupts circadian rhythm.`});
  return ins.slice(0,5);
}

function doExport(){
  if(!S.log.length){alert('No data');return;}
  const rows=['Date,Bedtime,Wake,Onset(min),Raw(h),Quality,Wakeups,Tags,Note,Effective(h),Deficit(h)'];
  S.log.forEach(e=>{const ef2=eff(e.hrs,e.quality||3,e.wakeups||0);rows.push(`${e.date},${e.bed},${e.wake},${e.onset||15},${e.hrs},${e.quality||3},${e.wakeups||0},"${(e.tags||[]).join(';')}","${e.note||''}",${ef2},${Math.round((S.need-ef2)*10)/10}`);});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='somnus.csv';a.click();
}
