<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Somnus">
<title>Somnus — Sleep Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
:root{--bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.1);--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.16);--text:#fff;--text2:rgba(255,255,255,.55);--text3:rgba(255,255,255,.30);--green:#30d158;--green-l:rgba(48,209,88,.14);--amber:#ff9f0a;--amber-l:rgba(255,159,10,.14);--red:#ff453a;--red-l:rgba(255,69,58,.14);--blue:#0a84ff;--purple:#bf5af2;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,20px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;}
.app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;background:#000;position:relative;}
.grad{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:65vh;z-index:0;pointer-events:none;transition:background 1.4s ease;}
.layer{position:relative;z-index:1;padding-top:var(--safe-top);padding-bottom:calc(90px + var(--safe-bot));}
#ls{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000;}
.spin{width:26px;height:26px;border:2px solid rgba(255,255,255,.12);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#as{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center;padding-top:calc(40px + var(--safe-top));}
.a-logo{font-size:34px;font-weight:700;letter-spacing:-1px;margin-bottom:6px;}.a-logo span{color:var(--green);}
.a-tag{font-size:15px;color:var(--text2);margin-bottom:36px;line-height:1.6;}
.a-field{width:100%;max-width:320px;background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;font-size:16px;font-family:inherit;color:#fff;outline:none;margin-bottom:10px;}
.a-field::placeholder{color:var(--text3);}
#a-err{font-size:13px;color:var(--red);margin-bottom:10px;max-width:320px;display:none;}
.a-btn{width:100%;max-width:320px;background:#fff;color:#000;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px;}
.a-btn2{width:100%;max-width:320px;background:transparent;color:#fff;border:1px solid var(--border2);border-radius:14px;padding:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;}
.a-note{font-size:12px;color:var(--text3);margin-top:14px;line-height:1.5;max-width:280px;}
#ma{display:none;}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 20px 8px;}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;}.logo span{color:var(--green);}
.ctx{font-size:13px;color:var(--text3);margin-top:3px;max-width:200px;line-height:1.3;}
.hdr-r{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.streak-p{font-size:11px;font-weight:600;border-radius:20px;padding:4px 10px;border:1px solid;}
.ibtn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--text2);}
.nav{position:fixed;bottom:calc(10px + var(--safe-bot));left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:390px;background:rgba(18,18,18,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:36px;display:flex;padding:6px;z-index:100;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 4px;border-radius:28px;transition:background .2s;}
.ni.on{background:rgba(255,255,255,.12);}
.ni-ic{font-size:18px;color:var(--text3);line-height:1;}.ni-lb{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.02em;}
.ni.on .ni-ic,.ni.on .ni-lb{color:#fff;}
.pg{display:none;}.pg.on{display:block;}
/* QL bar */
.ql-bar{padding:0 20px 12px;display:flex;flex-direction:column;gap:8px;}
.ql-confirm{background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.2);border-radius:16px;padding:14px 16px;}
.ql-ctop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.ql-cinfo{flex:1;}.ql-ctitle{font-size:15px;font-weight:600;margin-bottom:2px;}.ql-csub{font-size:12px;color:var(--text3);}
.ql-cbtn{background:var(--green);color:#000;border:none;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0;}
.ql-qrow{display:flex;gap:5px;margin-bottom:8px;}
.ql-qbtn{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;color:var(--text2);}
.ql-qbtn .qi{font-size:16px;display:block;margin-bottom:2px;}.ql-qbtn.sel{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;}
.ql-erow{display:flex;gap:6px;}
.ql-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:20px;border:1px solid;font-size:13px;font-weight:600;cursor:pointer;}
.ql-bed{background:rgba(191,90,242,.1);border-color:rgba(191,90,242,.25);color:var(--purple);}
.ql-wake{background:rgba(255,214,10,.08);border-color:rgba(255,214,10,.25);color:#ffd60a;}
.ql-done{background:rgba(48,209,88,.08);border-color:rgba(48,209,88,.2);color:var(--green);font-size:12px;}
/* Home */
.debt-block{padding:8px 20px 20px;}
.debt-state{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.debt-big{font-size:96px;font-weight:800;line-height:.9;letter-spacing:-6px;margin-bottom:6px;}
.debt-unit{font-size:16px;color:var(--text2);margin-bottom:14px;}
.debt-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.debt-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.ms-strip{display:flex;margin:0 20px 20px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.ms-item{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--border);}
.ms-item:last-child{border-right:none;}.ms-item.cur{background:rgba(255,255,255,.07);}
.ms-dot{font-size:13px;margin-bottom:2px;}.ms-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.ms-val{font-size:9px;color:var(--text3);margin-top:1px;}
.rec-row{margin:0 20px 14px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;}
.rec-main{font-size:14px;font-weight:600;margin-bottom:3px;}
.rec-sub{font-size:12px;color:var(--text3);line-height:1.5;}
.insight-line{margin:0 20px 14px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;font-size:14px;color:var(--text2);line-height:1.5;}
.eve-block{padding:20px 20px 16px;}
.eve-lbl{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.eve-big{font-size:72px;font-weight:800;line-height:.9;letter-spacing:-4px;color:#fff;margin-bottom:6px;}
.eve-unit{font-size:16px;color:var(--text2);margin-bottom:16px;}
.eve-nudge{font-size:15px;color:var(--text2);line-height:1.5;margin-bottom:16px;}
.eve-debt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;}
/* Log */
.log-sec{padding:0 20px;margin-bottom:24px;}
.log-sec-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.log-sec-action{font-size:13px;color:var(--green);cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0;}
.qlog-step{padding:0 20px;min-height:40vh;display:flex;flex-direction:column;justify-content:center;margin-bottom:20px;}
.qlog-dots{display:flex;gap:5px;justify-content:center;margin-bottom:20px;}
.qlog-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);}
.qlog-dot.on{background:#fff;}
.qlog-q{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:20px;line-height:1.2;}
.qlog-opts{display:flex;flex-direction:column;gap:8px;}
.qlog-opt{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:16px;padding:16px 18px;font-size:16px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;}
.qlog-opt.sel{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);}
.qlog-opt-sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:2px;}
.qlog-time-row{display:flex;flex-direction:column;gap:10px;}
.qlog-tf{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.qlog-tf-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 16px 4px;}
.qlog-tf-inp{width:100%;background:transparent;border:none;color:#fff;font-size:28px;font-weight:700;font-family:inherit;padding:4px 16px 14px;outline:none;-webkit-appearance:none;letter-spacing:-.03em;}
.qlog-prev{font-size:13px;color:var(--text3);margin-top:10px;text-align:center;}
.qlog-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;}
.qlog-back{background:none;border:none;color:var(--text3);font-size:15px;font-family:inherit;cursor:pointer;padding:8px 0;}
.qlog-next{background:#fff;color:#000;border:none;border-radius:12px;padding:12px 28px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;}
.qlog-skip{text-align:center;margin-top:14px;}
.qlog-skip-btn{font-size:14px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;padding:6px;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.tag{padding:7px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text2);cursor:pointer;transition:all .15s;}
.tag.sel{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;}
.tag-add{padding:7px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;}
.notes-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;color:#fff;font-size:15px;font-family:inherit;padding:14px 16px;resize:none;height:76px;outline:none;margin-top:10px;}
.notes-inp::placeholder{color:var(--text3);}
.nap-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;}
.nap-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);}
.nap-row:last-child{border-bottom:none;}
.nap-lbl{font-size:16px;color:#fff;}
.nap-inp{background:transparent;border:none;color:#fff;font-size:16px;font-family:inherit;font-weight:500;text-align:right;outline:none;max-width:150px;-webkit-appearance:none;}
.nap-inp option{background:#1c1c1e;}
.nap-dur-btns{display:flex;gap:5px;padding:10px 16px;}
.nap-dur-btn{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px 4px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;color:var(--text2);transition:all .15s;}
.nap-dur-btn.sel{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;}
.nap-entry{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);font-size:14px;}
.nap-entry:last-child{border-bottom:none;}
.nap-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;font-family:inherit;padding:4px 8px;}
.past-form-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.past-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);min-height:50px;}
.past-row:last-child{border-bottom:none;}
.past-lbl{font-size:16px;color:#fff;}
.past-inp{background:transparent;border:none;color:#fff;font-size:16px;font-family:inherit;font-weight:500;text-align:right;outline:none;max-width:150px;-webkit-appearance:none;}
.past-inp option{background:#1c1c1e;}
.past-more{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;background:rgba(255,255,255,.03);border-top:1px solid var(--border);font-size:14px;color:var(--text2);}
.past-more-body{display:none;}.past-more-body.open{display:block;}
.prev-box{margin:0 20px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.6;min-height:42px;}
.hist-week-hdr{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.hist-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;}
.hist-entry{border-bottom:1px solid var(--border);}.hist-entry:last-child{border-bottom:none;}
.hist-main{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hist-info{flex:1;min-width:0;}
.hist-date{font-size:14px;font-weight:600;}
.hist-times{font-size:11px;color:var(--text3);margin-top:2px;}
.hist-tags-l{font-size:10px;color:rgba(48,209,88,.8);margin-top:2px;}
.hist-hrs{font-size:16px;font-weight:700;flex-shrink:0;}
.hist-exp{display:none;background:rgba(0,0,0,.3);border-top:1px solid var(--border);}
.hist-exp-row{display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.hist-exp-row:last-child{border-bottom:none;}
.hist-exp-lbl{color:var(--text2);}.hist-exp-val{font-weight:600;}
.hist-acts{display:flex;border-top:1px solid var(--border);}
.hist-act{flex:1;padding:12px;font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;}
.hist-act.edit{color:var(--text2);border-right:1px solid var(--border);}.hist-act.del{color:var(--red);}
/* Insights */
.ins-hero{margin:0 20px 20px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:18px;}
.ins-hero-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.ins-hero-text{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:4px;}
.ins-hero-sub{font-size:13px;color:var(--text3);line-height:1.5;}
.ptabs{display:flex;gap:6px;margin:0 20px 20px;}
.ptab{flex:1;padding:9px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--border);border-radius:22px;cursor:pointer;color:var(--text3);background:transparent;}
.ptab.on{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.2);}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 20px 20px;}
.ps-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:14px;}
.ps-val{font-size:24px;font-weight:700;line-height:1;margin-bottom:4px;}
.ps-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.ins-sec{padding:0 20px;margin-bottom:20px;}
.ins-sec-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.ins-box{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:16px;}
.ins-card-item{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;}
.ins-card-item:last-child{margin-bottom:0;}
.ins-icon{font-size:18px;margin-bottom:6px;}
.ins-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.ins-body{font-size:12px;color:var(--text2);line-height:1.6;}
.cons-wrap{display:flex;align-items:center;gap:16px;}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-size:18px;font-weight:700;line-height:1;}.ring-sub{font-size:9px;color:var(--text3);font-weight:500;}
.dow-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.dow-lbl{font-size:11px;font-weight:600;color:var(--text2);width:28px;}
.dow-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.dow-fill{height:100%;border-radius:3px;}
.dow-val{font-size:11px;font-weight:600;width:32px;text-align:right;}
.trend-wrap{height:100px;position:relative;margin:8px 0;}
.proj-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
.proj-row:last-child{border-bottom:none;}
/* Settings */
.s-sheet{position:fixed;inset:0;z-index:300;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);}
.s-sheet.open{display:flex;}
.s-inner{background:#1c1c1e;border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:88vh;display:flex;flex-direction:column;}
.s-top{flex-shrink:0;}
.s-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 0;}
.s-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 14px;border-bottom:1px solid var(--border);}
.s-title{font-size:18px;font-weight:700;}.s-done{font-size:16px;font-weight:600;color:var(--green);cursor:pointer;}
.s-scroll{flex:1;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bot));}
.s-sec{padding:20px 20px 0;}
.s-sec-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.s-card{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);min-height:50px;}
.s-row:last-child{border-bottom:none;}.s-row-lbl{font-size:16px;color:#fff;}.s-row-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.s-inp{background:transparent;border:none;color:#fff;font-size:16px;font-family:inherit;font-weight:600;text-align:right;outline:none;max-width:100px;-webkit-appearance:none;}
.s-inp[type=number]{-moz-appearance:textfield;}.s-inp[type=number]::-webkit-outer-spin-button,.s-inp[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.s-inp::placeholder{color:var(--text3);}
.s-note{font-size:12px;color:var(--text3);padding:0 16px 12px;line-height:1.5;}
.s-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.s-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;color:#fff;text-align:center;}

<script>
firebase.initializeApp({apiKey:"AIzaSyBN-35_PsP1gUIk3cthPzWtP3-xk-TfJt4",authDomain:"somnus-4373f.firebaseapp.com",projectId:"somnus-4373f",storageBucket:"somnus-4373f.firebasestorage.app",messagingSenderId:"853350236027",appId:"1:853350236027:web:74812e033d376b93f847de"});
const auth=firebase.auth(),db=firebase.firestore();
const DEF_TAGS=['Alcohol','Stress','Travel','Illness','Cinema','Football','Late work','Exercise'];
let S={need:9.5,wakeTime:'07:00',log:[],naps:[],startingDebt:0,checkins:[],goal:{targetDebt:5,targetDays:60,startDate:null,startDebt:null},ql:{bedTime:null,bedDate:null,wakeTime:null,wakeDate:null},customTags:[],recentTags:[]};
let CU=null,tChart=null,insPeriod='month',qlEditType=null,editTagsSel=[],napDurSel=30,qlConfirmQ=3;
let qlogStep=0,qlogData={quality:3,wakeups:0,tags:[],note:'',bed:'',wake:'',date:''};
let pastMoreOpen=false,napFormOpen=false,showAllHist=false;

auth.onAuthStateChanged(async user=>{
  document.getElementById('ls').style.display='none';
  if(user){CU=user;document.getElementById('as').style.display='none';document.getElementById('ma').style.display='block';await loadFS();updateGrad();renderStreaks();renderQL();go('home',document.querySelector('.ni'));}
  else{CU=null;document.getElementById('as').style.display='flex';document.getElementById('ma').style.display='none';}
});
function showErr(m){const e=document.getElementById('a-err');e.textContent=m;e.style.display='block';}
async function doSignIn(){
  const em=document.getElementById('a-em').value.trim(),pw=document.getElementById('a-pw').value;
  if(!em||!pw){showErr('Please enter email and password.');return;}
  document.getElementById('a-err').style.display='none';
  try{await auth.signInWithEmailAndPassword(em,pw);}
  catch(e){const m={'auth/user-not-found':'No account found.','auth/wrong-password':'Wrong password.','auth/invalid-credential':'Wrong email or password.'};showErr(m[e.code]||'Sign in failed.');}
}
async function doRegister(){
  const em=document.getElementById('a-em').value.trim(),pw=document.getElementById('a-pw').value;
  if(!em||!pw){showErr('Please enter email and password.');return;}
  if(pw.length<6){showErr('Password must be at least 6 characters.');return;}
  document.getElementById('a-err').style.display='none';
  try{await auth.createUserWithEmailAndPassword(em,pw);}
  catch(e){showErr(e.code==='auth/email-already-in-use'?'Account exists. Sign in instead.':'Could not create account.');}
}
async function doSignOut(){closeSettings();await auth.signOut();}
const uDoc=()=>db.collection('users').doc(CU.uid);
async function loadFS(){
  try{const d=await uDoc().get();if(d.exists){S={...S,...d.data()};if(!Array.isArray(S.log))S.log=[];if(!Array.isArray(S.naps))S.naps=[];if(!Array.isArray(S.checkins))S.checkins=[];if(!Array.isArray(S.customTags))S.customTags=[];if(!Array.isArray(S.recentTags))S.recentTags=[];if(!S.goal)S.goal={targetDebt:5,targetDays:60,startDate:null,startDebt:null};if(!S.ql)S.ql={bedTime:null,bedDate:null,wakeTime:null,wakeDate:null};}}catch(e){console.error(e);}
}
let saveTimer;
function saveFS(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{if(!CU)return;try{await uDoc().set(S,{merge:true});showToast('Saved ✓');}catch(e){showToast('Save failed');}},800);}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

function go(p,el){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('on'));
  if(el)el.classList.add('on');
  window.scrollTo(0,0);
  ({home:rHome,log:rLog,insights:rInsights})[p]?.();
}

// Settings
function openSettings(){renderSettings();document.getElementById('s-sheet').classList.add('open');}
function closeSettings(){document.getElementById('s-sheet').classList.remove('open');}
function closeSettingsOutside(e){if(e.target===document.getElementById('s-sheet'))closeSettings();}
function renderSettings(){
  document.getElementById('s-content').innerHTML=`
  <div class="s-sec"><div class="s-sec-title">Sleep profile</div><div class="s-card">
    <div class="s-row" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div style="display:flex;justify-content:space-between;width:100%;align-items:center"><span class="s-row-lbl">Sleep need</span>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" class="s-inp" id="s-nh" value="${Math.floor(S.need)}" min="4" max="12" step="1" style="width:45px" oninput="updateNeed()">h
          <select class="s-inp" id="s-nm" style="width:62px" onchange="updateNeed()">
            <option value="0" ${Math.round((S.need%1)*60)<8?'selected':''}>0 min</option>
            <option value="0.25" ${Math.round((S.need%1)*60)>=8&&Math.round((S.need%1)*60)<23?'selected':''}>15 min</option>
            <option value="0.5" ${Math.round((S.need%1)*60)>=23&&Math.round((S.need%1)*60)<53?'selected':''}>30 min</option>
            <option value="0.75" ${Math.round((S.need%1)*60)>=53?'selected':''}>45 min</option>
          </select>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text3)">Rise-calculated: 9h 30min</div>
    </div>
    <div class="s-row"><span class="s-row-lbl">Wake time</span><input type="time" class="s-inp" value="${S.wakeTime}" oninput="S.wakeTime=this.value;uDoc().set(S,{merge:true}).then(()=>showToast('Wake time saved')).catch(()=>{});"></div>
  </div></div>
  <div class="s-sec"><div class="s-sec-title">Sleep debt baseline</div><div class="s-card">
    <div class="s-row"><div><div class="s-row-lbl">Starting debt</div><div class="s-row-sub">Type any value e.g. 12.8</div></div>
      <div style="display:flex;align-items:center;gap:4px"><input type="number" class="s-inp" id="s-debt" value="${S.startingDebt}" min="0" max="100" step="0.1" style="width:70px" oninput="S.startingDebt=parseFloat(this.value)||0;saveFS();"><span style="color:var(--text3);font-size:15px">h</span></div>
    </div>
  </div>
  <div class="s-btn-row">
    <button class="s-btn" onclick="S.startingDebt=0;document.getElementById('s-debt').value=0;saveFS();showToast('Reset to 0');">Reset to 0</button>
    <button class="s-btn" onclick="const v=parseFloat(document.getElementById('s-debt').value)||0;S.startingDebt=v;saveFS();showToast('Confirmed: '+v+'h');">Confirm</button>
  </div></div>
  <div class="s-sec"><div class="s-sec-title">Debt goal</div><div class="s-card">
    <div class="s-row"><span class="s-row-lbl">Target debt</span><div style="display:flex;align-items:center;gap:4px"><input type="number" class="s-inp" id="s-gt" value="${S.goal?.targetDebt||5}" min="0" max="20" step="0.5" style="width:60px"><span style="color:var(--text3)">h</span></div></div>
    <div class="s-row"><span class="s-row-lbl">Days to achieve</span><div style="display:flex;align-items:center;gap:4px"><input type="number" class="s-inp" id="s-gd" value="${S.goal?.targetDays||60}" min="7" max="365" step="7" style="width:70px"><span style="color:var(--text3);font-size:14px">days</span></div></div>
  </div><button class="s-btn-full" onclick="setGoal()">Set goal</button></div>
  <div class="s-sec"><div class="s-sec-title">Account</div><div class="s-card">
    <div class="s-row"><span class="s-row-lbl">Signed in as</span><span style="font-size:13px;color:var(--text2)">${CU?.email||''}</span></div>
  </div><button class="s-btn-full" onclick="doSignOut()" style="color:var(--red);border-color:rgba(255,69,58,.2);background:rgba(255,69,58,.06)">Sign out</button></div>
  <div class="s-sec" style="padding-bottom:20px"><div class="s-sec-title">Data</div>
    <button class="s-btn-full s-btn-danger" onclick="clearAll()">Delete all data permanently</button>
  </div>`;
}
function updateNeed(){
  const hEl=document.getElementById('s-nh'),mEl=document.getElementById('s-nm');
  if(!hEl||!mEl)return;
  const h=parseFloat(hEl.value)||9,m=parseFloat(mEl.value)||0;
  if(isNaN(h)||h<4||h>12)return;
  S.need=Math.round((h+m)*100)/100;
  // Save immediately - not debounced
  if(!CU)return;
  uDoc().set(S,{merge:true}).then(()=>showToast('Sleep need: '+Math.floor(S.need)+'h '+(Math.round((S.need%1)*60)||0)+'min saved')).catch(()=>showToast('Save failed'));
}
function setGoal(){const td=parseFloat(document.getElementById('s-gt')?.value)||5,td2=parseInt(document.getElementById('s-gd')?.value)||60;S.goal={targetDebt:td,targetDays:td2,startDate:today(),startDebt:getDebt()};saveFS();showToast('Goal set ✓');}
async function clearAll(){if(!confirm('Delete all Somnus data permanently?'))return;S.log=[];S.naps=[];S.checkins=[];S.startingDebt=0;S.customTags=[];S.recentTags=[];S.goal={targetDebt:5,targetDays:60,startDate:null,startDebt:null};S.ql={bedTime:null,bedDate:null,wakeTime:null,wakeDate:null};await uDoc().set(S);closeSettings();rHome();}

// Math
function calcHrs(bed,wake){let[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number),b=bh*60+bm,w=wh*60+wm;if(w<=b)w+=1440;return Math.max(0,Math.round((w-b)/60*10)/10);}
function eff(hrs,q=3,wu=0){return Math.round(Math.max(0,hrs*([0,.75,.85,1,1.05,1.1][q]||1)-wu*.2)*10)/10;}
function targetBed(){const[wh,wm]=S.wakeTime.split(':').map(Number),m=((wh*60+wm-S.need*60)%1440+1440)%1440;return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;}
function fmt(t){let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';if(h===0)h=12;else if(h>12)h-=12;return `${h}:${String(m).padStart(2,'0')}${ap}`;}
function fmtMins(m){if(m<60)return `${Math.round(m)} min`;if(m%60===0)return `${Math.floor(m/60)}h`;return `${Math.floor(m/60)}h ${Math.round(m%60)}min`;}
function fmtH(h){const m=Math.round(Math.abs(h)*60);return fmtMins(m);}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function today(){return new Date().toISOString().slice(0,10);}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function nowStr(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function cdown(m){const a=Math.abs(Math.round(m));if(a<60)return `${a}min`;if(a%60===0)return `${Math.floor(a/60)}h`;return `${Math.floor(a/60)}h ${a%60}min`;}
function sleepDate(bed){const[bh]=bed.split(':').map(Number);return bh<12?yesterday():today();}
function qlBedDate(){return new Date().getHours()<5?yesterday():today();}
function bedDef(bed){const tb=targetBed(),[th,tm]=tb.split(':').map(Number);let[ah,am]=bed.split(':').map(Number),tM=th*60+tm,aM=ah*60+am;if(aM<720)aM+=1440;if(tM<720)tM+=1440;return Math.max(0,Math.round((aM-tM)/60*10)/10);}
function recov(x){return x<=0?0:Math.round(Math.log(1+x*2)*.8*10)/10;}
function napCredit(date){return(S.naps||[]).filter(n=>n.date===date).reduce((s,n)=>s+n.mins/60*.55,0);}
function getDebt(){
  const r=S.log.slice(0,14);if(!r.length)return Math.round(S.startingDebt*10)/10;
  let net=S.startingDebt;r.forEach(e=>{const d=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(d>0)net+=d;else net-=recov(-d);});
  return Math.round(Math.max(0,net)*10)/10;
}
function getStreak(){let s=0;const t=new Date();for(let i=0;i<S.log.length;i++){if(Math.round((t-new Date(S.log[i].date+'T12:00:00'))/86400000)===i)s++;else break;}return s;}
function getGoodStreak(){let s=0;const t=new Date();for(let i=0;i<S.log.length;i++){const e=S.log[i];if(Math.round((t-new Date(e.date+'T12:00:00'))/86400000)!==i)break;if(eff(e.hrs,e.quality||3,e.wakeups||0)>=S.need*.85)s++;else break;}return s;}
function getMilestone(d){if(d>=15)return{emoji:'🔴',label:'Critical',color:'var(--red)'};if(d>=8)return{emoji:'🟠',label:'High',color:'var(--amber)'};if(d>=3)return{emoji:'🟡',label:'Moderate',color:'var(--amber)'};return{emoji:'🟢',label:'Safe zone',color:'var(--green)'};}
function bedMinsLeft(){const tb=targetBed(),[th,tm]=tb.split(':').map(Number),n=new Date();let tM=th*60+tm,nM=n.getHours()*60+n.getMinutes();if(tM<720)tM+=1440;if(nM<720)nM+=1440;return tM-nM;}

function updateGrad(){const debt=getDebt(),el=document.getElementById('grad');if(!el)return;let g=debt<5?'rgba(48,209,88,.35)':debt<8?'rgba(255,159,10,.28)':'rgba(255,69,58,.30)';el.style.background=`radial-gradient(ellipse 100% 55% at 50% 0%,${g},transparent 75%)`;}

function renderStreaks(){

// Contextual copy
function getCtx(){
  const h=new Date().getHours(),debt=getDebt(),last=S.log[0]||null;
  const good=getGoodStreak(),streak=getStreak(),mLeft=bedMinsLeft();
  const ef=last?eff(last.hrs,last.quality||3,last.wakeups||0):null;
  const def=ef!==null?S.need-ef:null;
  if(!last){if(h>=5&&h<12)return "Log your first night to get started.";if(h>=21||h<5)return "First bedtime coming up. Log it in the morning.";return "Your sleep story starts with one log.";}
  if(good>=7)return `${good} good nights in a row. You're on a roll.`;
  if(good>=3)return `${good} solid nights. Debt is moving down.`;
  if(h>=5&&h<12){
    if(def!==null&&def<=-0.5)return `Slept ${fmtH(Math.abs(def))} over your need. Solid night.`;
    if(def!==null&&def<=0)return `${ef}h effective — right on target.`;
    if(def!==null&&def<1.5)return "Decent night. A little short but manageable.";
    if(def!==null&&def<3)return "Short night. Your body will feel it today.";
    if(def!==null&&def>=3)return "Rough night. Rest when you can today.";
  }
  if(h>=11&&h<14){if(debt>15)return `${debt}h debt. Tonight is your best chance to start recovering.`;if(debt>8)return "High debt. Consistent nights chip away at it fast.";if(debt<5)return "Debt is low. Keep the rhythm going.";return "Midday. Focus peak is coming.";}
  if(h>=14&&h<18){if(def!==null&&def>=2)return "Afternoon dip hits harder today. Nap if you can.";if(streak>=5)return `${streak} days logged. Good habit forming.`;return "Afternoon. Second wind ahead.";}
  if(mLeft>120)return `Debt at ${debt}h. Bed by ${fmt(targetBed())} starts the recovery.`;
  if(mLeft>60&&mLeft<=120)return `${cdown(mLeft)} to bedtime. Start winding down.`;
  if(mLeft>0&&mLeft<=60)return `${cdown(mLeft)} to bedtime. Put the phone down soon.`;
  if(mLeft<=0&&mLeft>-90)return `${cdown(mLeft)} past your target bedtime.`;
  if(h>=21||h<5)return `Late night. Every extra hour adds to ${debt}h debt.`;
  return `${debt}h debt. Tonight counts.`;
}

// QL
function getQLState(){
  const h=new Date().getHours(),td=today(),yd=yesterday(),bedDate=qlBedDate();
  const alreadyLogged=S.log.find(e=>e.date===yd||e.date===bedDate);
  const bDone=!!(S.ql?.bedDate&&(S.ql.bedDate===bedDate||S.ql.bedDate===yd));
  const wDone=S.ql?.wakeDate===td;
  if(bDone&&wDone&&!alreadyLogged)return{confirm:true,bDone,wDone};
  if(h>=5&&h<12)return{confirm:false,showBed:bDone,showWake:true,bDone,wDone};
  if(h>=20||h<5)return{confirm:false,showBed:true,showWake:wDone,bDone,wDone};
  if(wDone)return{confirm:false,showBed:false,showWake:true,bDone,wDone};
  return null;
}

  renderStreaks();updateGrad();renderQL();

  let html='';
  if(isEve){

  } else {
    html+=`<div class="debt-block">
      <div class="debt-state" style="color:${dC}">${ms.label}</div>
      <div class="debt-big" style="color:${dC}">${debt}</div>
      <div class="debt-unit">hrs owed</div>
      <div class="debt-bar"><div class="debt-fill" style="width:${Math.min(100,debt/20*100)}%;background:${dC}"></div></div>
    </div>`;
  }
  // Milestone strip
  const mils=[{e:'🔴',l:'Critical',at:'15h+'},{e:'🟠',l:'High',at:'8–15h'},{e:'🟡',l:'Moderate',at:'3–8h'},{e:'🟢',l:'Safe',at:'<3h'}];
  html+=`<div class="ms-strip">${mils.map(m=>`<div class="ms-item${m.l===ms.label?' cur':''}"><div class="ms-dot">${m.e}</div><div class="ms-lbl">${m.l}</div><div class="ms-val">${m.at}</div></div>`).join('')}</div>`;
  // Recovery row
  if(last){
    const ef=eff(last.hrs,last.quality||3,last.wakeups||0),delta=ef-S.need,isRec=delta>=-0.3;
    html+=`<div class="rec-row"><div class="rec-main" style="color:${isRec?'var(--green)':'var(--red)'}">${isRec?`↓ Recovered ${fmtH(ef-S.need>0?ef-S.need:0)} last night`:`↑ Added ${fmtH(S.need-ef)} to debt last night`}</div><div class="rec-sub">${ef}h effective · ${fmt(last.bed)} → ${fmt(last.wake)}${last.quality>=4?' · slept well':last.quality<=2?' · rough night':''}</div></div>`;
  } else {
    html+=`<div class="rec-row"><div class="rec-main" style="color:var(--text3)">No sleep logged yet</div><div class="rec-sub">Log your first night to start tracking recovery.</div></div>`;
  }
  // Daily insight
  const ins=getDailyInsight();
  if(ins)html+=`<div class="insight-line">${ins}</div>`;
  // Goal
  if(S.goal?.startDate){
    const elapsed=Math.max(0,Math.round((new Date()-new Date(S.goal.startDate))/86400000)),dLeft=Math.max(0,S.goal.targetDays-elapsed);
    const reduced=Math.max(0,(S.goal.startDebt||0)-debt),targetR=Math.max(0.01,(S.goal.startDebt||0)-S.goal.targetDebt);
    const pct=Math.min(100,Math.round(reduced/targetR*100)),arcLen=Math.round(pct/100*150.8);
    const gC=pct>=100?'var(--green)':dC;
    const dailyMins=dLeft>0&&debt>S.goal.targetDebt?Math.round((debt-S.goal.targetDebt)/dLeft*60):0;
    html+=`<div class="insight-line" style="display:flex;align-items:center;gap:14px">
      <div style="position:relative;width:56px;height:56px;flex-shrink:0">
        <svg width="56" height="56" viewBox="0 0 56 56" style="transform:rotate(-90deg)"><circle cx="28" cy="28" r="23" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/><circle cx="28" cy="28" r="23" fill="none" stroke="${gC}" stroke-width="5" stroke-dasharray="${arcLen} 150.8" stroke-linecap="round"/></svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${gC}">${pct}%</div>
      </div>
      <div><div style="font-size:14px;font-weight:600;margin-bottom:3px">Debt goal · ${dLeft} days left</div>
        <div style="font-size:12px;color:var(--text3)">${debt>S.goal.targetDebt&&dLeft>0?`Sleep ${fmtMins(dailyMins)} more per night to reach ${S.goal.targetDebt}h`:'🎉 Goal reached!'}</div>
      </div>
    </div>`;
  }
  document.getElementById('pg-home').innerHTML=html;
}

function getDailyInsight(){
  if(S.log.length<7)return null;
  const ae=S.log.map(e=>({...e,ef:eff(e.hrs,e.quality||3,e.wakeups||0)}));
  const r3=ae.slice(0,3);
  if(r3.length===3){if(r3.every(e=>e.ef<S.need-1))return 'Three short nights in a row. Tonight really matters.';if(r3.every(e=>e.ef>=S.need*.9))return 'Three solid nights in a row. Keep this going.';}
  const buckets=Array(7).fill(null).map(()=>[]);ae.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();buckets[d].push(e.ef);});
  const avgs=buckets.map(b=>b.length>=2?b.reduce((s,v)=>s+v,0)/b.length:null),valid=avgs.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(valid.length>=3){const worst=valid.reduce((a,b)=>a.v<b.v?a:b);if(worst.v<S.need-1)return `Your ${days[worst.i]} nights average ${Math.round(worst.v*10)/10}h — your weakest night of the week.`;}
  const we=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;}),wd=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  if(we.length>=2&&wd.length>=3){const weA=we.reduce((s,e)=>s+e.ef,0)/we.length,wdA=wd.reduce((s,e)=>s+e.ef,0)/wd.length;if(weA>wdA+.8)return `You sleep ${fmtH(weA-wdA)} more on weekends. Using them to recover debt.`;}
  return null;
}

  const dots=[0,1,2].map(i=>`<div class="qlog-dot${i===qlogStep?' on':''}"></div>`).join('');
  if(qlogStep===0){
    el.innerHTML=`<div class="qlog-step fu"><div class="qlog-dots">${dots}</div>
      <div class="qlog-q">How was last night?</div>
      <div class="qlog-opts">
        ${[['😵','Rough','Short, broken, or restless.',1],['😐','Okay','Average — felt normal.',3],['🙂','Good','Slept well, feel rested.',4],['⚡','Great','Slept through, feel sharp.',5]].map(([ic,lb,sub,v])=>
          `<div class="qlog-opt${qlogData.quality===v?' sel':''}" onclick="qlS0(${v})">${ic} ${lb}<div class="qlog-opt-sub">${sub}</div></div>`).join('')}
      </div></div>`;
  } else if(qlogStep===1){
    el.innerHTML=`<div class="qlog-step fu"><div class="qlog-dots">${dots}</div>
      <div class="qlog-q">When did you sleep?</div>
      <div class="qlog-time-row">
        <div class="qlog-tf"><div class="qlog-tf-lbl">Went to bed</div><input type="time" class="qlog-tf-inp" id="ql-bed" value="${qlogData.bed}" oninput="qlogData.bed=this.value;qlogData.date=sleepDate(this.value);updQLPrev()"></div>
        <div class="qlog-tf"><div class="qlog-tf-lbl">Woke up</div><input type="time" class="qlog-tf-inp" id="ql-wake" value="${qlogData.wake}" oninput="qlogData.wake=this.value;updQLPrev()"></div>
      </div>
      <div class="qlog-prev" id="ql-prev"></div>
      <div class="qlog-nav"><button class="qlog-back" onclick="qlogStep=0;renderQlogStep()">← Back</button><button class="qlog-next" onclick="qlS1Next()">Next →</button></div>
    </div>`;
    updQLPrev();
  } else if(qlogStep===2){
    const tags=getDisplayTags();
    el.innerHTML=`<div class="qlog-step fu"><div class="qlog-dots">${dots}</div>
      <div class="qlog-q">Anything different?</div>
      <div class="tags-wrap">${tags.map(t=>`<div class="tag${qlogData.tags.includes(t)?' sel':''}" onclick="toggleQlTag('${t}',this)">${t}</div>`).join('')}<div class="tag-add" onclick="document.getElementById('tag-modal').classList.add('open')">+ New</div></div>
      <textarea class="notes-inp" id="ql-note" placeholder="Optional note…">${qlogData.note||''}</textarea>
      <div class="qlog-nav"><button class="qlog-back" onclick="qlogStep=1;renderQlogStep()">← Back</button><button class="qlog-next" onclick="saveQlog()">Save</button></div>
      <div class="qlog-skip"><button class="qlog-skip-btn" onclick="saveQlog()">Skip & save</button></div>
    </div>`;
  }
}
function qlS0(v){qlogData.quality=v;qlogStep=1;renderQlogStep();}
function qlS1Next(){if(!qlogData.bed||!qlogData.wake){showToast('Enter both times');return;}const hrs=calcHrs(qlogData.bed,qlogData.wake);if(hrs<1||hrs>16){showToast('Check your times');return;}qlogStep=2;renderQlogStep();}
function updQLPrev(){const el=document.getElementById('ql-prev');if(!el)return;const hrs=calcHrs(qlogData.bed||'01:00',qlogData.wake||'07:00'),ef2=eff(hrs,qlogData.quality,0);el.textContent=`${hrs.toFixed(1)}h · ~${ef2.toFixed(1)}h effective`;}
function toggleQlTag(t,el){if(qlogData.tags.includes(t)){qlogData.tags=qlogData.tags.filter(x=>x!==t);el.classList.remove('sel');}else{qlogData.tags.push(t);el.classList.add('sel');}}
function saveQlog(){
  qlogData.note=document.getElementById('ql-note')?.value?.trim()||'';
  const date=qlogData.date||yesterday(),hrs=calcHrs(qlogData.bed,qlogData.wake);
  if(hrs<1||hrs>16){showToast('Check your times');return;}
  S.log=S.log.filter(e=>e.date!==date);
  S.log.push({date,bed:qlogData.bed,wake:qlogData.wake,hrs,onset:0,quality:qlogData.quality,wakeups:qlogData.wakeups||0,tags:[...qlogData.tags],note:qlogData.note});
  S.log.sort((a,b)=>b.date.localeCompare(a.date));if(S.log.length>365)S.log=S.log.slice(0,365);
  updateRecentTags(qlogData.tags);
  if(S.ql){S.ql.bedDate=null;S.ql.wakeDate=null;}
  saveFS();showToast('Logged ✓');
  qlogStep=0;qlogData={quality:3,wakeups:0,tags:[],note:'',bed:'',wake:'',date:yesterday()};
  buildLogPage();go('home',document.querySelector('.ni'));
}

function buildHistory(){
  if(!S.log.length)return '<div style="font-size:13px;color:var(--text3)">No entries yet</div>';
  const qI=['','😵','😩','😐','🙂','⚡'];
  // Group by week
  const weeks={};
  const displayLog=showAllHist?S.log:S.log.slice(0,7);
  displayLog.forEach(e=>{
    const d=new Date(e.date+'T12:00:00'),wk=new Date(d);wk.setDate(d.getDate()-d.getDay());
    const wkKey=wk.toISOString().slice(0,10);
    if(!weeks[wkKey])weeks[wkKey]={key:wkKey,entries:[]};weeks[wkKey].entries.push(e);
  });
  return Object.values(weeks).map(wk=>{
    const effs=wk.entries.map(e=>eff(e.hrs,e.quality||3,e.wakeups||0));
    const avg=Math.round(effs.reduce((s,v)=>s+v,0)/effs.length*10)/10;
    const wkLabel=new Date(wk.key+'T12:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'});
    return `<div class="hist-week-hdr"><span>Week of ${wkLabel}</span><span style="color:${avg>=S.need?'var(--green)':'var(--amber)'}">avg ${avg}h</span></div>
    <div class="hist-card">${wk.entries.map(e=>{
      const ef2=eff(e.hrs,e.quality||3,e.wakeups||0),good=ef2>=S.need-.5,c=good?'var(--green)':'var(--red)';
      return `<div class="hist-entry" id="he-${e.date}">
        <div class="hist-main" onclick="toggleHist('${e.date}')">
          <div class="hist-dot" style="background:${c}"></div>
          <div class="hist-info"><div class="hist-date">${fmtDate(e.date)}</div>
            <div class="hist-times">${e.bed}→${e.wake} · ${qI[e.quality||3]}${e.wakeups?' · broken':''}${napCredit(e.date)>0?' · 💤 +'+Math.round(napCredit(e.date)*60)+'min':''}</div>
            ${e.tags?.length?`<div class="hist-tags-l">${e.tags.join(' · ')}</div>`:''}
          </div>
          <div class="hist-hrs" style="color:${c}">${ef2}h</div>
        </div>
        <div class="hist-exp" id="hx-${e.date}">
          <div class="hist-exp-row"><span class="hist-exp-lbl">Effective sleep</span><span class="hist-exp-val">${ef2}h</span></div>
          ${napCredit(e.date)>0?`<div class="hist-exp-row"><span class="hist-exp-lbl">Nap credit</span><span class="hist-exp-val" style="color:var(--green)">+${Math.round(napCredit(e.date)*60)} min</span></div>`:''}
          <div class="hist-exp-row"><span class="hist-exp-lbl">vs need</span><span class="hist-exp-val" style="color:${ef2>=S.need?'var(--green)':'var(--red)'}">${ef2>=S.need?'+':''}${Math.round((ef2-S.need)*10)/10}h</span></div>
          <div class="hist-exp-row"><span class="hist-exp-lbl">Bedtime deficit</span><span class="hist-exp-val" style="color:${bedDef(e.bed)>0?'var(--amber)':'var(--green)'}">${bedDef(e.bed)>0?`+${bedDef(e.bed)}h late`:'On target'}</span></div>
          ${e.note?`<div class="hist-exp-row"><span class="hist-exp-lbl">Note</span><span class="hist-exp-val" style="color:var(--text2);font-style:italic">"${e.note}"</span></div>`:''}
          <div class="hist-acts">
            <button class="hist-act edit" onclick="openEdit('${e.date}')">Edit</button>
            <button class="hist-act del" onclick="delEntry('${e.date}')">Delete</button>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }).join('');
}

function toggleEditTag(t,el){if(editTagsSel.includes(t)){editTagsSel=editTagsSel.filter(x=>x!==t);el.classList.remove('sel');}else{editTagsSel.push(t);el.classList.add('sel');}}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}
function saveEdit(){

function setP(p){insPeriod=p;rInsights();}
function getPL(p){const now=new Date(),cut=new Date(now);if(p==='week')cut.setDate(cut.getDate()-7);else if(p==='month')cut.setDate(cut.getDate()-30);else if(p==='year')cut.setFullYear(cut.getFullYear()-1);else return S.log;return S.log.filter(e=>new Date(e.date+'T12:00:00')>=cut);}
function calcCons(logs){if(logs.length<3)return 0;const mins=logs.map(e=>{let[h,m]=e.bed.split(':').map(Number),v=h*60+m;if(v<720)v+=1440;return v;});const mean=mins.reduce((s,v)=>s+v,0)/mins.length,std=Math.sqrt(mins.reduce((s,v)=>s+(v-mean)**2,0)/mins.length);return Math.max(0,Math.round(100-std/.9));}
function buildHM(){
  const c=document.getElementById('hm');if(!c)return;
  const logMap={};S.log.forEach(e=>{logMap[e.date]=eff(e.hrs,e.quality||3,e.wakeups||0);});
  const now=new Date(),start=new Date(now);start.setDate(start.getDate()-111);start.setDate(start.getDate()-start.getDay());
  const weeks=[];let cur=new Date(start);
  while(cur<=now){const week=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);week.push({date:ds,v:logMap[ds]??null,f:cur>now});cur.setDate(cur.getDate()+1);}weeks.push(week);}
  const cc=v=>{if(v===null)return '#1a1a1a';const r=v/S.need;return r>=1?'#0f4a20':r>=.85?'#0f3320':r>=.7?'#4a3010':r>=.5?'#4a1515':'#3a0a0a';};
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],days=['S','M','T','W','T','F','S'];
  let mH='<div style="display:flex;margin-left:22px;margin-bottom:4px;gap:3px;">',lm=-1;
  weeks.forEach(w=>{const d=new Date(w[0].date+'T12:00:00');if(d.getMonth()!==lm){mH+=`<div style="font-size:9px;color:var(--text3);min-width:13px">${months[d.getMonth()]}</div>`;lm=d.getMonth();}else mH+='<div style="min-width:13px"></div>';});mH+='</div>';
  let gH=`<div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px;margin-right:4px">${days.map(d=>`<div style="font-size:9px;color:var(--text3);height:13px;display:flex;align-items:center">${d}</div>`).join('')}</div>`;
  weeks.forEach(w=>{gH+='<div style="display:flex;flex-direction:column;gap:3px">';w.forEach(day=>{gH+=`<div style="width:13px;height:13px;border-radius:2px;background:${day.f?'transparent':cc(day.v)};flex-shrink:0" title="${day.v!==null?`${day.date}: ${day.v}h`:day.date}"></div>`;});gH+='</div>';});gH+='</div>';
  c.innerHTML=`<div style="overflow-x:auto">${mH}${gH}</div>`;
}
function buildDOW(){
  const el=document.getElementById('dow');if(!el)return;
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],b=Array(7).fill(null).map(()=>[]);
  S.log.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();b[d].push(eff(e.hrs,e.quality||3,e.wakeups||0));});
  const avgs=b.map(bk=>bk.length?Math.round(bk.reduce((s,v)=>s+v,0)/bk.length*10)/10:null);
  const mx=Math.max(...avgs.filter(v=>v!==null),S.need+1);
  el.innerHTML=dn.map((d,i)=>{if(!avgs[i])return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"></div><div class="dow-val" style="color:var(--text3)">—</div></div>`;const p=Math.round(avgs[i]/mx*100),c=avgs[i]>=S.need?'var(--green)':avgs[i]>=S.need*.85?'var(--amber)':'var(--red)';return `<div class="dow-row"><div class="dow-lbl">${d}</div><div class="dow-track"><div class="dow-fill" style="width:${p}%;background:${c}"></div></div><div class="dow-val" style="color:${c}">${avgs[i]}h</div></div>`;}).join('');
}
function buildTrend(logs){
  const c=document.getElementById('tc');if(!c)return;
  const sorted=[...S.log].sort((a,b)=>a.date.localeCompare(b.date));if(sorted.length<2)return;
  let net=S.startingDebt;const dm={};sorted.forEach(e=>{const d=S.need-eff(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(d>0)net+=d;else net-=recov(-d);net=Math.max(0,net);dm[e.date]=Math.round(net*10)/10;});
  const r=sorted.slice(-30),labels=r.map(e=>new Date(e.date+'T12:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'})),data=r.map(e=>dm[e.date]||0);
  if(tChart)tChart.destroy();
  tChart=new Chart(c,{type:'line',data:{labels,datasets:[{label:'Debt',data,borderColor:'rgba(255,255,255,.7)',backgroundColor:'rgba(255,255,255,.04)',fill:true,tension:.3,pointRadius:2,borderWidth:2,pointBackgroundColor:'rgba(255,255,255,.7)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}h debt`}}},scales:{x:{ticks:{color:'rgba(255,255,255,.25)',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},y:{min:0,ticks:{color:'rgba(255,255,255,.25)',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'},border:{display:false}}}}});
}
function genInsights(){
  const ins=[];if(S.log.length<7)return ins;
  const ae=S.log.map(e=>({...e,ef:eff(e.hrs,e.quality||3,e.wakeups||0)}));
  const b=Array(7).fill(null).map(()=>[]);ae.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();b[d].push(e.ef);});
  const avgs=b.map(bk=>bk.length>=2?bk.reduce((s,v)=>s+v,0)/bk.length:null),valid=avgs.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(valid.length>=3){
    const worst=valid.reduce((a,b)=>a.v<b.v?a:b),best=valid.reduce((a,b)=>a.v>b.v?a:b);
    if(worst.v<S.need-.5)ins.push({icon:'📉',title:`${days[worst.i]}s are your worst nights`,body:`You average ${Math.round(worst.v*10)/10}h — ${fmtH(S.need-worst.v)} below your need.`});
    if(best.v>=S.need-.3)ins.push({icon:'🏆',title:`${days[best.i]}s are your best nights`,body:`You average ${Math.round(best.v*10)/10}h. Protect what you do that night.`});
  }
  const we=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;}),wd=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  if(we.length>=2&&wd.length>=3){const weA=we.reduce((s,e)=>s+e.ef,0)/we.length,wdA=wd.reduce((s,e)=>s+e.ef,0)/wd.length;if(weA>wdA+.8)ins.push({icon:'📅',title:`${fmtH(weA-wdA)} more sleep on weekends`,body:`Weekdays: ${Math.round(wdA*10)/10}h avg. Weekends: ${Math.round(weA*10)/10}h avg. Weekend recovery is real but doesn't fix weekday debt.`});}
  const cons=calcCons(S.log.slice(0,30));
  if(cons<60)ins.push({icon:'⏰',title:'Inconsistent bedtimes are costing you',body:`Consistency score: ${cons}/100. Irregular timing disrupts your circadian rhythm even when total hours look okay.`});
  const tagCounts={};ae.forEach(e=>{(e.tags||[]).forEach(t=>{if(!tagCounts[t])tagCounts[t]={count:0,effs:[]};tagCounts[t].count++;tagCounts[t].effs.push(e.ef);});});
  const allAvg=ae.reduce((s,e)=>s+e.ef,0)/ae.length;
  Object.entries(tagCounts).forEach(([tag,data])=>{if(data.count>=3){const tAvg=data.effs.reduce((s,v)=>s+v,0)/data.effs.length;if(tAvg<allAvg-.5)ins.push({icon:'🏷️',title:`${tag} nights average ${Math.round(tAvg*10)/10}h`,body:`That's ${fmtH(allAvg-tAvg)} less than your overall average.`});}});
  return ins.slice(0,6);
}
function doExport(){
  if(!S.log.length){alert('No data');return;}
  const rows=['Date,Bedtime,Wake,Hours,Quality,Broken,Tags,Note,Effective,Deficit'];
  S.log.forEach(e=>{const ef2=eff(e.hrs,e.quality||3,e.wakeups||0);rows.push(`${e.date},${e.bed},${e.wake},${e.hrs},${e.quality||3},${e.wakeups||0},"${(e.tags||[]).join(';')}","${e.note||''}",${ef2},${Math.round((S.need-ef2)*10)/10}`);});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='somnus.csv';a.click();
}
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
