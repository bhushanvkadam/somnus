<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Somnus">
<title>Somnus — Sleep Tracker</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5b47e0">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f7f5; --surface:#fff; --surface2:#f2f2ef;
  --border:#e8e8e4; --border2:#d4d4ce;
  --text:#1a1a18; --text2:#6b6b63; --text3:#ababA0;
  --accent:#5b47e0; --accent-l:#eeecfb; --accent-d:#4535c8;
  --green:#16a34a; --green-l:#dcfce7;
  --amber:#b45309; --amber-l:#fef3c7;
  --red:#dc2626; --red-l:#fee2e2;
  --blue:#1d4ed8; --blue-l:#dbeafe;
  --r:12px; --r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;background:var(--bg);}

/* ── Auth ── */
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 24px;text-align:center;}
.auth-logo{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:8px;}
.auth-logo span{color:var(--accent);}
.auth-tag{font-size:15px;color:var(--text2);margin-bottom:40px;line-height:1.6;}
.auth-input{width:100%;max-width:320px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;padding:14px 16px;font-size:15px;font-family:inherit;color:var(--text);outline:none;margin-bottom:10px;transition:border .15s;}
.auth-input:focus{border-color:var(--accent);}
#auth-error{font-size:12px;color:var(--red);margin-bottom:8px;display:none;max-width:320px;}
.auth-btn{width:100%;max-width:320px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px;transition:background .15s;}
.auth-btn:hover{background:var(--accent-d);}
.auth-btn-out{width:100%;max-width:320px;background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.auth-note{font-size:12px;color:var(--text3);margin-top:12px;line-height:1.5;max-width:280px;}

/* ── Loading ── */
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Main ── */
#main-app{display:none;padding-bottom:88px;}
.header{padding:16px 18px 0;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;}
.logo-dot{color:var(--accent);}
.hdr-date{font-size:12px;color:var(--text3);margin-top:2px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.streak-pill{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-l);border-radius:20px;padding:4px 10px;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(247,247,245,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 4px env(safe-area-inset-bottom,8px);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;border-radius:10px;transition:background .15s;}
.nav-item:hover{background:var(--surface2);}
.nav-icon{font-size:18px;color:var(--text3);line-height:1;}
.nav-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.02em;}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--accent);}

/* ── Pages ── */
.page{display:none;}.page.active{display:block;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin:0 14px 10px;}
.card-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}

/* ── DEBT TAB SPECIFIC ── */
.debt-hero{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.debt-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.debt-number{font-size:64px;font-weight:300;line-height:1;letter-spacing:-4px;}
.debt-unit{font-size:16px;font-weight:400;color:var(--text2);margin-top:8px;}
.debt-arc-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
.debt-arc-wrap svg{transform:rotate(-90deg);}
.debt-arc-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.debt-arc-pct{font-size:15px;font-weight:700;line-height:1;}
.debt-arc-sub{font-size:9px;color:var(--text3);font-weight:500;margin-top:1px;}
.debt-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.debt-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.debt-meta{font-size:12px;color:var(--text3);}
.safe-zone-label{font-size:11px;font-weight:600;color:var(--green);background:var(--green-l);border-radius:20px;padding:3px 8px;display:inline-block;margin-top:10px;}

/* Last night strip */
.ln-strip{margin:0 14px 10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ln-main{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;gap:14px;}
.ln-hours{font-size:36px;font-weight:300;line-height:1;letter-spacing:-2px;}
.ln-label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.ln-sub{font-size:12px;color:var(--text2);}
.ln-quality-ring{width:44px;height:44px;flex-shrink:0;}
.ln-right{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.ln-bedtime{font-size:24px;font-weight:600;line-height:1;margin-bottom:2px;}
.ln-countdown{font-size:11px;font-weight:600;border-radius:20px;padding:3px 8px;display:inline-block;margin-top:6px;}

/* Timeline energy */
.energy-timeline{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;}
.timeline-strip{height:10px;border-radius:5px;overflow:hidden;display:flex;margin:10px 0 8px;position:relative;}
.timeline-seg{height:100%;flex-shrink:0;}
.timeline-marker{position:absolute;top:-4px;width:3px;height:18px;background:var(--text);border-radius:2px;transform:translateX(-50%);}
.timeline-zones{display:flex;justify-content:space-between;margin-top:4px;}
.tz{font-size:10px;color:var(--text3);}
.tz-label{font-size:10px;font-weight:600;margin-bottom:1px;}
.zone-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.zone-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid;}

/* Single tip */
.tip-card{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
.tip-main{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;}
.tip-sub{font-size:13px;color:var(--text2);line-height:1.5;}
.tip-nav{display:flex;align-items:center;gap:8px;margin-top:12px;}
.tip-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);}
.tip-dot.active{background:var(--accent);}
.tip-next{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;margin-left:auto;}

/* Debt goal card */
.goal-card{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;}
.goal-progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:12px 0 8px;}
.goal-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s;}
.goal-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);}

/* TODAY TAB */
.day-hero{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.day-type{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px;}
.day-hrs{font-size:14px;color:var(--text2);margin-bottom:10px;}
.day-bar{height:4px;border-radius:2px;margin-bottom:14px;}
.day-summary{font-size:13px;color:var(--text2);line-height:1.6;}

.visual-timeline{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;}
.vt-strip{display:flex;height:32px;border-radius:8px;overflow:hidden;margin:10px 0;position:relative;cursor:pointer;}
.vt-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.8);flex-shrink:0;}
.vt-now{position:absolute;top:0;bottom:0;width:2px;background:#1a1a18;opacity:.6;}
.vt-detail{background:var(--surface2);border-radius:var(--r);padding:12px;font-size:13px;color:var(--text2);line-height:1.5;margin-top:8px;min-height:44px;}

.today-pills{margin:0 14px 10px;display:flex;gap:8px;}
.today-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;text-align:center;}
.today-pill-val{font-size:15px;font-weight:700;margin-bottom:3px;}
.today-pill-lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}

.nap-banner{margin:0 14px 10px;border-radius:var(--r);padding:12px 14px;border:1px solid;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;}

/* Mood */
.checkin{margin:0 14px 10px;background:linear-gradient(135deg,var(--accent-l),#e8f0fe);border:1px solid rgba(91,71,224,.15);border-radius:var(--r-lg);padding:16px;}
.mood-row{display:flex;gap:6px;margin-top:10px;}
.mbtn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 0;font-size:22px;cursor:pointer;text-align:center;transition:all .15s;}
.mbtn:hover,.mbtn.sel{border-color:var(--accent);background:var(--accent-l);}

/* LOG TAB */
.field{margin-bottom:12px;}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.field input[type=time],.field input[type=date],.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;padding:11px 14px;outline:none;transition:border .15s,background .15s;appearance:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff;}
.field textarea{resize:none;height:72px;font-size:14px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.tag{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
.tag.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d);}
.qual-row{display:flex;gap:5px;}
.qbtn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:var(--text2);line-height:1.4;}
.qbtn .qi{font-size:18px;display:block;margin-bottom:2px;}
.qbtn.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d);}
.wakeup-row{display:flex;gap:6px;}
.wbtn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 4px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:var(--text2);}
.wbtn.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d);}
.preview-box{background:var(--accent-l);border:1px solid rgba(91,71,224,.15);border-radius:var(--r);padding:11px 13px;font-size:13px;color:var(--accent-d);font-weight:500;margin-bottom:13px;line-height:1.6;min-height:44px;}
.snote{font-size:12px;color:var(--text3);line-height:1.5;margin-top:6px;}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--accent-d);}
.btn:active{transform:scale(.98);}
.btn-outline{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-outline:hover{background:var(--surface2);}
.btn-red{color:var(--red);border-color:#fca5a5;}

/* History */
.lentry{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.lentry:last-child{border-bottom:none;}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.linfo{flex:1;min-width:0;}
.ldate{font-size:13px;font-weight:600;}
.ltimes{font-size:11px;color:var(--text3);margin-top:2px;}
.ltags{font-size:10px;color:var(--accent);margin-top:2px;}
.lhrs{font-size:15px;font-weight:700;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:5px;border-radius:6px;transition:.12s;}
.icon-btn:hover{color:var(--text);background:var(--surface2);}

/* INSIGHTS TAB */
.period-tabs{display:flex;gap:6px;margin-bottom:14px;}
.ptab{flex:1;padding:8px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text3);background:var(--surface2);transition:all .15s;}
.ptab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.period-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.pstat-val{font-size:20px;font-weight:700;line-height:1;}
.pstat-lbl{font-size:10px;color:var(--text3);font-weight:500;margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}
.dow-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.dow-lbl{font-size:11px;font-weight:600;color:var(--text2);width:28px;}
.dow-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.dow-fill{height:100%;border-radius:4px;}
.dow-val{font-size:11px;font-weight:600;width:32px;text-align:right;}
.trend-wrap{height:100px;position:relative;margin:8px 0 4px;}
.score-ring{display:flex;align-items:center;gap:16px;}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-size:18px;font-weight:700;line-height:1;}
.ring-sub{font-size:9px;color:var(--text3);font-weight:500;}
.insight-card{border-radius:var(--r);padding:14px;margin-bottom:8px;border:1px solid;}
.insight-icon{font-size:20px;margin-bottom:6px;}
.insight-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.insight-body{font-size:12px;line-height:1.6;}
.wbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.wlbl{font-size:11px;font-weight:600;color:var(--text3);width:24px;text-align:right;}
.wtrack{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.wfill{height:100%;border-radius:3px;}
.wval{font-size:12px;font-weight:600;width:32px;}

/* SETTINGS */
.srow{display:flex;align-items:center;gap:12px;}
.srow input[type=range]{flex:1;accent-color:var(--accent);}
.sval{font-size:14px;font-weight:700;color:var(--accent);min-width:38px;}
.srow2{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.srow2:last-child{border-bottom:none;}
.proj-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.proj-row:last-child{border-bottom:none;}

/* Alert */
.alert{margin:0 14px 10px;border-radius:var(--r);padding:12px 14px;font-size:13px;line-height:1.5;font-weight:500;border:1px solid;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom,0px));}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}

/* Toast */
.save-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:8px 16px;border-radius:20px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.save-toast.show{opacity:1;}

/* PWA install */
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div id="loading-screen"><div class="spinner"></div><div style="font-size:13px;color:var(--text3)">Loading Somnus…</div></div>

  <div id="auth-screen">
    <div style="font-size:64px;margin-bottom:20px">🌙</div>
    <div class="auth-logo">Somnus<span>.</span></div>
    <div class="auth-tag">Your personal sleep debt tracker.<br>Science-backed. Beautifully simple.</div>
    <input type="email" id="auth-email" class="auth-input" placeholder="Email address" onkeydown="if(event.key==='Enter')document.getElementById('auth-pass').focus()">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Password (6+ characters)" onkeydown="if(event.key==='Enter')doSignIn()">
    <div id="auth-error"></div>
    <button onclick="doSignIn()" class="auth-btn">Sign in</button>
    <button onclick="doRegister()" class="auth-btn-out">Create account</button>
    <div class="auth-note">Stays signed in permanently. Works on all browsers including Safari.</div>
  </div>

  <div id="main-app">
    <div class="header">
      <div>
        <div class="logo">Somnus<span class="logo-dot">.</span></div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
      <div class="hdr-right">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="avatar" id="user-avatar" onclick="showUserMenu()"></div>
        </div>
        <div class="streak-pill" id="streak-pill"></div>
      </div>
    </div>

    <div id="page-debt" class="page active"></div>
    <div id="page-today" class="page"></div>
    <div id="page-log" class="page"></div>
    <div id="page-insights" class="page"></div>
    <div id="page-settings" class="page"></div>

    <div class="nav">
      <div class="nav-item active" onclick="go('debt',this)"><div class="nav-icon">◑</div><div class="nav-label">Debt</div></div>
      <div class="nav-item" onclick="go('today',this)"><div class="nav-icon">◈</div><div class="nav-label">Today</div></div>
      <div class="nav-item" onclick="go('log',this)"><div class="nav-icon">⊕</div><div class="nav-label">Log</div></div>
      <div class="nav-item" onclick="go('insights',this)"><div class="nav-icon">◉</div><div class="nav-label">Insights</div></div>
      <div class="nav-item" onclick="go('settings',this)"><div class="nav-icon">◎</div><div class="nav-label">Settings</div></div>
    </div>
  </div>
</div>

<!-- Edit modal -->

// ── Core math ─────────────────────────────────────────────────
function calcHrs(bed,wake,onset=15){
  let[bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number);
  let b=bh*60+bm+onset,w=wh*60+wm;
  if(w<=bh*60+bm)w+=1440;
  return Math.max(0,Math.round((w-b)/60*10)/10);
}
function effHrs(hrs,q=3,wu=0){return Math.round(Math.max(0,hrs*([0,.75,.85,1,1.05,1.1][q]||1)-wu*.15)*10)/10;}
function targetBed(){
  const[wh,wm]=S.wakeTime.split(':').map(Number);
  const m=((wh*60+wm-S.need*60)%1440+1440)%1440;
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;
}
function fmt(t){let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';if(h===0)h=12;else if(h>12)h-=12;return `${h}:${String(m).padStart(2,'0')}${ap}`;}
function fmtH(h){return `${h===0?12:h>12?h-12:h}${h<12?'am':'pm'}`;}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function today(){return new Date().toISOString().slice(0,10);}

function bedDef(bed){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number);
  let[ah,am]=bed.split(':').map(Number);
  let tM=th*60+tm,aM=ah*60+am;
  if(aM<720)aM+=1440;
  if(tM<720)tM+=1440;
  return Math.max(0,Math.round((aM-tM)/60*10)/10);
}
function recov(x){return x<=0?0:Math.round(Math.log(1+x*2)*.8*10)/10;}
function napCredit(date){return(S.naps||[]).filter(n=>n.date===date).reduce((s,n)=>s+n.mins/60*.55,0);}

function getDebt(){
  const r=S.log.slice(0,14);
  if(!r.length)return Math.round(S.startingDebt*10)/10;
  let net=S.startingDebt;
  r.forEach(e=>{
    const def=S.need-effHrs(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);
    if(def>0)net+=def;else net-=recov(-def);
  });
  return Math.round(Math.max(0,net)*10)/10;
}

function getStreak(){
  let s=0;const t=new Date();
  for(let i=0;i<S.log.length;i++){
    if(Math.round((t-new Date(S.log[i].date+'T12:00:00'))/86400000)===i)s++;else break;
  }
  return s;
}

function eLevel(nowH,wH){
  const e=(nowH-wH+24)%24,pi=Math.PI;let v;
  if(e<1.5)v=.3+(e/1.5)*.4;else if(e<5)v=.7+Math.sin((e-1.5)/3.5*pi)*.3;
  else if(e<7)v=1-(e-5)/2*.35;else if(e<9)v=.65+Math.sin((e-7)/2*pi)*.2;
  else if(e<11)v=.85-(e-9)/2*.3;else if(e<14)v=.55-(e-11)/3*.25;
  else v=Math.max(.1,.3-(e-14)*.03);
  return Math.max(.05,Math.min(1,v*Math.max(.6,1-getDebt()/30*.35)));
}

function bedAlert(){
  const tb=targetBed(),[th,tm]=tb.split(':').map(Number),n=new Date();
  let tM=th*60+tm,nM=n.getHours()*60+n.getMinutes();
  if(tM<720)tM+=1440;if(nM<720)nM+=1440;
  const d=tM-nM;return(d>0&&d<=180)?d:null;
}

function countdown(mins){
  if(mins<60)return `${mins}min`;
  return `${Math.floor(mins/60)}h ${mins%60>0?mins%60+'min':''}`.trim();
}

function buildEnergyTimeline(){
  const[wh]=S.wakeTime.split(':').map(Number);
  const now=new Date(),nowH=now.getHours()+now.getMinutes()/60;
  const totalHrs=16;
  const segs=[];
  const zones=[
    {label:'Rise',h:0,len:1.5,color:'#ddd6fe',tc:'#5b47e0'},
    {label:'Focus',h:1.5,len:3.5,color:'#86efac',tc:'#16a34a'},
    {label:'Dip',h:5,len:2,color:'#fde68a',tc:'#b45309'},
    {label:'Wind',h:7,len:2,color:'#93c5fd',tc:'#1d4ed8'},
    {label:'Peak',h:9,len:2,color:'#86efac',tc:'#16a34a'},
    {label:'Down',h:11,len:5,color:'#fca5a5',tc:'#dc2626'},
  ];

  const pillsHTML=zones.map(z=>`<div class="zone-pill" style="background:${z.color};border-color:${z.color};color:${z.tc};">${fmtH((wh+z.h)%24)} ${z.label}</div>`).join('');

  const segsHTML=zones.map(z=>`<div class="timeline-seg" style="flex:${z.len};background:${z.color};"></div>`).join('');

  const elapsed=(nowH-wh+24)%24;
  const markerPct=Math.min(100,Math.max(0,elapsed/totalHrs*100));

  // Current zone
  let currentZone=zones[zones.length-1];
  for(const z of zones){if(elapsed>=z.h&&elapsed<z.h+z.len)currentZone=z;}

  return `<div class="energy-timeline">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
      <div class="card-label" style="margin-bottom:0">Energy — today</div>
      <div style="font-size:11px;font-weight:600;color:${currentZone.tc}">${currentZone.label} zone now</div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${fmtH(wh%24)} wake → ${fmtH((wh+16)%24)} wind-down</div>
    <div class="timeline-strip">
      ${segsHTML}
      <div class="timeline-marker" style="left:${markerPct}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:10px;">
      <span>${fmtH(wh%24)}</span><span>${fmtH((wh+4)%24)}</span><span>${fmtH((wh+8)%24)}</span><span>${fmtH((wh+12)%24)}</span><span>${fmtH((wh+16)%24)}</span>
    </div>
    <div class="zone-pills">${pillsHTML}</div>
  </div>`;
}

function setP(p){insPeriod=p;rInsights();}

function getPL(period){
  const now=new Date(),cutoff=new Date(now);
  if(period==='week')cutoff.setDate(cutoff.getDate()-7);
  else if(period==='month')cutoff.setDate(cutoff.getDate()-30);
  else if(period==='year')cutoff.setFullYear(cutoff.getFullYear()-1);
  else return S.log;
  return S.log.filter(e=>new Date(e.date+'T12:00:00')>=cutoff);
}

function calcCons(logs){
  if(logs.length<3)return 0;
  const mins=logs.map(e=>{let[h,m]=e.bed.split(':').map(Number),v=h*60+m;if(v<720)v+=1440;return v;});
  const mean=mins.reduce((s,v)=>s+v,0)/mins.length;
  const std=Math.sqrt(mins.reduce((s,v)=>s+(v-mean)**2,0)/mins.length);
  return Math.max(0,Math.round(100-std/.9));
}

function buildHM(){
  const container=document.getElementById('hm');if(!container)return;
  const logMap={};S.log.forEach(e=>{logMap[e.date]=effHrs(e.hrs,e.quality||3,e.wakeups||0);});
  const now=new Date(),start=new Date(now);
  start.setDate(start.getDate()-111);start.setDate(start.getDate()-start.getDay());
  const weeks=[];let cur=new Date(start);
  while(cur<=now){const week=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);week.push({date:ds,eff:logMap[ds]??null,fut:cur>now});cur.setDate(cur.getDate()+1);}weeks.push(week);}
  function cc(eff){if(eff===null)return '#e8e8e4';const r=eff/S.need;return r>=1?'#16a34a':r>=.85?'#86efac':r>=.7?'#fcd34d':r>=.5?'#fca5a5':'#ef4444';}
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],days=['S','M','T','W','T','F','S'];
  let mHTML='<div style="display:flex;margin-left:24px;margin-bottom:4px;gap:3px;">',lastM=-1;
  weeks.forEach(w=>{const d=new Date(w[0].date+'T12:00:00');if(d.getMonth()!==lastM){mHTML+=`<div style="font-size:9px;color:var(--text3);font-weight:500;min-width:13px">${months[d.getMonth()]}</div>`;lastM=d.getMonth();}else{mHTML+='<div style="min-width:13px"></div>';}});
  mHTML+='</div>';
  let gHTML=`<div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px;margin-right:4px">${days.map(d=>`<div style="font-size:9px;color:var(--text3);height:13px;display:flex;align-items:center">${d}</div>`).join('')}</div>`;
  weeks.forEach(w=>{gHTML+='<div style="display:flex;flex-direction:column;gap:3px">';w.forEach(day=>{gHTML+=`<div style="width:13px;height:13px;border-radius:2px;background:${day.fut?'transparent':cc(day.eff)};flex-shrink:0" title="${day.eff!==null?`${day.date}: ${day.eff}h`:day.date}"></div>`;});gHTML+='</div>';});
  gHTML+='</div>';
  container.innerHTML=`<div style="overflow-x:auto">${mHTML}${gHTML}</div>`;
}

function buildDOW(){
  const el=document.getElementById('dow');if(!el)return;
  const dnames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],buckets=Array(7).fill(null).map(()=>[]);
  S.log.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();buckets[d].push(effHrs(e.hrs,e.quality||3,e.wakeups||0));});
  const avgs=buckets.map(b=>b.length?Math.round(b.reduce((s,v)=>s+v,0)/b.length*10)/10:null);
  const maxA=Math.max(...avgs.filter(v=>v!==null),S.need+1);
  el.innerHTML=dnames.map((d,i)=>{
    if(avgs[i]===null)return `<div class="dow-bar-wrap"><div class="dow-lbl">${d}</div><div class="dow-track"></div><div class="dow-val" style="color:var(--text3)">—</div></div>`;
    const pct=Math.round(avgs[i]/maxA*100),c=avgs[i]>=S.need?'var(--green)':avgs[i]>=S.need*.85?'var(--amber)':'var(--red)';
    return `<div class="dow-bar-wrap"><div class="dow-lbl">${d}</div><div class="dow-track"><div class="dow-fill" style="width:${pct}%;background:${c}"></div></div><div class="dow-val" style="color:${c}">${avgs[i]}h</div></div>`;
  }).join('');
}

function buildTrend(logs){
  const c=document.getElementById('tc');if(!c)return;
  const sorted=[...S.log].sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<2)return;
  let net=S.startingDebt;const debtMap={};
  sorted.forEach(e=>{const def=S.need-effHrs(e.hrs,e.quality||3,e.wakeups||0)-napCredit(e.date);if(def>0)net+=def;else net-=recov(-def);net=Math.max(0,net);debtMap[e.date]=Math.round(net*10)/10;});
  const recent=sorted.slice(-30);
  const labels=recent.map(e=>new Date(e.date+'T12:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'}));
  const data=recent.map(e=>debtMap[e.date]||0);
  if(tChart)tChart.destroy();
  tChart=new Chart(c,{type:'line',data:{labels,datasets:[{label:'Debt',data,borderColor:'#5b47e0',backgroundColor:'rgba(91,71,224,.06)',fill:true,tension:.3,pointRadius:2,borderWidth:2,pointBackgroundColor:'#5b47e0'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}h debt`}}},
      scales:{x:{ticks:{color:'#ababA0',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},y:{min:0,ticks:{color:'#ababA0',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}}}}});
}

function genInsights(){
  const ins=[];if(S.log.length<7)return ins;
  const ae=S.log.map(e=>({...e,ef:effHrs(e.hrs,e.quality||3,e.wakeups||0)}));
  const buckets=Array(7).fill(null).map(()=>[]);
  ae.forEach(e=>{const d=new Date(e.date+'T12:00:00').getDay();buckets[d].push(e.ef);});
  const avgs=buckets.map(b=>b.length>=2?b.reduce((s,v)=>s+v,0)/b.length:null);
  const valid=avgs.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const dnames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(valid.length>=3){
    const worst=valid.reduce((a,b)=>a.v<b.v?a:b),best=valid.reduce((a,b)=>a.v>b.v?a:b);
    if(worst.v<S.need-.5)ins.push({icon:'📉',title:`${dnames[worst.i]}s are your worst sleep nights`,body:`You average ${Math.round(worst.v*10)/10}h — ${Math.round((S.need-worst.v)*10)/10}h below your need.`,bg:'var(--red-l)',bc:'#fca5a5',tc:'var(--red)'});
    if(best.v>=S.need-.3)ins.push({icon:'🏆',title:`${dnames[best.i]}s are your best sleep nights`,body:`You average ${Math.round(best.v*10)/10}h. Protect whatever you're doing that night.`,bg:'var(--green-l)',bc:'#86efac',tc:'var(--green)'});
  }
  const md=S.checkins&&S.checkins.length>=5?S.checkins:[];
  if(md.length>=5){
    const pairs=[];md.forEach(ci=>{const prev=S.log.find(e=>e.date===ci.date);if(prev)pairs.push({mood:ci.score,ef:effHrs(prev.hrs,prev.quality||3,prev.wakeups||0)});});
    if(pairs.length>=5){
      const hi=pairs.filter(p=>p.ef>=S.need-.5),lo=pairs.filter(p=>p.ef<S.need-1);
      if(hi.length>=2&&lo.length>=2){
        const hm=Math.round(hi.reduce((s,p)=>s+p.mood,0)/hi.length*10)/10,lm=Math.round(lo.reduce((s,p)=>s+p.mood,0)/lo.length*10)/10;
        const mE=['','😵','😩','😐','🙂','⚡'];
        if(hm>lm+.5)ins.push({icon:'🔗',title:'Your mood directly tracks your sleep',body:`Well-slept days: ${mE[Math.round(hm)]} (${hm}/5). Short nights: ${mE[Math.round(lm)]} (${lm}/5).`,bg:'var(--blue-l)',bc:'#93c5fd',tc:'var(--blue)'});
      }
    }
  }
  const we=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;});
  const wd=ae.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>0&&d<6;});
  if(we.length>=3&&wd.length>=5){
    const weA=Math.round(we.reduce((s,e)=>s+e.ef,0)/we.length*10)/10,wdA=Math.round(wd.reduce((s,e)=>s+e.ef,0)/wd.length*10)/10;
    if(weA>wdA+.5)ins.push({icon:'📅',title:`You sleep ${Math.round((weA-wdA)*10)/10}h more on weekends`,body:`Weekdays: ${wdA}h. Weekends: ${weA}h. You're using weekends to recover — which helps but doesn't prevent weekday accumulation.`,bg:'var(--amber-l)',bc:'#fcd34d',tc:'var(--amber)'});
  }
  const cons=calcCons(S.log.slice(0,30));
  if(cons<60)ins.push({icon:'⏰',title:'Inconsistent bedtimes are costing you',body:`Consistency score: ${cons}/100. Irregular timing disrupts circadian rhythm even when total hours look okay.`,bg:'var(--amber-l)',bc:'#fcd34d',tc:'var(--amber)'});

  // Tags insights
  const tagCounts={};
  ae.forEach(e=>{(e.tags||[]).forEach(t=>{if(!tagCounts[t])tagCounts[t]={count:0,effs:[]};tagCounts[t].count++;tagCounts[t].effs.push(e.ef);});});
  const allAvg=Math.round(ae.reduce((s,e)=>s+e.ef,0)/ae.length*10)/10;
  Object.entries(tagCounts).forEach(([tag,data])=>{
    if(data.count>=3){
      const tagAvg=Math.round(data.effs.reduce((s,v)=>s+v,0)/data.effs.length*10)/10;
      if(tagAvg<allAvg-.5)ins.push({icon:'🏷️',title:`${tag} nights average ${tagAvg}h sleep`,body:`That's ${Math.round((allAvg-tagAvg)*10)/10}h less than your overall average. Worth knowing.`,bg:'#f5f3ff',bc:'#ddd6fe',tc:'var(--accent)'});
    }
  });

  return ins.slice(0,6);
}

function rSettings(){
  document.getElementById('page-settings').innerHTML=`
    <div class="card"><div class="card-label">Sleep need</div>
      <div class="srow" style="margin-bottom:8px"><input type="range" min="6" max="11" step="0.5" value="${S.need}" oninput="lv('need',this.value,'nd','h')"><div class="sval" id="nd">${S.need}h</div></div>
      <div class="snote">Rise-calculated need: 9.5h · Most adults: 7–9h</div>
    </div>
    <div class="card"><div class="card-label">Wake time</div>
      <div class="field" style="margin-bottom:0"><input type="time" value="${S.wakeTime}" oninput="S.wakeTime=this.value;saveFS();"></div>
    </div>
    <div class="card"><div class="card-label">Starting debt</div>
      <div class="srow" style="margin-bottom:8px"><input type="range" min="0" max="30" step="0.5" value="${S.startingDebt}" oninput="lv('startingDebt',this.value,'sd','h')"><div class="sval" id="sd">${S.startingDebt}h</div></div>
      <div class="snote" style="margin-bottom:14px">Your Rise baseline: 12.5h. Adjusts as you log nights.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-outline" onclick="S.startingDebt=0;saveFS();rSettings()">Reset to 0</button>
        <button class="btn-outline" onclick="S.startingDebt=12.5;saveFS();rSettings()">Set to 12.5h</button>
      </div>
    </div>
    <div class="card"><div class="card-label">Debt goal</div>
      <div class="field"><label>Target debt (hours)</label>
        <div class="srow" style="margin-bottom:6px"><input type="range" min="0" max="10" step="0.5" value="${S.goal?.targetDebt||5}" oninput="document.getElementById('gd').textContent=this.value+'h'"><div class="sval" id="gd">${S.goal?.targetDebt||5}h</div></div>
        <div class="snote">Safe zone is under 5h. Below 2h is optimal.</div>
      </div>
      <div class="field"><label>Days to achieve it</label>
        <div class="srow" style="margin-bottom:6px"><input type="range" min="7" max="180" step="7" value="${S.goal?.targetDays||60}" oninput="document.getElementById('gdays').textContent=this.value+' days'"><div class="sval" id="gdays" style="min-width:60px;font-size:13px">${S.goal?.targetDays||60} days</div></div>
      </div>
      <button class="btn" onclick="setGoal()">Set goal</button>
      ${S.goal?.startDate?`<div style="font-size:12px;color:var(--text3);margin-top:8px;text-align:center">Goal started ${fmtDate(S.goal.startDate)}</div>`:''}
    </div>
    <div class="card"><div class="card-label">Account</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px">Signed in as <strong>${CU?.email||''}</strong>.<br>Data syncs automatically across all devices.</div>
      <button class="btn-outline btn-red" onclick="doSignOut()">Sign out</button>
    </div>
    <div class="card"><div class="card-label">Danger zone</div>
      <div class="snote" style="margin-bottom:14px">Permanently deletes all your sleep logs.</div>
      <button class="btn-outline btn-red" onclick="clearAll()">Delete all data</button>
    </div>`;
}

function setGoal(){
  const targetDebt=parseFloat(document.querySelector('#page-settings input[type=range]').value)||5;
  const targetDays=parseInt(document.querySelectorAll('#page-settings input[type=range]')[2]?.value)||60;
  const tD=parseFloat(document.getElementById('gd').textContent)||5;
  const tDays=parseInt(document.getElementById('gdays').textContent)||60;
  S.goal={targetDebt:tD,targetDays:tDays,startDate:today(),startDebt:getDebt()};
  saveFS();showToast('Goal set ✓');rSettings();
}

function lv(key,val,id,sfx){S[key]=parseFloat(val);document.getElementById(id).textContent=val+sfx;saveFS();}
async function clearAll(){if(!confirm('Permanently delete all Somnus data?'))return;S.log=[];S.naps=[];S.checkins=[];S.startingDebt=12.5;S.goal={targetDebt:5,targetDays:60,startDate:null,startDebt:null};await uDoc().set(S);rDebt();}
function doExport(){
  if(!S.log.length){alert('No data');return;}
  const rows=['Date,Bedtime,Wake,Onset(min),Raw(h),Quality,Wakeups,Tags,Note,Effective(h),Deficit(h)'];
  S.log.forEach(e=>{const ef=effHrs(e.hrs,e.quality||3,e.wakeups||0);rows.push(`${e.date},${e.bed},${e.wake},${e.onset||15},${e.hrs},${e.quality||3},${e.wakeups||0},"${(e.tags||[]).join(';')}","${e.note||''}",${ef},${Math.round((S.need-ef)*10)/10}`);});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='somnus.csv';a.click();
}
